/* =========================================================
   API HELPERS
   Wraps fetch() so every call throws on non-2xx and parses JSON.
   ========================================================= */
const api = {
  async get(path) {
    const r = await fetch(path, { credentials: 'same-origin' });
    if (!r.ok) throw new Error(`GET ${path} ${r.status}`);
    return r.json();
  },
  async post(path, body) {
    const r = await fetch(path, {
      method: 'POST',
      credentials: 'same-origin',
      headers: { 'Content-Type': 'application/json' },
      body: body ? JSON.stringify(body) : undefined,
    });
    if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.error || `POST ${path} ${r.status}`); }
    return r.json();
  },
  async patch(path, body) {
    const r = await fetch(path, {
      method: 'PATCH',
      credentials: 'same-origin',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.error || `PATCH ${path} ${r.status}`); }
    return r.json();
  },
  async del(path) {
    const r = await fetch(path, { method: 'DELETE', credentials: 'same-origin' });
    if (!r.ok) throw new Error(`DELETE ${path} ${r.status}`);
    return r.json();
  },
  async postForm(path, formData) {
    const r = await fetch(path, { method: 'POST', credentials: 'same-origin', body: formData });
    if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.error || `POST ${path} ${r.status}`); }
    return r.json();
  },
};

/* =========================================================

const TODAY = new Date();
TODAY.setHours(12, 0, 0, 0);

const fmtDate = (d) => {
  const dt = typeof d === 'string' ? new Date(d + 'T00:00:00') : new Date(d);
  const y = dt.getFullYear(), m = String(dt.getMonth()+1).padStart(2,'0'), day = String(dt.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
};
const daysAgo = (n) => { const d = new Date(TODAY); d.setDate(d.getDate() - n); return fmtDate(d); };
const displayDate = (s) => {
  const d = new Date(s + 'T00:00:00');
  return d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
};
const weekOfProgram = (start) => {
  const days = Math.floor((TODAY - new Date(start+'T00:00:00')) / 86400000);
  return Math.max(0, Math.min(6, Math.floor(days/7)));
};
const MAX_PHOTOS = 5;
const daysSinceLastUpload = (logs) => {
  if (!logs.length) return Infinity;
  const last = [...logs].sort((a,b)=>b.log_date.localeCompare(a.log_date))[0].log_date;
  return Math.floor((TODAY - new Date(last+'T00:00:00')) / 86400000);
};

function Modal({ onClose, children, size='md' }) {
  useEffect(() => {
    const h = (e) => e.key === 'Escape' && onClose();
    document.addEventListener('keydown', h);
    return () => document.removeEventListener('keydown', h);
  }, [onClose]);
  const sizes = { sm:'max-w-md', md:'max-w-lg', lg:'max-w-2xl', xl:'max-w-4xl' };
  return (
    <div className="fixed inset-0 bg-brand-black/60 z-50 flex items-center justify-center p-4 animate-[fade_0.15s_ease-out]" onClick={onClose}>
      <div className={`bg-white rounded-lg shadow-2xl w-full ${sizes[size]} max-h-[90vh] overflow-y-auto`} onClick={(e)=>e.stopPropagation()}>
        {children}
      </div>
    </div>
  );
}

/* =========================================================
   LOGIN
   ========================================================= */
function CoachLogin({ onLogin }) {
  const [pin, setPin] = useState('');
  const [error, setError] = useState('');
  const [submitting, setSubmitting] = useState(false);
  const submit = async () => {
    if (!pin || submitting) return;
    setSubmitting(true); setError('');
    try {
      await api.post('/api/coach-login', { pin });
      onLogin();
    } catch (e) {
      setError('Invalid PIN');
      setPin('');
      setSubmitting(false);
    }
  };
  return (
    <div className="min-h-screen flex items-center justify-center bg-brand-black px-4">
      <div className="w-full max-w-sm">
        <div className="text-center mb-10">
          <div className="inline-flex items-center gap-2">
            <div className="w-2.5 h-2.5 bg-brand-orange"></div>
            <div className="font-display font-bold text-white text-xs tracking-[0.25em]">THE BUFFALO METHOD</div>
          </div>
          <h1 className="font-display font-bold text-white text-5xl mt-8 leading-none">COACH<br/>DASHBOARD</h1>
          <p className="text-neutral-400 mt-4 text-sm">Enter your admin PIN</p>
        </div>
        <div className="space-y-4">
          <input
            type="password" inputMode="numeric" maxLength={8} value={pin}
            onChange={(e)=>{ setPin(e.target.value.replace(/\D/g,'')); setError(''); }}
            onKeyDown={(e)=> e.key==='Enter' && submit()}
            disabled={submitting}
            placeholder="••••"
            className="w-full bg-neutral-900 border border-neutral-700 focus:border-brand-orange text-white text-center font-display text-4xl tracking-[0.5em] py-5 rounded transition disabled:opacity-50"
            autoFocus
          />
          {error && <p className="text-red-400 text-sm text-center font-medium">{error}</p>}
          <button onClick={submit} disabled={submitting || !pin}
            className="w-full bg-brand-orange hover:bg-brand-orange-dark disabled:bg-neutral-700 disabled:cursor-not-allowed text-white font-display font-bold text-xl tracking-[0.12em] py-4 rounded transition-colors">
            {submitting ? 'SIGNING IN…' : 'SIGN IN'}
          </button>
        </div>
      </div>
    </div>
  );
}

/* =========================================================
   HEADER
   ========================================================= */
function DashboardHeader({ onLogout, currentSection, onNavigate, newLeadsCount = 0 }) {
  const navItems = [
    { id:'clients',      label:'CLIENTS' },
    { id:'leads',        label:'LEADS'        },
    { id:'workouts',     label:'WORKOUTS' },
    { id:'meal-builder', label:'MEAL BUILDER' },
  ];
  const [backupState, setBackupState] = useState('idle'); // idle | running | done | error
  const runBackupNow = async () => {
    if (backupState === 'running') return;
    setBackupState('running');
    try {
      const res = await api.post('/api/backup/run');
      console.log('Backup summary:', res.summary);
      setBackupState('done');
      setTimeout(() => setBackupState('idle'), 3000);
    } catch (e) {
      setBackupState('error');
      alert('Backup failed: ' + e.message);
      setTimeout(() => setBackupState('idle'), 3000);
    }
  };
  const backupLabel = {
    idle:    'BACKUP NOW',
    running: 'BACKING UP…',
    done:    '✓ EMAILED',
    error:   '✗ FAILED',
  }[backupState];
  return (
    <header className="bg-brand-black text-white sticky top-0 z-40">
      <div className="max-w-7xl mx-auto px-6 py-3 flex items-center justify-between gap-6">
        <button onClick={()=>onNavigate('clients')} className="flex items-center gap-2 hover:opacity-80 transition flex-shrink-0">
          <div className="w-2.5 h-2.5 bg-brand-orange"></div>
          <span className="font-display font-bold text-xs tracking-[0.25em] hidden sm:inline">THE BUFFALO METHOD</span>
        </button>

        <nav className="flex gap-1">
          {navItems.map(item => (
            <button key={item.id} onClick={()=>onNavigate(item.id)}
              className={`font-display font-bold tracking-[0.12em] text-xs px-4 py-1.5 rounded transition flex items-center gap-1.5 ${currentSection===item.id ? 'bg-white text-brand-black' : 'text-neutral-300 hover:text-white hover:bg-neutral-800'}`}>
              {item.label}
              {item.id === 'leads' && newLeadsCount > 0 && (
                <span className={`inline-flex items-center justify-center min-w-[18px] h-[18px] px-1 rounded-full text-[10px] font-bold ${currentSection===item.id ? 'bg-brand-orange text-white' : 'bg-brand-orange text-white'}`}>
                  {newLeadsCount}
                </span>
              )}
            </button>
          ))}
        </nav>

        <div className="flex items-center gap-4 flex-shrink-0">
          <button onClick={runBackupNow} disabled={backupState === 'running'}
            title="Trigger an immediate backup email"
            className={`text-xs font-display font-semibold tracking-[0.12em] transition hidden md:inline ${
              backupState === 'done'  ? 'text-emerald-400' :
              backupState === 'error' ? 'text-red-400' :
              'text-neutral-400 hover:text-white'
            }`}>
            {backupLabel}
          </button>
          <a href="#ham-app" onClick={(e)=>e.preventDefault()} title="Open Hormone Aligned Nutrition (free app)"
             className="text-neutral-400 hover:text-white text-xs font-display font-semibold tracking-[0.12em] transition hidden md:flex items-center gap-1.5">
            <span>HAM APP</span>
            <Icon.Ext className="w-3 h-3"/>
          </a>
          <button onClick={onLogout} className="text-neutral-300 hover:text-white text-xs font-display font-semibold tracking-[0.12em] transition">
            SIGN OUT
          </button>
        </div>
      </div>
    </header>
  );
}

function ClientListView({ clients, mealLogs, onSelectClient, onAddClient }) {
  const [search, setSearch] = useState('');
  const [filter, setFilter] = useState('all');

  const rows = clients
    .map(c => {
      const logs = mealLogs.filter(l => l.client_id === c.id);
      const since = daysSinceLastUpload(logs);
      return { ...c, _since: since, _week: weekOfProgram(c.start_date), _overdue: c.status==='active' && since >= 2 };
    })
    .filter(c => filter==='all' || c.status===filter)
    .filter(c => !search || c.name.toLowerCase().includes(search.toLowerCase()) || c.email.toLowerCase().includes(search.toLowerCase()));

  const activeCount = clients.filter(c=>c.status==='active').length;
  const overdueCount = clients.filter(c=>{
    if (c.status!=='active') return false;
    return daysSinceLastUpload(mealLogs.filter(l=>l.client_id===c.id)) >= 2;
  }).length;

  return (
    <div className="max-w-7xl mx-auto px-6 py-8">

            {activeCount} active
            {' · '}
            {overdueCount > 0
              ? <span className="text-brand-orange font-semibold">{overdueCount} need attention</span>
              : <span className="text-emerald-700 font-semibold">all up to date</span>
            }

        </div>
        <button onClick={onAddClient}
          className="bg-brand-orange hover:bg-brand-orange-dark text-white font-display font-bold tracking-[0.12em] px-5 py-2.5 rounded transition flex items-center gap-2">
          <Icon.Plus className="w-4 h-4"/>ADD CLIENT

        </div>

            <button key={f} onClick={()=>setFilter(f)}

              {f.toUpperCase()}
            </button>

      </div>

  });

              className="w-full border border-neutral-200 rounded px-3 py-2.5 focus:border-brand-orange transition"/>

          <div className="grid grid-cols-2 gap-4">

/* =========================================================
   UPLOAD ON BEHALF MODAL
   ========================================================= */
function UploadModal({ client, onClose, onSave }) {
  const [date, setDate] = useState(fmtDate(TODAY));
  const [note, setNote] = useState('');
  const [files, setFiles] = useState([]); // File objects, not data URLs
  const [previews, setPreviews] = useState([]); // object URLs for rendering
  const [submitting, setSubmitting] = useState(false);
  const [error, setError] = useState('');
  const fileRef = useRef();

  useEffect(() => {
    // Build previews as object URLs — cheap to render, release on unmount
    const urls = files.map(f => URL.createObjectURL(f));
    setPreviews(urls);
    return () => urls.forEach(u => URL.revokeObjectURL(u));
  }, [files]);

  const handleFiles = (incoming) => {
    const arr = Array.from(incoming);
    setFiles(prev => [...prev, ...arr].slice(0, MAX_PHOTOS));
  };
  const removePhoto = (i) => setFiles(prev => prev.filter((_, idx) => idx !== i));

  const submit = async () => {
    if (files.length === 0 || submitting) return;
    setSubmitting(true); setError('');
    try {
      const fd = new FormData();
      fd.append('client_id', client.id);
      fd.append('log_date', date);
      fd.append('note', note.trim());
      files.forEach(f => fd.append('photos', f));
      const saved = await api.postForm('/api/meal-logs', fd);
      onSave(saved);
    } catch (e) {
      setError(e.message || 'upload failed');
      setSubmitting(false);
    }
  };

  return (
    <Modal onClose={submitting ? () => {} : onClose} size="lg">
      <div className="p-6">
        <h2 className="font-display font-bold text-3xl leading-tight">Upload on behalf</h2>
        <p className="text-neutral-500 text-sm mb-6 mt-1">Add meal photos for {client.name}. Useful while clients don't have login access yet.</p>

        <div className="grid grid-cols-2 gap-4 mb-4">
          <Field label="Log date">
            <input type="date" value={date} onChange={(e)=>setDate(e.target.value)}
              className="w-full border border-neutral-200 rounded px-3 py-2.5 focus:border-brand-orange transition"/>
          </Field>
          <div></div>
        </div>

        <Field label="Photos">
          <div>
            <div className="flex flex-wrap gap-2 mb-3 items-center">
              <button onClick={()=>fileRef.current.click()} disabled={files.length >= MAX_PHOTOS || submitting}
                className="flex items-center gap-2 border border-neutral-300 hover:border-brand-orange hover:text-brand-orange disabled:border-neutral-200 disabled:text-neutral-300 disabled:cursor-not-allowed disabled:hover:border-neutral-200 disabled:hover:text-neutral-300 text-brand-black font-display font-semibold tracking-[0.1em] text-xs px-4 py-2 rounded transition">
                <Icon.Cam className="w-4 h-4"/>UPLOAD FILES
              </button>
              <input ref={fileRef} type="file" accept="image/*" multiple className="hidden-file" onChange={(e)=>handleFiles(e.target.files)}/>
              <div className="flex-1"></div>
              <span className={`text-xs font-display font-semibold tracking-[0.1em] ${files.length >= MAX_PHOTOS ? 'text-brand-orange' : 'text-neutral-500'}`}>
                {files.length} OF {MAX_PHOTOS}
              </span>
            </div>

            {files.length === 0 ? (
              <div className="border-2 border-dashed border-neutral-300 rounded p-8 text-center">
                <p className="font-display text-neutral-500">No photos added yet</p>
                <p className="text-xs mt-1 text-neutral-400">Up to 5 meals per day. JPG/PNG, max 15MB each.</p>
              </div>
            ) : (
              <div className="grid grid-cols-5 gap-2">
                {previews.map((p,i)=>(
                  <div key={i} className="relative aspect-square bg-neutral-100 rounded overflow-hidden group">
                    <img src={p} className="w-full h-full object-cover" alt=""/>
                    <button onClick={()=>removePhoto(i)} disabled={submitting}
                      className="absolute top-1 right-1 bg-brand-black/70 hover:bg-brand-black text-white w-6 h-6 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition disabled:opacity-30">
                      <Icon.X className="w-3 h-3"/>
                    </button>
                  </div>
                ))}
              </div>
            )}
          </div>
        </Field>

        <div className="mt-4">
          <Field label="Note (optional)">
            <textarea rows={2} value={note} onChange={(e)=>setNote(e.target.value)} disabled={submitting}
              placeholder="e.g. 'felt starving at 3pm', 'traveled', 'meal prep day'…"
              className="w-full border border-neutral-200 rounded px-3 py-2.5 focus:border-brand-orange resize-none transition disabled:bg-neutral-50"/>
          </Field>
        </div>

        {error && <p className="text-red-600 text-sm mt-3 font-medium">{error}</p>}

        <div className="flex gap-3 mt-6">
          <button onClick={onClose} disabled={submitting} className="flex-1 border border-neutral-300 text-brand-black font-display font-bold tracking-[0.12em] py-3 rounded hover:bg-neutral-50 transition disabled:opacity-50">CANCEL</button>
          <button onClick={submit} disabled={files.length===0 || submitting}
            className="flex-1 bg-brand-orange hover:bg-brand-orange-dark disabled:bg-neutral-300 disabled:cursor-not-allowed text-white font-display font-bold tracking-[0.12em] py-3 rounded transition">
            {submitting ? 'UPLOADING…' : 'SAVE UPLOAD'}
          </button>
        </div>
      </div>
    </Modal>
  );
}

/* =========================================================
   RESEND LOGIN BUTTON — regenerates a PIN, emails new welcome.

   Lives in the client detail header. Three phases:
   idle → confirming → sending → result (shows new PIN + email status).

   The resend endpoint regenerates the PIN (invalidating the old one) so
   that this also serves as a "reset PIN" flow. Coach sees the new PIN
   in the result so there's always a manual fallback if delivery failed.
   ========================================================= */
function ResendLoginButton({ clientId }) {
  const [state, setState] = useState('idle'); // idle | confirming | sending | done
  const [result, setResult] = useState(null);

  const doResend = async () => {
    setState('sending');
    try {
      const r = await api.post(`/api/clients/${clientId}/resend-welcome`);
      setResult(r);
      setState('done');
    } catch (e) {
      setResult({ email_sent: false, email_error: e.message, new_pin: null });
      setState('done');
    }
  };

  if (state === 'done' && result) {
    return (
      <span className={`text-xs font-display tracking-[0.1em] px-2 py-1 rounded ${
        result.email_sent
          ? 'bg-emerald-50 text-emerald-900 border border-emerald-200'
          : 'bg-amber-50 text-amber-900 border border-amber-300'
      }`}>
        {result.email_sent
          ? <>✓ EMAILED · NEW PIN <span className="font-mono font-bold tracking-widest ml-1">{result.new_pin}</span></>
          : <>⚠ EMAIL FAILED · NEW PIN <span className="font-mono font-bold tracking-widest ml-1">{result.new_pin}</span> · text it manually</>
        }
        <button onClick={()=>{ setState('idle'); setResult(null); }}
          className="ml-2 text-neutral-400 hover:text-neutral-700">×</button>
      </span>
    );
  }

  if (state === 'confirming') {
    return (
      <span className="inline-flex items-center gap-2 text-xs">
        <span className="text-neutral-700">Generate new PIN and resend welcome?</span>
        <button onClick={doResend}
          className="font-display font-bold tracking-[0.1em] text-[11px] px-2 py-1 rounded bg-brand-orange hover:bg-brand-orange-dark text-white transition">YES</button>
        <button onClick={()=>setState('idle')}
          className="font-display font-bold tracking-[0.1em] text-[11px] px-2 py-1 rounded border border-neutral-300 text-neutral-600 hover:bg-neutral-100 transition">CANCEL</button>
      </span>
    );
  }

  return (
    <button onClick={()=>setState('confirming')} disabled={state === 'sending'}
      title="Regenerate the client's PIN and resend the welcome email"
      className="font-display font-semibold tracking-[0.1em] text-[11px] px-2.5 py-1 rounded border border-neutral-300 text-neutral-600 hover:border-brand-orange hover:text-brand-orange transition disabled:opacity-60">
      {state === 'sending' ? 'SENDING…' : 'RESEND LOGIN'}
    </button>
  );
}

    [mealLogs, client.id]
  );
  const clientCheckins = useMemo(
    () => checkins.filter(c => c.client_id === client.id).sort((a,b)=>a.week_number - b.week_number),
    [checkins, client.id]

    () => notes.filter(n => n.client_id === client.id).sort((a,b)=>b.created_at.localeCompare(a.created_at)),

function TimelineTab({ logs, client, mealSuggestions, onSaveMealSuggestion, onDeleteMealSuggestion }) {

  const [suggestingFor, setSuggestingFor] = useState(null); // log object

  if (logs.length === 0) {
    return (
      <div className="bg-white border border-dashed border-neutral-300 rounded p-12 text-center">

        <p className="text-sm text-neutral-400 mt-1">Use "Upload on behalf" to add logs for testing.</p>
      </div>
    );
  }

  const suggestionFor = (log_id) => mealSuggestions.find(s => s.meal_log_id === log_id);

  // Group by program week
  const byWeek = {};
  logs.forEach(log => {
    const days = Math.floor((new Date(log.log_date+'T00:00:00') - new Date(client.start_date+'T00:00:00')) / 86400000);
    const w = Math.max(0, Math.floor(days/7));
    (byWeek[w] ||= []).push(log);
  });
  const weeks = Object.keys(byWeek).map(Number).sort((a,b)=>b-a);

  const handleSaveSuggestion = (data) => {
    onSaveMealSuggestion(data);
    setSuggestingFor(null);
    setEditingSuggestion(null);
  };

  return (
    <>
      <div className="space-y-8">
        {weeks.map(w => (
          <div key={w}>
            <div className="flex items-center gap-3 mb-4">
              <div className="font-display font-bold text-xl">{w === 0 ? 'WEEK 0 · ONBOARDING' : `WEEK ${w}`}</div>
              <div className="flex-1 h-px bg-neutral-200"></div>
              <div className="text-[10px] font-display font-semibold tracking-[0.12em] text-neutral-500">
                {byWeek[w].length} LOG{byWeek[w].length!==1?'S':''}
              </div>
            </div>
            <div className="space-y-3">
              {byWeek[w].map(log => {
                const suggestion = suggestionFor(log.id);
                return (
                  <div key={log.id} className="bg-white border border-neutral-200 rounded p-5">
                    <div className="flex flex-col sm:flex-row items-start gap-5">
                      <div className="flex-shrink-0 sm:w-28">
                        <div className="font-display font-bold text-lg leading-tight">{displayDate(log.log_date).split(', ')[0]}</div>
                        <div className="text-sm text-neutral-500">{displayDate(log.log_date).split(', ')[1]}</div>
                        <div className="text-[10px] font-display tracking-[0.12em] text-neutral-400 mt-1">
                          {log.photos.length} PHOTO{log.photos.length!==1?'S':''}
                        </div>
                      </div>
                      <div className="flex-1 min-w-0 w-full">
                        {log.note && (
                          <div className="bg-brand-orange-light border-l-2 border-brand-orange px-3 py-2 mb-3 rounded-r">
                            <p className="text-sm text-neutral-800 italic">"{log.note}"</p>
                          </div>
                        )}
                        <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-2">
                          {log.photos.map((p,i)=>{
                            const src = photoURL(log.client_id, log.log_date, p);
                            return (
                              <button key={i} onClick={()=>setExpanded(src)}
                                className="aspect-square bg-neutral-100 rounded overflow-hidden hover:opacity-95 transition relative group">
                                <img src={src} className="w-full h-full object-cover" alt={`meal ${i+1}`}/>
                                <div className="absolute inset-0 bg-brand-black/0 group-hover:bg-brand-black/20 transition flex items-center justify-center">
                                  <Icon.Expand className="w-6 h-6 text-white opacity-0 group-hover:opacity-100 drop-shadow transition"/>
                                </div>
                              </button>
                            );
                          })}
                        </div>

                        {/* Existing suggestion block */}
                        {suggestion && (
                          <div className="mt-4 bg-emerald-50 border border-emerald-200 rounded p-4">
                            <div className="flex items-start justify-between gap-3 mb-3">
                              <div className="flex items-center gap-2">
                                <div className="w-1.5 h-1.5 rounded-full bg-emerald-600"></div>
                                <span className="font-display font-bold text-[10px] tracking-[0.12em] text-emerald-800">COACH SUGGESTION</span>
                              </div>
                              <div className="flex gap-1">
                                <button onClick={()=>setEditingSuggestion(suggestion)} title="Edit"
                                  className="text-neutral-400 hover:text-brand-black p-1 transition"><Icon.Edit className="w-3.5 h-3.5"/></button>
                                <button onClick={()=>{ if(confirm('Delete this suggestion?')) onDeleteMealSuggestion(suggestion.id); }} title="Delete"
                                  className="text-neutral-400 hover:text-red-600 p-1 transition"><Icon.Trash className="w-3.5 h-3.5"/></button>
                              </div>
                            </div>
                            {suggestion.message && (
                              <p className="text-sm text-neutral-800 leading-relaxed mb-3 italic">"{suggestion.message}"</p>
                            )}
                            <div className="space-y-2">
                              {suggestion.meals.map((m, i) => (
                                <div key={i} className="bg-white border border-emerald-100 rounded p-3">
                                  <div className="font-display font-bold text-sm leading-tight mb-1.5">{m.name}</div>
                                  <div className="flex flex-wrap gap-1">
                                    <MealPill type="protein" value={m.protein}/>
                                    {m.carb && <MealPill type="carb" value={m.carb}/>}
                                    {m.fat  && <MealPill type="fat"  value={m.fat}/>}
                                  </div>
                                </div>
                              ))}
                            </div>
                          </div>
                        )}

                        {/* Action row */}
                        {!suggestion && (
                          <div className="mt-3 flex justify-end">
                            <button onClick={()=>setSuggestingFor(log)}
                              className="flex items-center gap-1.5 text-xs font-display font-bold tracking-[0.12em] text-neutral-500 hover:text-brand-orange transition">
                              <Icon.Plus className="w-3.5 h-3.5"/>SUGGEST MEALS
                            </button>
                          </div>
                        )}
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        ))}
      </div>

      {expanded && (
        <div className="fixed inset-0 bg-brand-black/90 z-50 flex items-center justify-center p-8 cursor-zoom-out" onClick={()=>setExpanded(null)}>
          <img src={expanded} className="max-w-full max-h-full object-contain" alt=""/>
          <button className="absolute top-6 right-6 text-white/80 hover:text-white">
            <Icon.X className="w-8 h-8"/>
          </button>
        </div>
      )}

      {(suggestingFor || editingSuggestion) && (
        <MealSuggestionModal
          log={suggestingFor || logs.find(l => l.id === editingSuggestion.meal_log_id)}
          existing={editingSuggestion}
          onClose={()=>{ setSuggestingFor(null); setEditingSuggestion(null); }}
          onSave={handleSaveSuggestion}
        />
      )}
    </>
  );
}

/* =========================================================
   CHECK-INS TAB
   ========================================================= */
function CheckinsTab({ checkins }) {
  const weeks = [0,1,2,3,4,5,6];
  const byWeek = {};
  checkins.forEach(c => byWeek[c.week_number] = c);

  if (checkins.length === 0) {
    return (
      <div className="bg-white border border-dashed border-neutral-300 rounded p-12 text-center">
        <p className="font-display text-xl text-neutral-500">No check-ins submitted yet</p>
        <p className="text-sm text-neutral-400 mt-1">Weekly check-ins appear here as they come in (Phase 3).</p>
      </div>
    );
  }

  const Meter = ({v}) => (
    <div className="flex items-center gap-2">
      <div className="w-14 h-1.5 bg-neutral-100 rounded-full overflow-hidden">
        <div className="h-full bg-brand-orange" style={{width:`${v*10}%`}}></div>
      </div>
      <span className="font-display font-semibold text-sm">{v}</span>
    </div>
  );

  const fmtSteps = (n) => n >= 1000 ? `${(n/1000).toFixed(1)}k` : String(n);

  return (
    <div className="bg-white border border-neutral-200 rounded overflow-hidden overflow-x-auto">
      <table className="w-full text-sm min-w-[720px]">
        <thead>
          <tr className="bg-neutral-50 border-b border-neutral-200">
            {['Week','Weight','Step Count','Energy','Hunger','Wins / Struggles'].map(h=>(
              <th key={h} className="text-left px-4 py-3 font-display font-bold text-[10px] tracking-[0.12em] text-neutral-500">{h.toUpperCase()}</th>
            ))}
          </tr>
        </thead>
        <tbody>
          {weeks.map(w => {
            const c = byWeek[w];
            const label = w === 0
              ? <div><div className="font-display font-bold text-lg leading-none">0</div><div className="text-[9px] font-display font-bold tracking-[0.1em] text-neutral-400 mt-0.5">ONBOARDING</div></div>
              : <div className="font-display font-bold text-lg">{w}</div>;
            if (!c) return (
              <tr key={w} className="border-b border-neutral-100 last:border-0">
                <td className="px-4 py-4 text-neutral-300">{label}</td>
                <td colSpan={5} className="px-4 py-4 text-neutral-400 italic text-sm">Not submitted yet</td>
              </tr>
            );
            return (
              <tr key={w} className="border-b border-neutral-100 last:border-0 align-top">
                <td className="px-4 py-4">{label}</td>
                <td className="px-4 py-4">{c.weight_lbs}<span className="text-neutral-400 text-xs">lb</span></td>
                <td className="px-4 py-4">
                  {c.steps_avg != null
                    ? <>{fmtSteps(c.steps_avg)}<span className="text-neutral-400 text-xs"> /day</span></>
                    : <span className="text-neutral-300">—</span>}
                </td>
                <td className="px-4 py-4"><Meter v={c.energy_1_10}/></td>
                <td className="px-4 py-4"><Meter v={c.hunger_1_10}/></td>
                <td className="px-4 py-4 max-w-md">
                  {c.wins && <div className="text-xs leading-relaxed"><span className="font-display font-bold tracking-[0.1em] text-emerald-700">WINS · </span>{c.wins}</div>}
                  {c.struggles && <div className="text-xs leading-relaxed mt-1"><span className="font-display font-bold tracking-[0.1em] text-brand-orange">STRUGGLES · </span>{c.struggles}</div>}
                </td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

/* =========================================================
   QUESTIONS TAB
   ========================================================= */
function QuestionsTab({ questions, onToggleResolve }) {
  const [filter, setFilter] = useState('unresolved');

  const filtered = questions.filter(q => {
    if (filter === 'unresolved') return !q.is_resolved;
    if (filter === 'resolved')   return  q.is_resolved;
    return true;
  });
  const unresolvedCount = questions.filter(q => !q.is_resolved).length;
  const resolvedCount   = questions.filter(q =>  q.is_resolved).length;

  return (
    <div>
      <div className="bg-brand-orange-light border-l-2 border-brand-orange rounded-r p-4 mb-5 text-sm text-neutral-700">
        <span className="font-display font-bold tracking-[0.1em] text-brand-orange">HOW THIS WORKS · </span>
        Clients post questions from their home screen. You respond via text/DM as usual — this tab is just where their questions land so nothing gets lost. Mark resolved when you've addressed it.
      </div>

      <div className="flex gap-1 bg-white border border-neutral-200 rounded p-1 mb-4 w-fit">
        {[
          { id:'unresolved', label:'Open',     count:unresolvedCount },
          { id:'resolved',   label:'Resolved', count:resolvedCount },
          { id:'all',        label:'All',      count:questions.length },
        ].map(f=>(
          <button key={f.id} onClick={()=>setFilter(f.id)}
            className={`font-display font-semibold tracking-[0.1em] text-xs px-3 py-1.5 rounded transition ${filter===f.id ? 'bg-brand-black text-white' : 'text-neutral-600 hover:text-brand-black'}`}>
            {f.label.toUpperCase()} <span className={filter===f.id ? 'text-neutral-300' : 'text-neutral-400'}>({f.count})</span>
          </button>
        ))}
      </div>

      {filtered.length === 0 ? (
        <div className="bg-white border border-dashed border-neutral-300 rounded p-10 text-center">
          <p className="font-display text-lg text-neutral-500">
            {filter==='unresolved' ? 'No open questions' : filter==='resolved' ? 'Nothing resolved yet' : 'No questions yet'}
          </p>
          <p className="text-sm text-neutral-400 mt-1">
            {filter==='unresolved' ? 'Inbox zero. Nice.' : 'Questions clients post from their app will show up here.'}
          </p>
        </div>
      ) : (
        <div className="space-y-3">
          {filtered.map(q => (
            <div key={q.id}
              className={`bg-white border rounded p-5 transition ${q.is_resolved ? 'border-neutral-200 opacity-70' : 'border-neutral-200'}`}>
              <div className="flex items-start justify-between gap-4 mb-3">
                <div className="flex items-center gap-2 flex-wrap">
                  <span className="text-[10px] font-display font-bold tracking-[0.12em] text-neutral-400">
                    {displayDate(q.created_at).toUpperCase()}
                  </span>
                  {q.is_resolved ? (
                    <span className="inline-flex items-center text-[10px] font-display font-bold tracking-[0.12em] px-2 py-0.5 rounded bg-emerald-100 text-emerald-800">
                      RESOLVED
                    </span>
                  ) : (
                    <span className="inline-flex items-center text-[10px] font-display font-bold tracking-[0.12em] px-2 py-0.5 rounded bg-brand-orange-light text-brand-orange-dark">
                      OPEN
                    </span>
                  )}
                </div>
              </div>
              <p className={`leading-relaxed mb-4 ${q.is_resolved ? 'text-neutral-600' : 'text-neutral-900'}`}>
                "{q.message}"
              </p>
              <div className="flex justify-end">
                {q.is_resolved ? (
                  <button onClick={()=>onToggleResolve(q.id)}
                    className="text-xs text-neutral-500 hover:text-brand-black font-display font-semibold tracking-[0.12em] transition">
                    REOPEN
                  </button>
                ) : (
                  <button onClick={()=>onToggleResolve(q.id)}
                    className="bg-brand-black hover:bg-brand-orange text-white text-xs font-display font-bold tracking-[0.12em] px-4 py-2 rounded transition">
                    MARK RESOLVED
                  </button>
                )}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* =========================================================
   NOTES TAB
   ========================================================= */
function NotesTab({ notes, clientId, onAdd, onUpdate, onDelete }) {
  const [text, setText] = useState('');
  const [editing, setEditing] = useState(null);
  const [editText, setEditText] = useState('');
  const submit = () => { if(!text.trim()) return; onAdd(clientId, text.trim()); setText(''); };
  const saveEdit = () => { if(!editText.trim()) return; onUpdate(editing, editText.trim()); setEditing(null); };

  return (
    <div className="space-y-4">
      <div className="bg-white border border-neutral-200 rounded p-5">
        <div className="font-display font-semibold text-[10px] tracking-[0.12em] text-neutral-500 mb-2">ADD A PRIVATE NOTE</div>
        <textarea rows={3} value={text} onChange={(e)=>setText(e.target.value)}
          placeholder="Observations, patterns, things to bring up next session…"
          className="w-full border border-neutral-200 rounded px-3 py-2.5 focus:border-brand-orange resize-none transition"/>
        <div className="flex justify-end mt-2">
          <button onClick={submit} disabled={!text.trim()}
            className="bg-brand-orange hover:bg-brand-orange-dark disabled:bg-neutral-300 disabled:cursor-not-allowed text-white font-display font-bold tracking-[0.12em] text-sm px-5 py-2 rounded transition">
            SAVE NOTE
          </button>
        </div>
      </div>

      {notes.length === 0 ? (
        <div className="bg-white border border-dashed border-neutral-300 rounded p-10 text-center">
          <p className="font-display text-lg text-neutral-500">No notes yet</p>
          <p className="text-sm text-neutral-400 mt-1">Private to you. Add observations, questions for check-ins, follow-ups.</p>
        </div>
      ) : (
        <div className="space-y-3">
          {notes.map(n => (
            <div key={n.id} className="bg-white border border-neutral-200 rounded p-4">
              {editing === n.id ? (
                <>
                  <textarea rows={3} value={editText} onChange={(e)=>setEditText(e.target.value)} autoFocus
                    className="w-full border border-neutral-200 rounded px-3 py-2 focus:border-brand-orange resize-none transition"/>
                  <div className="flex justify-end gap-3 mt-2">
                    <button onClick={()=>setEditing(null)} className="text-xs text-neutral-500 hover:text-brand-black font-display font-semibold tracking-[0.12em]">CANCEL</button>
                    <button onClick={saveEdit} className="bg-brand-orange hover:bg-brand-orange-dark text-white text-xs font-display font-bold tracking-[0.12em] px-4 py-1.5 rounded">SAVE</button>
                  </div>
                </>
              ) : (
                <>
                  <div className="flex items-start justify-between gap-4">
                    <p className="text-neutral-800 whitespace-pre-wrap flex-1 leading-relaxed">{n.note}</p>
                    <div className="flex gap-1 flex-shrink-0">
                      <button onClick={()=>{ setEditing(n.id); setEditText(n.note); }} title="Edit"
                        className="text-neutral-400 hover:text-brand-black p-1.5 transition">
                        <Icon.Edit className="w-4 h-4"/>
                      </button>
                      <button onClick={()=>{ if(confirm('Delete this note?')) onDelete(n.id); }} title="Delete"
                        className="text-neutral-400 hover:text-red-600 p-1.5 transition">
                        <Icon.Trash className="w-4 h-4"/>
                      </button>
                    </div>
                  </div>
                  <div className="text-[10px] text-neutral-400 font-display font-semibold tracking-[0.12em] mt-2">{displayDate(n.created_at).toUpperCase()}</div>
                </>
              )}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* =========================================================
   EXERCISE LIBRARY
   ========================================================= */
const CATEGORY_STYLES = {
  Compound:  'bg-brand-black text-white',
  Isolation: 'bg-neutral-200 text-neutral-700',
  Accessory: 'bg-brand-orange-light text-brand-orange-dark',
};

function ExerciseLibrary({ exercises, onAdd, onUpdate, onDelete }) {
  const [filter, setFilter]     = useState('All');
  const [modalOpen, setModal]   = useState(false);
  const [editing, setEditing]   = useState(null);

  const filtered = filter==='All' ? exercises : exercises.filter(e => e.muscle_group === filter);
  const grouped = MUSCLE_GROUPS.reduce((acc, mg) => {
    const items = filtered.filter(e => e.muscle_group === mg);
    if (items.length) acc[mg] = items;
    return acc;
  }, {});

  const openAdd  = ()  => { setEditing(null); setModal(true); };
  const openEdit = (ex)=> { setEditing(ex);   setModal(true); };
  const handleSave = (data) => {
    if (editing) onUpdate(editing.id, data);
    else onAdd(data);
    setModal(false);
  };

  return (
    <>
      <div className="flex items-center justify-between gap-3 mb-5 flex-wrap">
        <div className="flex gap-1 bg-white border border-neutral-200 rounded p-1 flex-wrap">
          {['All', ...MUSCLE_GROUPS].map(mg => (
            <button key={mg} onClick={()=>setFilter(mg)}
              className={`font-display font-semibold tracking-[0.1em] text-xs px-3 py-1.5 rounded transition ${filter===mg ? 'bg-brand-black text-white' : 'text-neutral-600 hover:text-brand-black'}`}>
              {mg.toUpperCase()}
            </button>
          ))}
        </div>
        <button onClick={openAdd}
          className="bg-brand-orange hover:bg-brand-orange-dark text-white font-display font-bold tracking-[0.12em] text-sm px-4 py-2 rounded transition flex items-center gap-2">
          <Icon.Plus className="w-4 h-4"/>NEW EXERCISE
        </button>
      </div>

      {Object.keys(grouped).length === 0 ? (
        <div className="bg-white border border-dashed border-neutral-300 rounded p-12 text-center">
          <p className="font-display text-xl text-neutral-500">No exercises in this muscle group yet</p>
          <p className="text-sm text-neutral-400 mt-1">Add one with the button above.</p>
        </div>
      ) : (
        <div className="space-y-8">
          {Object.entries(grouped).map(([mg, items]) => (
            <div key={mg}>
              <div className="flex items-center gap-3 mb-3">
                <div className="font-display font-bold text-xl">{mg.toUpperCase()}</div>
                <div className="flex-1 h-px bg-neutral-200"></div>
                <div className="text-[10px] font-display font-semibold tracking-[0.12em] text-neutral-500">
                  {items.length} {items.length===1 ? 'EXERCISE' : 'EXERCISES'}
                </div>
              </div>
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
                {items.map(ex => (
                  <div key={ex.id} className="bg-white border border-neutral-200 rounded p-4 flex flex-col">
                    <div className="flex items-start justify-between gap-2 mb-2">
                      <h3 className="font-display font-bold text-base leading-tight flex-1">{ex.name}</h3>
                      <span className={`text-[9px] font-display font-bold tracking-[0.12em] px-2 py-0.5 rounded whitespace-nowrap ${CATEGORY_STYLES[ex.category] || 'bg-neutral-200 text-neutral-700'}`}>
                        {ex.category.toUpperCase()}
                      </span>
                    </div>
                    {ex.notes && <p className="text-sm text-neutral-600 leading-relaxed flex-1">{ex.notes}</p>}
                    <div className="flex justify-end gap-1 mt-3 -mb-1 -mr-1">
                      <button onClick={()=>openEdit(ex)} title="Edit"
                        className="text-neutral-400 hover:text-brand-black p-1.5 transition"><Icon.Edit className="w-4 h-4"/></button>
                      <button onClick={()=>{ if(confirm(`Delete "${ex.name}"?`)) onDelete(ex.id); }} title="Delete"
                        className="text-neutral-400 hover:text-red-600 p-1.5 transition"><Icon.Trash className="w-4 h-4"/></button>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>
      )}

      {modalOpen && <ExerciseModal existing={editing} onClose={()=>setModal(false)} onSave={handleSave}/>}
    </>
  );
}

/* =========================================================
   EXERCISE MODAL (add/edit)
   ========================================================= */
function ExerciseModal({ existing, onClose, onSave }) {
  const [form, setForm] = useState(existing || { name:'', muscle_group:'Legs', category:'Compound', notes:'' });
  const [errors, setErrors] = useState({});
  const submit = () => {
    const e = {};
    if (!form.name.trim()) e.name = 'Required';
    if (Object.keys(e).length) return setErrors(e);
    onSave(form);
  };
  return (
    <Modal onClose={onClose}>
      <div className="p-6">
        <h2 className="font-display font-bold text-3xl leading-tight">{existing ? 'Edit Exercise' : 'New Exercise'}</h2>
        <p className="text-neutral-500 text-sm mb-6 mt-1">{existing ? 'Update the exercise details below.' : 'Add a new exercise to your library.'}</p>
        <div className="space-y-4">
          <Field label="Name" error={errors.name}>
            <input value={form.name} onChange={(e)=>setForm({...form, name:e.target.value})} autoFocus placeholder="e.g. Bulgarian Split Squat"
              className="w-full border border-neutral-200 rounded px-3 py-2.5 focus:border-brand-orange transition"/>
          </Field>
          <div className="grid grid-cols-2 gap-4">
            <Field label="Muscle group">
              <select value={form.muscle_group} onChange={(e)=>setForm({...form, muscle_group:e.target.value})}
                className="w-full border border-neutral-200 rounded px-3 py-2.5 focus:border-brand-orange bg-white transition">
                {MUSCLE_GROUPS.map(mg => <option key={mg} value={mg}>{mg}</option>)}
              </select>
            </Field>
            <Field label="Category">
              <select value={form.category} onChange={(e)=>setForm({...form, category:e.target.value})}
                className="w-full border border-neutral-200 rounded px-3 py-2.5 focus:border-brand-orange bg-white transition">
                {CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
              </select>
            </Field>
          </div>
          <Field label="Coaching notes" hint="When to use this, what to watch for, progression cues.">
            <textarea rows={4} value={form.notes} onChange={(e)=>setForm({...form, notes:e.target.value})}
              placeholder="How you think about this exercise — when it goes in a program, what cues to emphasize…"
              className="w-full border border-neutral-200 rounded px-3 py-2.5 focus:border-brand-orange resize-none transition"/>
          </Field>
        </div>
        <div className="flex gap-3 mt-6">

/* =========================================================
   EXERCISE PICKER (smart slide-out panel)
   ========================================================= */
function ExercisePicker({ exercises, excludeIds = [], onPick, onClose }) {
  const [query, setQuery] = useState('');
  const [mgFilter, setMgFilter] = useState('All');
  const [catFilter, setCatFilter] = useState('All');

  useEffect(() => {
    const h = (e) => e.key === 'Escape' && onClose();
    document.addEventListener('keydown', h);
    return () => document.removeEventListener('keydown', h);
  }, [onClose]);

  const filtered = exercises.filter(e => {
    if (mgFilter  !== 'All' && e.muscle_group !== mgFilter)  return false;
    if (catFilter !== 'All' && e.category     !== catFilter) return false;
    if (query.trim()) {
      const q = query.toLowerCase();
      if (!e.name.toLowerCase().includes(q) &&
          !(e.notes || '').toLowerCase().includes(q) &&
          !e.muscle_group.toLowerCase().includes(q)) return false;
    }
    return true;
  });

  const grouped = MUSCLE_GROUPS.reduce((acc, mg) => {
    const items = filtered.filter(e => e.muscle_group === mg);
    if (items.length) acc[mg] = items;
    return acc;
  }, {});

  return (
    <div className="fixed inset-0 bg-brand-black/60 z-50 flex justify-end animate-[fade_0.15s_ease-out]" onClick={onClose}>
      <div className="bg-white w-full max-w-xl h-full shadow-2xl flex flex-col" onClick={(e)=>e.stopPropagation()}>
        {/* Header */}
        <div className="px-6 pt-6 pb-4 border-b border-neutral-200 flex-shrink-0">
          <div className="flex items-start justify-between gap-3 mb-4">
            <div>
              <h2 className="font-display font-bold text-2xl leading-none">Add Exercise</h2>
              <p className="text-neutral-500 text-sm mt-1">Filter, search, and tap to add to this slot.</p>
            </div>
            <button onClick={onClose} className="text-neutral-400 hover:text-brand-black p-1 -mr-1 transition">
              <Icon.X className="w-5 h-5"/>
            </button>
          </div>

          <div className="relative mb-3">
            <Icon.Search className="w-4 h-4 text-neutral-400 absolute left-3 top-1/2 -translate-y-1/2"/>
            <input value={query} onChange={(e)=>setQuery(e.target.value)} autoFocus
              placeholder="Search by name, muscle group, or notes…"
              className="w-full border border-neutral-200 rounded py-2.5 pl-10 pr-4 focus:outline-none focus:border-brand-orange transition"/>
          </div>

          <div className="flex flex-wrap gap-3">
            <div>
              <div className="font-display font-semibold text-[10px] tracking-[0.12em] text-neutral-500 mb-1">MUSCLE GROUP</div>
              <div className="flex flex-wrap gap-1 bg-neutral-50 border border-neutral-200 rounded p-1">
                {['All', ...MUSCLE_GROUPS].map(mg => (
                  <button key={mg} onClick={()=>setMgFilter(mg)}
                    className={`font-display font-semibold tracking-[0.1em] text-[10px] px-2.5 py-1 rounded transition ${mgFilter===mg ? 'bg-brand-black text-white' : 'text-neutral-600 hover:text-brand-black'}`}>
                    {mg.toUpperCase()}
                  </button>
                ))}
              </div>
            </div>
            <div>
              <div className="font-display font-semibold text-[10px] tracking-[0.12em] text-neutral-500 mb-1">CATEGORY</div>
              <div className="flex gap-1 bg-neutral-50 border border-neutral-200 rounded p-1">
                {['All', ...CATEGORIES].map(c => (
                  <button key={c} onClick={()=>setCatFilter(c)}
                    className={`font-display font-semibold tracking-[0.1em] text-[10px] px-2.5 py-1 rounded transition ${catFilter===c ? 'bg-brand-black text-white' : 'text-neutral-600 hover:text-brand-black'}`}>
                    {c.toUpperCase()}
                  </button>
                ))}
              </div>
            </div>
          </div>
        </div>

        {/* Results */}
        <div className="flex-1 overflow-y-auto px-6 py-4">
          {Object.keys(grouped).length === 0 ? (
            <div className="text-center py-16">
              <p className="font-display text-lg text-neutral-500">No matches</p>
              <p className="text-sm text-neutral-400 mt-1">Try clearing filters or a different search.</p>
            </div>
          ) : (
            <div className="space-y-6">
              {Object.entries(grouped).map(([mg, items]) => (
                <div key={mg}>
                  <div className="font-display font-bold text-xs tracking-[0.12em] text-neutral-500 mb-2">
                    {mg.toUpperCase()} <span className="text-neutral-400">({items.length})</span>
                  </div>
                  <div className="space-y-2">
                    {items.map(ex => {
                      const already = excludeIds.includes(ex.id);
                      return (
                        <button key={ex.id} onClick={()=>!already && onPick(ex.id)} disabled={already}
                          className={`w-full text-left border rounded p-3 transition group ${
                            already
                              ? 'border-neutral-200 bg-neutral-50 opacity-60 cursor-not-allowed'
                              : 'border-neutral-200 hover:border-brand-orange hover:bg-brand-orange-light/30'
                          }`}>
                          <div className="flex items-start justify-between gap-2 mb-1">
                            <div className="font-display font-bold text-base leading-tight flex items-center gap-2">
                              {ex.name}
                              {already && <span className="text-[9px] font-display font-bold tracking-[0.12em] text-neutral-500 bg-neutral-200 px-1.5 py-0.5 rounded">IN TEMPLATE</span>}
                            </div>
                            <span className={`text-[9px] font-display font-bold tracking-[0.12em] px-2 py-0.5 rounded whitespace-nowrap ${CATEGORY_STYLES[ex.category] || 'bg-neutral-200 text-neutral-700'}`}>
                              {ex.category.toUpperCase()}
                            </span>
                          </div>
                          {ex.notes && <p className="text-sm text-neutral-600 leading-snug">{ex.notes}</p>}
                        </button>
                      );
                    })}
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* =========================================================
   TEMPLATE EDITOR (full page)
   ========================================================= */
function TemplateEditor({ template, exercises, onSave, onBack }) {
  const isNew = !template.id;
  const [name, setName] = useState(template.name || '');
  const [description, setDescription] = useState(template.description || '');
  const [items, setItems] = useState(template.exercises || []);
  const [pickerFor, setPickerFor] = useState(null); // null | 'new' | { index: n } to swap

  const exName = (id) => exercises.find(e => e.id === id)?.name || '(removed)';
  const exMG   = (id) => exercises.find(e => e.id === id)?.muscle_group || '';
  const exCat  = (id) => exercises.find(e => e.id === id)?.category || '';

  const handlePick = (exerciseId) => {
    if (pickerFor === 'new') {
      setItems(prev => [...prev, {
        exercise_id: exerciseId, order: prev.length+1,
        sets: 3, reps: '8-10', rest_seconds: 90, rationale: '',
      }]);
    } else if (pickerFor && typeof pickerFor.index === 'number') {
      setItems(prev => prev.map((it, i) => i === pickerFor.index ? { ...it, exercise_id: exerciseId } : it));
    }
    setPickerFor(null);
  };

  const updateItem = (idx, patch) => setItems(prev => prev.map((it,i) => i===idx ? {...it, ...patch} : it));
  const removeItem = (idx) => setItems(prev => prev.filter((_,i)=>i!==idx).map((it,i)=>({...it, order:i+1})));
  const moveItem = (idx, dir) => {
    const j = idx + dir;
    if (j < 0 || j >= items.length) return;
    const next = [...items];
    [next[idx], next[j]] = [next[j], next[idx]];
    setItems(next.map((it,i)=>({...it, order:i+1})));
  };

  const save = () => {
    if (!name.trim()) { alert('Template name is required'); return; }
    onSave({ ...template, name:name.trim(), description:description.trim(), exercises:items });
  };

  const fmtRest = (s) => s >= 60 ? `${Math.floor(s/60)} min${s%60 ? ` ${s%60} sec` : ''}` : `${s} sec`;
  const fmtSetsReps = (sets, reps) => `${sets} ${sets===1?'set':'sets'} of ${reps} reps`;

  return (
    <div className="max-w-5xl mx-auto px-6 py-6">
      <button onClick={onBack} className="text-neutral-500 hover:text-brand-black text-xs font-display font-semibold tracking-[0.12em] transition flex items-center gap-1.5 mb-5">
        <Icon.Arrow className="w-3.5 h-3.5"/>ALL TEMPLATES
      </button>

      <div className="flex items-start justify-between gap-4 mb-6 flex-wrap">
        <div>
          <div className="font-display font-semibold text-[10px] tracking-[0.12em] text-brand-orange mb-1">
            {isNew ? 'NEW TEMPLATE' : 'EDIT TEMPLATE'}
          </div>
          <h1 className="font-display font-bold text-4xl leading-none">{name || 'Untitled template'}</h1>
        </div>
        <button onClick={save}
          className="bg-brand-orange hover:bg-brand-orange-dark text-white font-display font-bold tracking-[0.12em] px-6 py-2.5 rounded transition">
          SAVE TEMPLATE
        </button>
      </div>

      <div className="bg-white border border-neutral-200 rounded p-5 mb-6 space-y-4">
        <Field label="Template name">
          <input value={name} onChange={(e)=>setName(e.target.value)} placeholder="e.g. Upper Body — Primer"
            className="w-full border border-neutral-200 rounded px-3 py-2.5 focus:border-brand-orange transition"/>
        </Field>
        <Field label="Description" hint="When to use this template — training phase, frequency, client profile.">
          <textarea rows={2} value={description} onChange={(e)=>setDescription(e.target.value)}
            placeholder="Who this is for and when it goes in the program…"
            className="w-full border border-neutral-200 rounded px-3 py-2.5 focus:border-brand-orange resize-none transition"/>
        </Field>
      </div>

      <div className="flex items-center gap-3 mb-4">
        <div className="font-display font-bold text-xl">EXERCISES IN ORDER</div>
        <div className="flex-1 h-px bg-neutral-200"></div>
        <div className="text-[10px] font-display font-semibold tracking-[0.12em] text-neutral-500">
          {items.length} {items.length===1?'MOVEMENT':'MOVEMENTS'}
        </div>
      </div>

      {items.length === 0 ? (
        <div className="bg-white border border-dashed border-neutral-300 rounded p-10 text-center mb-4">
          <p className="font-display text-lg text-neutral-500">No exercises yet</p>
          <p className="text-sm text-neutral-400 mt-1">Add exercises below and explain why each sits where it does.</p>
        </div>
      ) : (
        <div className="space-y-3 mb-4">
          {items.map((it, idx) => (
            <div key={idx} className="bg-white border border-neutral-200 rounded p-4">
              <div className="flex items-start gap-3">
                <div className="flex flex-col items-center gap-1 pt-1 flex-shrink-0">
                  <button onClick={()=>moveItem(idx, -1)} disabled={idx===0} title="Move up"
                    className="text-neutral-400 hover:text-brand-black disabled:opacity-30 disabled:cursor-not-allowed p-0.5 transition">
                    <Icon.ChevUp className="w-4 h-4"/>
                  </button>
                  <div className="w-7 h-7 bg-brand-black text-white rounded-full flex items-center justify-center font-display font-bold text-sm">{idx+1}</div>
                  <button onClick={()=>moveItem(idx, 1)} disabled={idx===items.length-1} title="Move down"
                    className="text-neutral-400 hover:text-brand-black disabled:opacity-30 disabled:cursor-not-allowed p-0.5 transition">
                    <Icon.ChevDn className="w-4 h-4"/>
                  </button>
                </div>

                <div className="flex-1 min-w-0 space-y-3">
                  <div className="flex items-start justify-between gap-3">
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center gap-2 flex-wrap">
                        <h3 className="font-display font-bold text-lg leading-tight">{exName(it.exercise_id)}</h3>
                        {exCat(it.exercise_id) && (
                          <span className={`text-[9px] font-display font-bold tracking-[0.12em] px-2 py-0.5 rounded whitespace-nowrap ${CATEGORY_STYLES[exCat(it.exercise_id)] || 'bg-neutral-200 text-neutral-700'}`}>
                            {exCat(it.exercise_id).toUpperCase()}
                          </span>
                        )}
                      </div>
                      <div className="flex items-center gap-3 mt-1">
                        {exMG(it.exercise_id) && (
                          <div className="text-[10px] font-display font-semibold tracking-[0.12em] text-neutral-500">
                            {exMG(it.exercise_id).toUpperCase()}
                          </div>
                        )}
                        <button onClick={()=>setPickerFor({ index: idx })}
                          className="text-[10px] font-display font-semibold tracking-[0.12em] text-neutral-500 hover:text-brand-orange transition">
                          CHANGE EXERCISE
                        </button>
                      </div>
                    </div>
                    <button onClick={()=>removeItem(idx)} title="Remove" className="text-neutral-400 hover:text-red-600 p-1.5 flex-shrink-0 transition">
                      <Icon.Trash className="w-4 h-4"/>
                    </button>
                  </div>

                  <div className="bg-neutral-50 border border-neutral-200 rounded p-3">
                    <div className="font-display font-semibold text-[10px] tracking-[0.12em] text-neutral-500 mb-2">
                      PRESCRIPTION · <span className="text-brand-black">{fmtSetsReps(it.sets, it.reps)}, {fmtRest(it.rest_seconds||0)} rest</span>
                    </div>
                    <div className="grid grid-cols-3 gap-2">
                      <Field label="Sets">
                        <input type="number" min="1" value={it.sets} onChange={(e)=>updateItem(idx, { sets:parseInt(e.target.value)||0 })}
                          className="w-full border border-neutral-200 rounded px-2 py-1.5 focus:border-brand-orange transition"/>
                      </Field>
                      <Field label="Reps" hint="e.g. 8, 8-10, AMRAP">
                        <input value={it.reps} onChange={(e)=>updateItem(idx, { reps:e.target.value })} placeholder="8-10"
                          className="w-full border border-neutral-200 rounded px-2 py-1.5 focus:border-brand-orange transition"/>
                      </Field>
                      <Field label="Rest (seconds)">
                        <input type="number" min="0" step="15" value={it.rest_seconds} onChange={(e)=>updateItem(idx, { rest_seconds:parseInt(e.target.value)||0 })}
                          className="w-full border border-neutral-200 rounded px-2 py-1.5 focus:border-brand-orange transition"/>
                      </Field>
                    </div>
                  </div>

                  <Field label="Why here?" hint="The reasoning this exercise goes in this position.">
                    <textarea rows={2} value={it.rationale} onChange={(e)=>updateItem(idx, { rationale:e.target.value })}
                      placeholder="What this exercise does in this slot — fresh CNS, balances the push, finisher, etc."
                      className="w-full border border-neutral-200 rounded px-3 py-2 focus:border-brand-orange resize-none text-sm transition"/>
                  </Field>
                </div>
              </div>
            </div>
          ))}
        </div>
      )}

      <button onClick={()=>setPickerFor('new')} disabled={exercises.length === 0}
        className="w-full border-2 border-dashed border-neutral-300 hover:border-brand-orange hover:text-brand-orange disabled:opacity-50 disabled:cursor-not-allowed text-neutral-500 font-display font-bold tracking-[0.12em] py-4 rounded transition flex items-center justify-center gap-2">
        <Icon.Plus className="w-4 h-4"/>ADD EXERCISE
      </button>

      {exercises.length === 0 && (
        <p className="text-xs text-neutral-500 text-center mt-2">Add exercises to your library first.</p>
      )}

      {pickerFor && (
        <ExercisePicker
          exercises={exercises}
          excludeIds={pickerFor === 'new' ? items.map(it => it.exercise_id) : items.filter((_,i)=>i !== pickerFor.index).map(it => it.exercise_id)}
          onPick={handlePick}
          onClose={()=>setPickerFor(null)}
        />
      )}
    </div>
  );
}

/* =========================================================

   ========================================================= */
function ProgramEditor({ program, templates, onSave, onBack }) {
  const isNew = !program.id;
  const [name, setName] = useState(program.name || '');
  const [description, setDescription] = useState(program.description || '');
  const [notes, setNotes] = useState(program.notes || '');
  const [days, setDays] = useState(program.days || []);

  const tpl = (id) => templates.find(t => t.id === id);
  const tplName = (id) => tpl(id)?.name || '(removed)';

  const addDay = () => {
    const first = templates[0];
    if (!first) return;
    setDays(prev => [...prev, { template_id: first.id, label: first.name }]);
  };
  const updateDay = (idx, patch) => setDays(prev => prev.map((d, i) => i === idx ? { ...d, ...patch } : d));
  const removeDay = (idx) => setDays(prev => prev.filter((_, i) => i !== idx));
  const moveDay = (idx, dir) => {
    const j = idx + dir;
    if (j < 0 || j >= days.length) return;
    const next = [...days];
    [next[idx], next[j]] = [next[j], next[idx]];
    setDays(next);
  };

  const save = () => {
    if (!name.trim()) { alert('Program name is required'); return; }
    onSave({ ...program, name:name.trim(), description:description.trim(), notes:notes.trim(), days });
  };

  return (
    <div className="max-w-5xl mx-auto px-6 py-6">
      <button onClick={onBack} className="text-neutral-500 hover:text-brand-black text-xs font-display font-semibold tracking-[0.12em] transition flex items-center gap-1.5 mb-5">
        <Icon.Arrow className="w-3.5 h-3.5"/>ALL PROGRAMS
      </button>

/* =========================================================
   MEAL BUILDER — core component
   Reusable: used in standalone tab AND in the reply-to-upload modal.
   ========================================================= */
const MACRO_COLORS = {
  protein: { dot:'bg-emerald-500',  text:'text-emerald-700',  border:'border-emerald-500', bg:'bg-emerald-50',  chipSel:'bg-emerald-100 border-emerald-500 text-emerald-800' },
  carb:    { dot:'bg-brand-orange', text:'text-brand-orange', border:'border-brand-orange',bg:'bg-brand-orange-light', chipSel:'bg-brand-orange-light border-brand-orange text-brand-orange-dark' },
  fat:     { dot:'bg-violet-500',   text:'text-violet-700',   border:'border-violet-500',  bg:'bg-violet-50',    chipSel:'bg-violet-100 border-violet-500 text-violet-800' },
};

function MealChip({ type, label, selected, onClick }) {
  const c = MACRO_COLORS[type];
  return (
    <button onClick={onClick}
      className={`text-xs font-display font-semibold tracking-[0.05em] px-3 py-1.5 rounded-full border transition ${
        selected ? c.chipSel : 'bg-white border-neutral-200 text-neutral-600 hover:border-neutral-400'
      }`}>
      {label}
    </button>
  );
}

function MealPill({ type, value }) {
  const c = MACRO_COLORS[type];
  return (
    <span className={`inline-flex items-center text-xs font-display font-semibold tracking-[0.05em] px-2.5 py-1 rounded-full ${c.bg} ${c.text}`}>
      {value}
    </span>
  );
}

function lookupNote(type, label) {
  return (MEAL_INGREDIENTS[type].find(o => o.label === label) || {}).note || '';
}

function autoMealName(state) {
  if (!state.protein) return '';
  if (state.carb) return `${state.protein} & ${state.carb} Bowl`;
  return `${state.protein} Bowl`;
}

/**
 * MealBuilder
 *  - value:     current meals[] array
 *  - onChange:  (nextMeals) => void
 *  - compact:   if true, render tighter for modal use
 */
function MealBuilder({ value, onChange, compact = false }) {
  const [state, setState]   = useState({ protein:null, carb:null, fat:null });
  const [mealName, setName] = useState('');

  const toggle = (type, label) => {
    setState(prev => ({ ...prev, [type]: prev[type] === label ? null : label }));
  };
  const addMeal = () => {
    if (!state.protein) return;
    const name = mealName.trim() || autoMealName(state);
    const next = [...value, {
      name,
      protein: state.protein,
      carb: state.carb,
      fat: state.fat,
    }];
    onChange(next);
    setState({ protein:null, carb:null, fat:null });
    setName('');
  };
  const removeMeal = (i) => onChange(value.filter((_, idx) => idx !== i));

  const Section = ({ type, title }) => {
    const c = MACRO_COLORS[type];
    return (
      <div>
        <div className="flex items-center gap-2 mb-2">
          <div className={`w-2 h-2 rounded-full ${c.dot}`}></div>
          <span className={`font-display font-bold text-[11px] tracking-[0.12em] ${c.text}`}>
            {title.toUpperCase()}{type==='protein' && <span className="text-red-500 ml-0.5">*</span>}
          </span>
        </div>
        <div className="flex flex-wrap gap-1.5">
          {MEAL_INGREDIENTS[type].map(opt => (
            <MealChip key={opt.label} type={type} label={opt.label}
              selected={state[type] === opt.label} onClick={()=>toggle(type, opt.label)}/>
          ))}
        </div>
      </div>
    );
  };

  return (
    <div className={compact ? '' : 'max-w-3xl mx-auto'}>
      <div className="bg-white border border-neutral-200 rounded p-5 mb-4 space-y-4">
        <Section type="protein" title="Protein"/>
        <div className="h-px bg-neutral-100"></div>
        <Section type="carb"    title="Carb"/>
        <div className="h-px bg-neutral-100"></div>
        <Section type="fat"     title="Fat"/>

        <div className="bg-neutral-50 border border-neutral-200 rounded p-3">
          <div className="font-display font-bold text-[10px] tracking-[0.12em] text-neutral-500 mb-2">MEAL PREVIEW</div>
          {!state.protein ? (
            <p className="text-sm text-neutral-400 italic">Select a protein to preview this meal.</p>
          ) : (
            <div className="flex flex-wrap gap-1.5">
              <MealPill type="protein" value={state.protein}/>
              {state.carb && <MealPill type="carb" value={state.carb}/>}
              {state.fat  && <MealPill type="fat"  value={state.fat}/>}
            </div>
          )}
        </div>

        <Field label="Meal name" hint="Optional — auto-generated if blank.">
          <input value={mealName} onChange={(e)=>setName(e.target.value)}
            placeholder={state.protein ? autoMealName(state) : "e.g. Post-Workout Bowl"}
            className="w-full border border-neutral-200 rounded px-3 py-2 focus:border-brand-orange transition"/>
        </Field>

        <button onClick={addMeal} disabled={!state.protein}
          className="w-full bg-brand-orange hover:bg-brand-orange-dark disabled:bg-neutral-200 disabled:text-neutral-400 disabled:cursor-not-allowed text-white font-display font-bold tracking-[0.12em] py-3 rounded transition flex items-center justify-center gap-2">
          <Icon.Plus className="w-4 h-4"/>ADD MEAL TO PLAN
        </button>
      </div>

      {value.length > 0 && (
        <div className="mb-4">
          <div className="font-display font-bold text-[10px] tracking-[0.12em] text-neutral-500 mb-2">
            MEAL PLAN · {value.length} {value.length===1?'MEAL':'MEALS'}
          </div>
          <div className="space-y-2">
            {value.map((m, i) => (
              <div key={i} className="bg-white border border-neutral-200 rounded p-3 flex items-start justify-between gap-3">
                <div className="min-w-0 flex-1">
                  <div className="font-display font-bold text-sm leading-tight">{m.name}</div>
                  <div className="flex flex-wrap gap-1 mt-1.5">
                    <MealPill type="protein" value={m.protein}/>
                    {m.carb && <MealPill type="carb" value={m.carb}/>}
                    {m.fat  && <MealPill type="fat"  value={m.fat}/>}
                  </div>
                </div>
                <button onClick={()=>removeMeal(i)} title="Remove" className="text-neutral-400 hover:text-red-600 p-1 flex-shrink-0 transition">
                  <Icon.X className="w-4 h-4"/>
                </button>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

/* =========================================================
   MEAL BUILDER — standalone page (Meal Builder nav tab)
   ========================================================= */
function MealBuilderView() {
  const [meals, setMeals] = useState([]);
  const [copied, setCopied] = useState(false);

  const buildCopyText = () => {
    if (!meals.length) return '';
    const lines = ['=== HORMONE ALIGNED MEAL PLAN ===', ''];
    meals.forEach((m, i) => {
      lines.push(`MEAL ${i+1}: ${m.name.toUpperCase()}`);
      const pNote = lookupNote('protein', m.protein);
      lines.push(`  Protein : ${m.protein}${pNote ? ' ('+pNote+')' : ''}`);
      if (m.carb) {
        const cNote = lookupNote('carb', m.carb);
        lines.push(`  Carb    : ${m.carb}${cNote ? ' ('+cNote+')' : ''}`);
      }
      if (m.fat) {
        const fNote = lookupNote('fat', m.fat);
        lines.push(`  Fat     : ${m.fat}${fNote ? ' ('+fNote+')' : ''}`);
      }
      lines.push('');
    });
    lines.push('--- Derek Fowler / The Buffalo Method ---');
    return lines.join('\n');
  };

  const copyToClipboard = () => {
    const text = buildCopyText();
    navigator.clipboard.writeText(text).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    });
  };

  return (
    <div className="max-w-3xl mx-auto px-6 py-8">
      <div className="mb-6">
        <div className="font-display font-bold text-[10px] tracking-[0.2em] text-brand-orange mb-2">FREE THE MACRO</div>
        <h1 className="font-display font-bold text-4xl leading-none">Meal Builder</h1>
        <p className="text-neutral-600 mt-2 text-sm">Build hormone-aligned meals from approved building blocks. Use the standalone tool for planning or reply to a client's meal upload with suggestions directly.</p>
      </div>

      <MealBuilder value={meals} onChange={setMeals}/>

      {meals.length > 0 && (
        <div className="bg-white border border-neutral-200 rounded p-5">
          <div className="font-display font-bold text-[10px] tracking-[0.12em] text-neutral-500 mb-3">
            OUTPUT · COPY INTO ANY APP
          </div>
          <pre className="bg-neutral-900 text-neutral-100 font-mono text-xs leading-relaxed rounded p-4 overflow-x-auto mb-3 whitespace-pre-wrap">{buildCopyText()}</pre>
          <div className="flex gap-2">
            <button onClick={copyToClipboard}
              className="flex-1 bg-brand-black hover:bg-brand-orange text-white font-display font-bold tracking-[0.12em] text-sm py-3 rounded transition">
              {copied ? '✓ COPIED!' : 'COPY TO CLIPBOARD'}
            </button>
            <button onClick={()=>setMeals([])}
              className="border border-neutral-300 text-brand-black hover:bg-neutral-50 font-display font-bold tracking-[0.12em] text-sm px-5 py-3 rounded transition">
              CLEAR ALL
            </button>
          </div>
        </div>
      )}

      {meals.length === 0 && (
        <div className="bg-brand-orange-light/40 border border-brand-orange/30 rounded p-4 text-sm text-neutral-700">
          <strong className="font-display tracking-[0.05em]">Tip:</strong> To suggest meals to a specific client, go to their profile → Timeline tab → hit <em>Suggest Meals</em> on any upload. Suggestions get attached to that log and show up right next to their photos.
        </div>
      )}
    </div>
  );
}

/* =========================================================
   MEAL SUGGESTION MODAL
