/* =========================================================
   API HELPERS
   Wraps fetch() so every call throws on non-2xx and parses JSON.
   ========================================================= */
const api = {
  async get(path) {
    const r = await fetch(path, { credentials: 'same-origin' });
    if (!r.ok) throw new Error(`GET ${path} ${r.status}`);
    return r.json();
  },
  async post(path, body) {
    const r = await fetch(path, {
      method: 'POST',
      credentials: 'same-origin',
      headers: { 'Content-Type': 'application/json' },
      body: body ? JSON.stringify(body) : undefined,
    });
    if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.error || `POST ${path} ${r.status}`); }
    return r.json();
  },
  async patch(path, body) {
    const r = await fetch(path, {
      method: 'PATCH',
      credentials: 'same-origin',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.error || `PATCH ${path} ${r.status}`); }
    return r.json();
  },
  async del(path) {
    const r = await fetch(path, { method: 'DELETE', credentials: 'same-origin' });
    if (!r.ok) throw new Error(`DELETE ${path} ${r.status}`);
    return r.json();
  },
  async postForm(path, formData) {
    const r = await fetch(path, { method: 'POST', credentials: 'same-origin', body: formData });
    if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.error || `POST ${path} ${r.status}`); }
    return r.json();
  },
};

/* =========================================================
   CONFIG + UTILITIES
   ========================================================= */
const TODAY = new Date();
TODAY.setHours(12, 0, 0, 0);

const fmtDate = (d) => {
  const dt = typeof d === 'string' ? new Date(d + 'T00:00:00') : new Date(d);
  const y = dt.getFullYear(), m = String(dt.getMonth()+1).padStart(2,'0'), day = String(dt.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
};
const daysAgo = (n) => { const d = new Date(TODAY); d.setDate(d.getDate() - n); return fmtDate(d); };
const displayDate = (s) => {
  const d = new Date(s + 'T00:00:00');
  return d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
};
const weekOfProgram = (start) => {
  const days = Math.floor((TODAY - new Date(start+'T00:00:00')) / 86400000);
  return Math.max(0, Math.min(6, Math.floor(days/7)));
};
const MAX_PHOTOS = 5;
const daysSinceLastUpload = (logs) => {
  if (!logs.length) return Infinity;
  const last = [...logs].sort((a,b)=>b.log_date.localeCompare(a.log_date))[0].log_date;
  return Math.floor((TODAY - new Date(last+'T00:00:00')) / 86400000);
};

function Modal({ onClose, children, size='md' }) {
  useEffect(() => {
    const h = (e) => e.key === 'Escape' && onClose();
    document.addEventListener('keydown', h);
    return () => document.removeEventListener('keydown', h);
  }, [onClose]);
  const sizes = { sm:'max-w-md', md:'max-w-lg', lg:'max-w-2xl', xl:'max-w-4xl' };
  return (
    <div className="fixed inset-0 bg-brand-black/60 z-50 flex items-center justify-center p-4 animate-[fade_0.15s_ease-out]" onClick={onClose}>
      <div className={`bg-white rounded-lg shadow-2xl w-full ${sizes[size]} max-h-[90vh] overflow-y-auto`} onClick={(e)=>e.stopPropagation()}>
        {children}
      </div>
    </div>
  );
}

/* =========================================================
   LOGIN
   ========================================================= */
function CoachLogin({ onLogin }) {
  const [pin, setPin] = useState('');
  const [error, setError] = useState('');
  const [submitting, setSubmitting] = useState(false);
  const submit = async () => {
    if (!pin || submitting) return;
    setSubmitting(true); setError('');
    try {
      await api.post('/api/coach-login', { pin });
      onLogin();
    } catch (e) {
      setError('Invalid PIN');
      setPin('');
      setSubmitting(false);
    }
  };
  return (
    <div className="min-h-screen flex items-center justify-center bg-brand-black px-4">
      <div className="w-full max-w-sm">
        <div className="text-center mb-10">
          <div className="inline-flex items-center gap-2">
            <div className="w-2.5 h-2.5 bg-brand-orange"></div>
            <div className="font-display font-bold text-white text-xs tracking-[0.25em]">THE BUFFALO METHOD</div>
          </div>
          <h1 className="font-display font-bold text-white text-5xl mt-8 leading-none">COACH<br/>DASHBOARD</h1>
          <p className="text-neutral-400 mt-4 text-sm">Enter your admin PIN</p>
        </div>
        <div className="space-y-4">
          <input
            type="password" inputMode="numeric" maxLength={8} value={pin}
            onChange={(e)=>{ setPin(e.target.value.replace(/\D/g,'')); setError(''); }}
            onKeyDown={(e)=> e.key==='Enter' && submit()}
            disabled={submitting}
            placeholder="••••"
            className="w-full bg-neutral-900 border border-neutral-700 focus:border-brand-orange text-white text-center font-display text-4xl tracking-[0.5em] py-5 rounded transition disabled:opacity-50"
            autoFocus
          />
          {error && <p className="text-red-400 text-sm text-center font-medium">{error}</p>}
          <button onClick={submit} disabled={submitting || !pin}
            className="w-full bg-brand-orange hover:bg-brand-orange-dark disabled:bg-neutral-700 disabled:cursor-not-allowed text-white font-display font-bold text-xl tracking-[0.12em] py-4 rounded transition-colors">
            {submitting ? 'SIGNING IN…' : 'SIGN IN'}
          </button>
        </div>
      </div>
    </div>
  );
}

/* =========================================================
   HEADER
   ========================================================= */
function DashboardHeader({ onLogout, currentSection, onNavigate, newLeadsCount = 0 }) {
  const navItems = [
    { id:'clients',      label:'CLIENTS' },
    { id:'leads',        label:'LEADS'        },
    { id:'workouts',     label:'WORKOUTS' },
    { id:'meal-builder', label:'MEAL BUILDER' },
  ];
  const [backupState, setBackupState] = useState('idle'); // idle | running | done | error
  const runBackupNow = async () => {
    if (backupState === 'running') return;
    setBackupState('running');
    try {
      const res = await api.post('/api/backup/run');
      console.log('Backup summary:', res.summary);
      setBackupState('done');
      setTimeout(() => setBackupState('idle'), 3000);
    } catch (e) {
      setBackupState('error');
      alert('Backup failed: ' + e.message);
      setTimeout(() => setBackupState('idle'), 3000);
    }
  };
  const backupLabel = {
    idle:    'BACKUP NOW',
    running: 'BACKING UP…',
    done:    '✓ EMAILED',
    error:   '✗ FAILED',
  }[backupState];
  return (
    <header className="bg-brand-black text-white sticky top-0 z-40">
      <div className="max-w-7xl mx-auto px-6 py-3 flex items-center justify-between gap-6">
        <button onClick={()=>onNavigate('clients')} className="flex items-center gap-2 hover:opacity-80 transition flex-shrink-0">
          <div className="w-2.5 h-2.5 bg-brand-orange"></div>
          <span className="font-display font-bold text-xs tracking-[0.25em] hidden sm:inline">THE BUFFALO METHOD</span>
        </button>

        <nav className="flex gap-1">
          {navItems.map(item => (
            <button key={item.id} onClick={()=>onNavigate(item.id)}
              className={`font-display font-bold tracking-[0.12em] text-xs px-4 py-1.5 rounded transition flex items-center gap-1.5 ${currentSection===item.id ? 'bg-white text-brand-black' : 'text-neutral-300 hover:text-white hover:bg-neutral-800'}`}>
              {item.label}
              {item.id === 'leads' && newLeadsCount > 0 && (
                <span className={`inline-flex items-center justify-center min-w-[18px] h-[18px] px-1 rounded-full text-[10px] font-bold ${currentSection===item.id ? 'bg-brand-orange text-white' : 'bg-brand-orange text-white'}`}>
                  {newLeadsCount}
                </span>
              )}
            </button>
          ))}
        </nav>

        <div className="flex items-center gap-4 flex-shrink-0">
          <button onClick={runBackupNow} disabled={backupState === 'running'}
            title="Trigger an immediate backup email"
            className={`text-xs font-display font-semibold tracking-[0.12em] transition hidden md:inline ${
              backupState === 'done'  ? 'text-emerald-400' :
              backupState === 'error' ? 'text-red-400' :
              'text-neutral-400 hover:text-white'
            }`}>
            {backupLabel}
          </button>
          <a href="#ham-app" onClick={(e)=>e.preventDefault()} title="Open Hormone Aligned Nutrition (free app)"
             className="text-neutral-400 hover:text-white text-xs font-display font-semibold tracking-[0.12em] transition hidden md:flex items-center gap-1.5">
            <span>HAM APP</span>
            <Icon.Ext className="w-3 h-3"/>
          </a>
          <button onClick={onLogout} className="text-neutral-300 hover:text-white text-xs font-display font-semibold tracking-[0.12em] transition">
            SIGN OUT
          </button>
        </div>
      </div>
    </header>
  );
}

   ========================================================= */
function ClientListView({ clients, mealLogs, onSelectClient, onAddClient }) {
  const [search, setSearch] = useState('');
  const [filter, setFilter] = useState('all');

  const rows = clients
    .map(c => {
      const logs = mealLogs.filter(l => l.client_id === c.id);
      const since = daysSinceLastUpload(logs);
      return { ...c, _since: since, _week: weekOfProgram(c.start_date), _overdue: c.status==='active' && since >= 2 };
    })
    .filter(c => filter==='all' || c.status===filter)
    .filter(c => !search || c.name.toLowerCase().includes(search.toLowerCase()) || c.email.toLowerCase().includes(search.toLowerCase()));

  const activeCount = clients.filter(c=>c.status==='active').length;
  const overdueCount = clients.filter(c=>{
    if (c.status!=='active') return false;
    return daysSinceLastUpload(mealLogs.filter(l=>l.client_id===c.id)) >= 2;
  }).length;

  return (
    <div className="max-w-7xl mx-auto px-6 py-8">
      <div className="flex items-start justify-between mb-8 gap-4">
        <div>
          <h1 className="font-display font-bold text-4xl leading-none">Clients</h1>
          <p className="text-neutral-600 mt-2 text-sm">
            {activeCount} active
            {' · '}
            {overdueCount > 0
              ? <span className="text-brand-orange font-semibold">{overdueCount} need attention</span>
              : <span className="text-emerald-700 font-semibold">all up to date</span>
            }
          </p>
        </div>
        <button onClick={onAddClient}
          className="bg-brand-orange hover:bg-brand-orange-dark text-white font-display font-bold tracking-[0.12em] px-5 py-2.5 rounded transition flex items-center gap-2">
          <Icon.Plus className="w-4 h-4"/>ADD CLIENT
        </button>
      </div>

      <div className="flex items-center gap-3 mb-5 flex-wrap">
        <div className="flex-1 min-w-[220px] relative">
          <Icon.Search className="w-4 h-4 text-neutral-400 absolute left-3 top-1/2 -translate-y-1/2"/>
          <input value={search} onChange={(e)=>setSearch(e.target.value)} placeholder="Search by name or email"
            className="w-full bg-white border border-neutral-200 rounded py-2.5 pl-10 pr-4 focus:border-brand-orange transition"/>
        </div>
        <div className="flex gap-1 bg-white border border-neutral-200 rounded p-1">
          {['all','active','completed','paused'].map(f=>(

/* =========================================================
   UPLOAD ON BEHALF MODAL
   ========================================================= */
function UploadModal({ client, onClose, onSave }) {
  const [date, setDate] = useState(fmtDate(TODAY));
  const [note, setNote] = useState('');
  const [files, setFiles] = useState([]); // File objects, not data URLs
  const [previews, setPreviews] = useState([]); // object URLs for rendering
  const [submitting, setSubmitting] = useState(false);
  const [error, setError] = useState('');
  const fileRef = useRef();

  useEffect(() => {
    // Build previews as object URLs — cheap to render, release on unmount
    const urls = files.map(f => URL.createObjectURL(f));
    setPreviews(urls);
    return () => urls.forEach(u => URL.revokeObjectURL(u));
  }, [files]);

  const handleFiles = (incoming) => {
    const arr = Array.from(incoming);
    setFiles(prev => [...prev, ...arr].slice(0, MAX_PHOTOS));
  };
  const removePhoto = (i) => setFiles(prev => prev.filter((_, idx) => idx !== i));

  const submit = async () => {
    if (files.length === 0 || submitting) return;
    setSubmitting(true); setError('');
    try {
      const fd = new FormData();
      fd.append('client_id', client.id);
      fd.append('log_date', date);
      fd.append('note', note.trim());
      files.forEach(f => fd.append('photos', f));
      const saved = await api.postForm('/api/meal-logs', fd);
      onSave(saved);
    } catch (e) {
      setError(e.message || 'upload failed');
      setSubmitting(false);
    }
  };

  return (
    <Modal onClose={submitting ? () => {} : onClose} size="lg">
      <div className="p-6">
        <h2 className="font-display font-bold text-3xl leading-tight">Upload on behalf</h2>
        <p className="text-neutral-500 text-sm mb-6 mt-1">Add meal photos for {client.name}. Useful while clients don't have login access yet.</p>

        <div className="grid grid-cols-2 gap-4 mb-4">
          <Field label="Log date">
            <input type="date" value={date} onChange={(e)=>setDate(e.target.value)}
              className="w-full border border-neutral-200 rounded px-3 py-2.5 focus:border-brand-orange transition"/>
          </Field>
          <div></div>
        </div>

        <Field label="Photos">
          <div>
            <div className="flex flex-wrap gap-2 mb-3 items-center">
              <button onClick={()=>fileRef.current.click()} disabled={files.length >= MAX_PHOTOS || submitting}
                className="flex items-center gap-2 border border-neutral-300 hover:border-brand-orange hover:text-brand-orange disabled:border-neutral-200 disabled:text-neutral-300 disabled:cursor-not-allowed disabled:hover:border-neutral-200 disabled:hover:text-neutral-300 text-brand-black font-display font-semibold tracking-[0.1em] text-xs px-4 py-2 rounded transition">
                <Icon.Cam className="w-4 h-4"/>UPLOAD FILES
              </button>
              <input ref={fileRef} type="file" accept="image/*" multiple className="hidden-file" onChange={(e)=>handleFiles(e.target.files)}/>
              <div className="flex-1"></div>
              <span className={`text-xs font-display font-semibold tracking-[0.1em] ${files.length >= MAX_PHOTOS ? 'text-brand-orange' : 'text-neutral-500'}`}>
                {files.length} OF {MAX_PHOTOS}
              </span>
            </div>

            {files.length === 0 ? (
              <div className="border-2 border-dashed border-neutral-300 rounded p-8 text-center">
                <p className="font-display text-neutral-500">No photos added yet</p>
                <p className="text-xs mt-1 text-neutral-400">Up to 5 meals per day. JPG/PNG, max 15MB each.</p>
              </div>
            ) : (
              <div className="grid grid-cols-5 gap-2">
                {previews.map((p,i)=>(
                  <div key={i} className="relative aspect-square bg-neutral-100 rounded overflow-hidden group">
                    <img src={p} className="w-full h-full object-cover" alt=""/>
                    <button onClick={()=>removePhoto(i)} disabled={submitting}
                      className="absolute top-1 right-1 bg-brand-black/70 hover:bg-brand-black text-white w-6 h-6 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition disabled:opacity-30">
                      <Icon.X className="w-3 h-3"/>
                    </button>
                  </div>
                ))}
              </div>
            )}
          </div>
        </Field>

        <div className="mt-4">
          <Field label="Note (optional)">
            <textarea rows={2} value={note} onChange={(e)=>setNote(e.target.value)} disabled={submitting}
              placeholder="e.g. 'felt starving at 3pm', 'traveled', 'meal prep day'…"
              className="w-full border border-neutral-200 rounded px-3 py-2.5 focus:border-brand-orange resize-none transition disabled:bg-neutral-50"/>
          </Field>
        </div>

        {error && <p className="text-red-600 text-sm mt-3 font-medium">{error}</p>}

        <div className="flex gap-3 mt-6">
          <button onClick={onClose} disabled={submitting} className="flex-1 border border-neutral-300 text-brand-black font-display font-bold tracking-[0.12em] py-3 rounded hover:bg-neutral-50 transition disabled:opacity-50">CANCEL</button>
          <button onClick={submit} disabled={files.length===0 || submitting}
            className="flex-1 bg-brand-orange hover:bg-brand-orange-dark disabled:bg-neutral-300 disabled:cursor-not-allowed text-white font-display font-bold tracking-[0.12em] py-3 rounded transition">
            {submitting ? 'UPLOADING…' : 'SAVE UPLOAD'}
          </button>
        </div>
      </div>
    </Modal>
  );
}

/* =========================================================
   RESEND LOGIN BUTTON — regenerates a PIN, emails new welcome.

   Lives in the client detail header. Three phases:
   idle → confirming → sending → result (shows new PIN + email status).

   The resend endpoint regenerates the PIN (invalidating the old one) so
   that this also serves as a "reset PIN" flow. Coach sees the new PIN
   in the result so there's always a manual fallback if delivery failed.
   ========================================================= */
function ResendLoginButton({ clientId }) {
  const [state, setState] = useState('idle'); // idle | confirming | sending | done
  const [result, setResult] = useState(null);

  const doResend = async () => {
    setState('sending');
    try {
      const r = await api.post(`/api/clients/${clientId}/resend-welcome`);
      setResult(r);
      setState('done');
    } catch (e) {
      setResult({ email_sent: false, email_error: e.message, new_pin: null });
      setState('done');
    }
  };

  if (state === 'done' && result) {
    return (
      <span className={`text-xs font-display tracking-[0.1em] px-2 py-1 rounded ${
        result.email_sent
          ? 'bg-emerald-50 text-emerald-900 border border-emerald-200'
          : 'bg-amber-50 text-amber-900 border border-amber-300'
      }`}>
        {result.email_sent
          ? <>✓ EMAILED · NEW PIN <span className="font-mono font-bold tracking-widest ml-1">{result.new_pin}</span></>
          : <>⚠ EMAIL FAILED · NEW PIN <span className="font-mono font-bold tracking-widest ml-1">{result.new_pin}</span> · text it manually</>
        }
        <button onClick={()=>{ setState('idle'); setResult(null); }}
          className="ml-2 text-neutral-400 hover:text-neutral-700">×</button>
      </span>
    );
  }

  if (state === 'confirming') {
    return (
      <span className="inline-flex items-center gap-2 text-xs">
        <span className="text-neutral-700">Generate new PIN and resend welcome?</span>
        <button onClick={doResend}
          className="font-display font-bold tracking-[0.1em] text-[11px] px-2 py-1 rounded bg-brand-orange hover:bg-brand-orange-dark text-white transition">YES</button>
        <button onClick={()=>setState('idle')}
          className="font-display font-bold tracking-[0.1em] text-[11px] px-2 py-1 rounded border border-neutral-300 text-neutral-600 hover:bg-neutral-100 transition">CANCEL</button>
      </span>
    );
  }

  return (
    <button onClick={()=>setState('confirming')} disabled={state === 'sending'}
      title="Regenerate the client's PIN and resend the welcome email"
      className="font-display font-semibold tracking-[0.1em] text-[11px] px-2.5 py-1 rounded border border-neutral-300 text-neutral-600 hover:border-brand-orange hover:text-brand-orange transition disabled:opacity-60">
      {state === 'sending' ? 'SENDING…' : 'RESEND LOGIN'}
    </button>
  );
}

function TimelineTab({ logs, client, mealSuggestions, onSaveMealSuggestion, onDeleteMealSuggestion }) {
  const [expanded, setExpanded] = useState(null);
  const [suggestingFor, setSuggestingFor] = useState(null); // log object
  const [editingSuggestion, setEditingSuggestion] = useState(null); // existing suggestion to edit

  if (logs.length === 0) {
    return (
      <div className="bg-white border border-dashed border-neutral-300 rounded p-12 text-center">
        <p className="font-display text-xl text-neutral-500">No meal uploads yet</p>
        <p className="text-sm text-neutral-400 mt-1">Use "Upload on behalf" to add logs for testing.</p>
      </div>
    );
  }

  const suggestionFor = (log_id) => mealSuggestions.find(s => s.meal_log_id === log_id);

  // Group by program week
  const byWeek = {};
  logs.forEach(log => {
    const days = Math.floor((new Date(log.log_date+'T00:00:00') - new Date(client.start_date+'T00:00:00')) / 86400000);
    const w = Math.max(0, Math.floor(days/7));
    (byWeek[w] ||= []).push(log);
  });
  const weeks = Object.keys(byWeek).map(Number).sort((a,b)=>b-a);

  const handleSaveSuggestion = (data) => {
    onSaveMealSuggestion(data);
    setSuggestingFor(null);
    setEditingSuggestion(null);
  };

  return (
    <>
      <div className="space-y-8">
        {weeks.map(w => (
          <div key={w}>
            <div className="flex items-center gap-3 mb-4">
              <div className="font-display font-bold text-xl">{w === 0 ? 'WEEK 0 · ONBOARDING' : `WEEK ${w}`}</div>
              <div className="flex-1 h-px bg-neutral-200"></div>
              <div className="text-[10px] font-display font-semibold tracking-[0.12em] text-neutral-500">
                {byWeek[w].length} LOG{byWeek[w].length!==1?'S':''}
              </div>
            </div>
            <div className="space-y-3">
              {byWeek[w].map(log => {
                const suggestion = suggestionFor(log.id);
                return (
                  <div key={log.id} className="bg-white border border-neutral-200 rounded p-5">
                    <div className="flex flex-col sm:flex-row items-start gap-5">
                      <div className="flex-shrink-0 sm:w-28">
                        <div className="font-display font-bold text-lg leading-tight">{displayDate(log.log_date).split(', ')[0]}</div>
                        <div className="text-sm text-neutral-500">{displayDate(log.log_date).split(', ')[1]}</div>
                        <div className="text-[10px] font-display tracking-[0.12em] text-neutral-400 mt-1">
                          {log.photos.length} PHOTO{log.photos.length!==1?'S':''}
                        </div>
                      </div>
                      <div className="flex-1 min-w-0 w-full">

/* =========================================================
   ACTIONS TAB — client lifecycle controls.

   MVP actions: Pause / Resume / Delete. Graduate + Archive deferred.

   Pause: marks status='paused' so the overdue flagging and "active"
     filter respect it. Client can still log in (by design — they
     might want to review their history during a break).
   Resume: paused → active.
   Delete: permanent. Uses type-the-name gate to avoid accidents.
     Cascades on the server side (logs, checkins, notes, questions,
     photos all go with the client).
   ========================================================= */
function ActionsTab({ client, onSetStatus, onDelete }) {
  const [deleteOpen, setDeleteOpen] = useState(false);
  const [typedName, setTypedName] = useState('');
  const [busy, setBusy] = useState(null); // 'pause' | 'resume' | 'delete' | null
  const nameMatches = typedName.trim().toLowerCase() === client.name.trim().toLowerCase();

  const doSetStatus = async (status) => {
    setBusy(status === 'paused' ? 'pause' : 'resume');
    try { await onSetStatus(client.id, status); }
    finally { setBusy(null); }
  };
  const doDelete = async () => {
    if (!nameMatches) return;
    setBusy('delete');
    try { await onDelete(client.id); /* onDelete navigates back to list */ }
    catch (e) { setBusy(null); alert('Delete failed: ' + e.message); }
  };

  return (
    <div className="space-y-3 max-w-2xl">
      {/* PAUSE / RESUME */}
      {client.status === 'active' && (
        <ActionCard
          title="Pause this client"
          body="Mark them as paused — vacation, injury, life gets in the way, whatever. They'll still be able to log in, but won't show in the 'active' filter or trigger overdue flags. Resume anytime."
          buttonLabel={busy === 'pause' ? 'PAUSING…' : 'PAUSE'}
          buttonDisabled={busy !== null}
          onClick={() => doSetStatus('paused')}
          tone="neutral"
        />
      )}
      {client.status === 'paused' && (
        <ActionCard
          title="Resume this client"
          body="Move them back to active. Program week picks up where the calendar says it should based on their original start date."
          buttonLabel={busy === 'resume' ? 'RESUMING…' : 'RESUME'}
          buttonDisabled={busy !== null}
          onClick={() => doSetStatus('active')}
          tone="primary"
        />
      )}
      {client.status === 'completed' && (
        <ActionCard
          title="Reactivate this client"
          body="They're marked complete. If they're running another round, flip them back to active here."
          buttonLabel={busy === 'resume' ? 'REACTIVATING…' : 'REACTIVATE'}
          buttonDisabled={busy !== null}
          onClick={() => doSetStatus('active')}
          tone="primary"
        />
      )}

      {/* DELETE */}
      <div className="bg-white border border-red-200 rounded p-5">
        <div className="flex items-start justify-between gap-4">
          <div className="min-w-0 flex-1">
            <h3 className="font-display font-bold text-xl leading-tight text-red-900">Delete permanently</h3>
            <p className="text-sm text-neutral-700 mt-1 leading-relaxed">
              Removes the client and <strong>all</strong> their data — meal photos, check-ins, notes, questions, suggestions. This cannot be undone and there is no backup recovery for deleted records from this button.
            </p>
          </div>
          {!deleteOpen && (
            <button onClick={()=>setDeleteOpen(true)}
              className="font-display font-bold tracking-[0.1em] text-xs px-4 py-2 rounded border border-red-300 text-red-700 hover:bg-red-50 transition flex-shrink-0">
              DELETE…
            </button>
          )}
        </div>

        {deleteOpen && (
          <div className="mt-4 border-t border-red-100 pt-4">
            <p className="text-sm text-neutral-800 mb-3">
              Type <strong>{client.name}</strong> to confirm:
            </p>
            <input autoFocus type="text" value={typedName}
              onChange={(e)=>setTypedName(e.target.value)}
              placeholder={client.name}
              className="w-full border border-neutral-300 rounded px-3 py-2 mb-3 focus:border-red-500 focus:outline-none transition"/>
            <div className="flex gap-2">
              <button onClick={()=>{ setDeleteOpen(false); setTypedName(''); }}
                disabled={busy === 'delete'}
                className="flex-1 border border-neutral-300 text-brand-black font-display font-bold tracking-[0.12em] py-2.5 rounded hover:bg-neutral-50 transition disabled:opacity-60">
                CANCEL
              </button>
              <button onClick={doDelete} disabled={!nameMatches || busy === 'delete'}
                className="flex-1 bg-red-600 hover:bg-red-700 disabled:bg-neutral-200 disabled:text-neutral-400 disabled:cursor-not-allowed text-white font-display font-bold tracking-[0.12em] py-2.5 rounded transition">
                {busy === 'delete' ? 'DELETING…' : 'DELETE PERMANENTLY'}
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// Small presentational helper for Pause / Resume / Reactivate cards.

/* =========================================================
   WORKOUT PLAN EDITOR — shared between coach and client.

   Every editable bit of a client_program happens here:
     - rename plan + description
     - add / remove / reorder / rename days
     - within each day: add / remove / reorder / swap / edit exercises
   Coach mode adds: edit coach_note, edit program notes, change program, unassign.

   Mutations are expressed as full-days patches via onUpdate({ days }). The parent
   handles the server round-trip. Optimistic: we don't mirror state locally, so
   if the server fails, the UI snaps back when the parent refuses the update.

   Hoisting note: function declarations are hoisted, so ClientWorkoutView (later
   in the file) can reference the components defined here without issue.
   ========================================================= */

// Default values used when adding a fresh exercise slot to a day.
const DEFAULT_EXERCISE_SLOT = { sets: 3, reps: '8-12', rest_seconds: 90, rationale: '' };

// Sensible ordering for the "add exercise" default picker
const MUSCLE_GROUPS_ORDER = ['Legs', 'Back', 'Chest', 'Shoulders', 'Arms', 'Core'];

function WorkoutPlanEditor({ plan, mode, exercises, onUpdate, onCreateExercise }) {
  const isCoach = mode === 'coach';
  // Which day is currently expanded (only one open at a time; -1 = none)
  const [expandedDay, setExpandedDay] = useState(plan.days.length > 0 ? 0 : -1);
  // When set: { day_index, exercise_index | null }. null exercise_index = adding a new exercise.
  const [pickerState, setPickerState] = useState(null);

  const exById = useMemo(() => Object.fromEntries(exercises.map(e => [e.id, e])), [exercises]);

  // Helpers to mutate the days array and push the whole thing to the server.
  const commitDays = (newDays) => onUpdate({ days: newDays });

  const addDay = () => {
    const label = (prompt('Name this day (e.g. "Upper Body", "Legs Day"):') || '').trim();
    if (!label) return;
    const newDays = [...plan.days, { label, exercises: [] }];
    commitDays(newDays);
    setExpandedDay(newDays.length - 1);
  };

  const renameDay = (di) => {
    const current = plan.days[di].label;
    const next = (prompt('Rename this day:', current) || '').trim();
    if (!next || next === current) return;
    const newDays = plan.days.map((d, i) => i === di ? { ...d, label: next } : d);
    commitDays(newDays);
  };

  const removeDay = (di) => {
    const day = plan.days[di];
    if (!confirm(`Remove "${day.label}" and its ${day.exercises.length} exercise${day.exercises.length===1?'':'s'}?`)) return;
    const newDays = plan.days.filter((_, i) => i !== di);
    commitDays(newDays);
    if (expandedDay === di) setExpandedDay(-1);
  };

  const moveDay = (di, direction) => {
    const target = di + direction;
    if (target < 0 || target >= plan.days.length) return;
    const newDays = [...plan.days];
    [newDays[di], newDays[target]] = [newDays[target], newDays[di]];
    commitDays(newDays);
    if (expandedDay === di) setExpandedDay(target);
    else if (expandedDay === target) setExpandedDay(di);
  };

  const addExerciseToDay = (di, newExerciseId) => {
    const newDays = plan.days.map((d, i) => {
      if (i !== di) return d;
      return { ...d, exercises: [...d.exercises, { exercise_id: newExerciseId, ...DEFAULT_EXERCISE_SLOT }] };
    });
    commitDays(newDays);
  };

  const swapExerciseAt = (di, ei, newExerciseId) => {
    const newDays = plan.days.map((d, i) => {
      if (i !== di) return d;
      return {
        ...d,
        exercises: d.exercises.map((e, j) => j === ei ? { ...e, exercise_id: newExerciseId } : e),
      };
    });
    commitDays(newDays);
  };

  const removeExerciseAt = (di, ei) => {
    const newDays = plan.days.map((d, i) => {
      if (i !== di) return d;
      return { ...d, exercises: d.exercises.filter((_, j) => j !== ei) };
    });
    commitDays(newDays);
  };

  const moveExerciseAt = (di, ei, direction) => {
    const target = ei + direction;
    const day = plan.days[di];
    if (target < 0 || target >= day.exercises.length) return;
    const newExercises = [...day.exercises];
    [newExercises[ei], newExercises[target]] = [newExercises[target], newExercises[ei]];
    const newDays = plan.days.map((d, i) => i === di ? { ...d, exercises: newExercises } : d);
    commitDays(newDays);
  };

  const editExerciseAt = (di, ei, patch) => {
    const newDays = plan.days.map((d, i) => {
      if (i !== di) return d;
      return { ...d, exercises: d.exercises.map((e, j) => j === ei ? { ...e, ...patch } : e) };
    });
    commitDays(newDays);
  };

  // Picker close handler. If the picker was for a specific slot (swap), the new id
  // replaces the current. If it was "add to this day", the new id appends a slot.
  const handlePickerSelect = async (newExerciseId) => {
    if (!pickerState) return;
    const { day_index, exercise_index } = pickerState;
    try {
      if (exercise_index == null) await addExerciseToDay(day_index, newExerciseId);
      else                         await swapExerciseAt(day_index, exercise_index, newExerciseId);
      setPickerState(null);
    } catch (e) { alert('Failed: ' + e.message); }
  };

  return (
    <div>
      <EditablePlanHeader plan={plan} mode={mode} onUpdate={onUpdate}/>

      {isCoach && (
        <CoachPlanNote plan={plan} onUpdate={onUpdate}/>
      )}
      {!isCoach && plan.coach_note && (
        <div className="bg-brand-orange/5 border border-brand-orange/30 rounded-lg p-4 mb-4">
          <div className="font-display font-bold tracking-[0.12em] text-[10px] text-brand-orange mb-1">NOTE FROM DEREK</div>
          <p className="text-neutral-800 leading-relaxed text-sm whitespace-pre-wrap">{plan.coach_note}</p>
        </div>
      )}

      {plan.notes && (
        <div className="bg-white border border-neutral-200 rounded-lg p-4 mb-4">
          <div className="font-display font-bold tracking-[0.12em] text-[10px] text-neutral-500 mb-1">HOW TO RUN THIS</div>
          <p className="text-neutral-700 leading-relaxed text-sm whitespace-pre-wrap">{plan.notes}</p>
        </div>
      )}

      {/* Days */}
      <div className="space-y-2 mb-3">
        {plan.days.map((day, di) => {
          const isOpen = expandedDay === di;
          return (
            <div key={di} className={`bg-white border rounded-lg overflow-hidden transition ${isOpen ? 'border-brand-orange' : 'border-neutral-200'}`}>
              <div className="w-full flex items-center gap-2 px-3 py-3 hover:bg-neutral-50 transition">
                {/* Reorder buttons */}
                <div className="flex flex-col gap-0.5 flex-shrink-0">
                  <button onClick={()=>moveDay(di, -1)} disabled={di === 0}
                    title="Move up"
                    className="w-6 h-4 flex items-center justify-center text-neutral-400 hover:text-brand-black disabled:opacity-20 disabled:cursor-not-allowed text-xs">▲</button>
                  <button onClick={()=>moveDay(di, 1)} disabled={di === plan.days.length - 1}
                    title="Move down"
                    className="w-6 h-4 flex items-center justify-center text-neutral-400 hover:text-brand-black disabled:opacity-20 disabled:cursor-not-allowed text-xs">▼</button>
                </div>
                <button onClick={()=>setExpandedDay(isOpen ? -1 : di)}
                  className="flex-1 text-left flex items-baseline gap-3 min-w-0">
                  <div className="font-display font-bold text-2xl leading-none text-brand-orange flex-shrink-0">D{di+1}</div>
                  <div className="min-w-0">
                    <div className="font-display font-bold text-lg leading-tight">{day.label}</div>
                    <div className="text-xs text-neutral-500">{day.exercises.length} exercise{day.exercises.length===1?'':'s'}</div>
                  </div>
                </button>
                {/* Day actions */}
                <button onClick={()=>renameDay(di)} title="Rename this day"
                  className="font-display font-bold tracking-[0.1em] text-[10px] px-2 py-1 rounded border border-neutral-200 text-neutral-500 hover:border-brand-black hover:text-brand-black transition flex-shrink-0">
                  RENAME
                </button>
                <button onClick={()=>removeDay(di)} title="Remove this day"
                  className="font-display font-bold tracking-[0.1em] text-[10px] px-2 py-1 rounded text-red-600 hover:bg-red-50 transition flex-shrink-0">
                  ✕
                </button>
                <button onClick={()=>setExpandedDay(isOpen ? -1 : di)}
                  className={`text-neutral-400 hover:text-brand-black transition-transform flex-shrink-0 ml-1 ${isOpen ? 'rotate-90' : ''}`}>›</button>
              </div>

              {isOpen && (
                <div className="border-t border-neutral-100">
                  {day.exercises.length === 0 ? (
                    <p className="text-sm text-neutral-400 italic py-4 px-4 text-center">No exercises yet. Add your first one below.</p>
                  ) : (
                    <div className="divide-y divide-neutral-100">
                      {day.exercises.map((slot, ei) => (
                        <ExerciseSlotRow
                          key={ei}
                          index={ei+1}
                          slot={slot}
                          exercise={exById[slot.exercise_id]}
                          isFirst={ei === 0}
                          isLast={ei === day.exercises.length - 1}
                          onEdit={(patch)=>editExerciseAt(di, ei, patch)}
                          onSwap={()=>setPickerState({ day_index: di, exercise_index: ei })}
                          onMove={(dir)=>moveExerciseAt(di, ei, dir)}
                          onRemove={()=>removeExerciseAt(di, ei)}
                        />
                      ))}
                    </div>
                  )}
                  <div className="p-3 bg-neutral-50 border-t border-neutral-100">
                    <button onClick={()=>setPickerState({ day_index: di, exercise_index: null })}
                      className="w-full border border-dashed border-neutral-300 hover:border-brand-orange hover:text-brand-orange text-neutral-500 font-display font-bold tracking-[0.12em] text-xs py-2.5 rounded transition">
                      + ADD EXERCISE
                    </button>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* Add day */}
      <button onClick={addDay}
        className="w-full border border-dashed border-neutral-300 hover:border-brand-orange hover:text-brand-orange text-neutral-500 font-display font-bold tracking-[0.12em] text-sm py-4 rounded-lg transition mb-4">
        + ADD DAY
      </button>

      {pickerState && (
        <ExercisePickerModal
          current={pickerState.exercise_index != null ? exById[plan.days[pickerState.day_index].exercises[pickerState.exercise_index].exercise_id] : null}
          exercises={exercises}
          onSelect={handlePickerSelect}
          onCreateExercise={onCreateExercise}
          onClose={()=>setPickerState(null)}
        />
      )}
    </div>
  );
}

// Plan name + description — click to edit.

  const [desc, setDesc] = useState(plan.description || '');

          <button onClick={()=>{ setName(plan.name); setDesc(plan.description || ''); setEditing(false); }} disabled={busy}

            CANCEL
          </button>
          <button onClick={save} disabled={busy}
            className="font-display font-bold tracking-[0.1em] text-[11px] px-4 py-1.5 rounded bg-brand-orange hover:bg-brand-orange-dark text-white transition disabled:opacity-60">

  return (
    <div className="mb-4">
      <div className="flex items-start justify-between gap-3 mb-1">

          <div className="font-display font-bold tracking-[0.2em] text-[10px] text-brand-orange mb-1">{mode === 'coach' ? 'ASSIGNED PROGRAM' : 'YOUR PLAN'}</div>

        </div>
        <button onClick={()=>setEditing(true)}
          className="font-display font-bold tracking-[0.1em] text-[11px] px-3 py-1.5 rounded border border-neutral-300 text-neutral-600 hover:border-brand-black hover:text-brand-black transition flex-shrink-0">
          EDIT
        </button>
      </div>
      {plan.description && <p className="text-sm text-neutral-600 leading-relaxed">{plan.description}</p>}
    </div>
  );
}

  useEffect(() => { setDraft(slot); }, [slot]);

  const save = async () => {
    setBusy(true);
    try {
      await onEdit({
        sets:         Number(draft.sets) || 0,
        reps:         draft.reps,
        rest_seconds: draft.rest_seconds === '' || draft.rest_seconds == null ? null : Number(draft.rest_seconds),
        rationale:    draft.rationale || '',
      });
      setEditing(false);
    } catch (e) { alert('Failed: ' + e.message); }
    finally { setBusy(false); }

  return (
    <div className="px-3 py-3">
      <div className="flex items-start gap-2 mb-2">
        {/* Reorder */}
        <div className="flex flex-col gap-0.5 flex-shrink-0 pt-1">
          <button onClick={()=>onMove(-1)} disabled={isFirst}
            className="w-5 h-4 flex items-center justify-center text-neutral-400 hover:text-brand-black disabled:opacity-20 disabled:cursor-not-allowed text-[10px]">▲</button>

        </div>
        <div className="font-display font-bold text-lg w-5 text-center leading-none text-neutral-400 flex-shrink-0 pt-0.5">{index}</div>
        <div className="flex-1 min-w-0">
          <div className="font-display font-bold text-base leading-tight">
            {exercise ? exercise.name : <span className="text-neutral-400 italic">exercise removed</span>}
          </div>
          {exercise && (
            <div className="text-[10px] font-display font-bold tracking-[0.1em] text-neutral-500 uppercase">
              {exercise.muscle_group} · {exercise.category}
            </div>
          )}
        </div>
        <div className="flex gap-1 flex-shrink-0">
          {!editing && (
            <button onClick={()=>{ setDraft(slot); setEditing(true); }}
              className="font-display font-bold tracking-[0.1em] text-[10px] px-2 py-1 rounded border border-neutral-200 text-neutral-500 hover:border-brand-black hover:text-brand-black transition">
              EDIT
            </button>
          )}
          <button onClick={onSwap}
            className="font-display font-bold tracking-[0.1em] text-[10px] px-2 py-1 rounded border border-neutral-200 text-neutral-500 hover:border-brand-orange hover:text-brand-orange transition">
            SWAP

        <div className="pl-11 space-y-2">

            <div>
              <label className="font-display font-bold tracking-[0.1em] text-[9px] text-neutral-500 block mb-0.5">SETS</label>
              <input type="number" inputMode="numeric" value={draft.sets} onChange={(e)=>setDraft({...draft, sets:e.target.value})}
                className="w-full border border-neutral-200 rounded px-2 py-1.5 text-sm focus:border-brand-orange transition"/>
            </div>
            <div>
              <label className="font-display font-bold tracking-[0.1em] text-[9px] text-neutral-500 block mb-0.5">REPS</label>
              <input type="text" value={draft.reps} onChange={(e)=>setDraft({...draft, reps:e.target.value})}
                placeholder="e.g. 8-12"
                className="w-full border border-neutral-200 rounded px-2 py-1.5 text-sm focus:border-brand-orange transition"/>

              <label className="font-display font-bold tracking-[0.1em] text-[9px] text-neutral-500 block mb-0.5">REST (SEC)</label>
              <input type="number" inputMode="numeric" value={draft.rest_seconds ?? ''} onChange={(e)=>setDraft({...draft, rest_seconds:e.target.value})}
                className="w-full border border-neutral-200 rounded px-2 py-1.5 text-sm focus:border-brand-orange transition"/>
            </div>

            <label className="font-display font-bold tracking-[0.1em] text-[9px] text-neutral-500 block mb-0.5">NOTE (OPTIONAL)</label>
            <textarea rows={2} value={draft.rationale || ''} onChange={(e)=>setDraft({...draft, rationale:e.target.value})}
              className="w-full border border-neutral-200 rounded px-2 py-1.5 text-sm focus:border-brand-orange transition resize-none"/>

            <p className="text-sm text-neutral-700 leading-relaxed pl-11 italic">{slot.rationale}</p>
          )}
        </>
      )}
    </div>
  );
}

// Exercise picker. Used for both swapping and adding.
// When `current` is set: filter defaults to same muscle group (swap context).
// When `current` is null: show all, allow filter by group.
// Always offers a "+ NEW EXERCISE" option that reveals an inline create form.
function ExercisePickerModal({ current, exercises, onSelect, onCreateExercise, onClose }) {
  // Start filter matching current's muscle group if swapping; else 'all'.
  const [filter, setFilter] = useState(current ? current.muscle_group : 'all');
  const [search, setSearch] = useState('');
  const [creating, setCreating] = useState(false);

  const filtered = useMemo(() => {
    return exercises
      .filter(e => !current || e.id !== current.id)
      .filter(e => filter === 'all' || e.muscle_group === filter)
      .filter(e => !search.trim() || e.name.toLowerCase().includes(search.toLowerCase().trim()))
      .sort((a, b) => a.name.localeCompare(b.name));
  }, [exercises, current, filter, search]);

  const title = current ? `Swap: ${current.name}` : 'Add Exercise';

  return (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-black/60" onClick={onClose}>
      <div className="bg-white w-full sm:max-w-md sm:rounded-lg rounded-t-lg max-h-[90vh] overflow-hidden flex flex-col"
           onClick={(e)=>e.stopPropagation()}>
        <div className="p-5 border-b border-neutral-200">
          <div className="flex items-start justify-between gap-3 mb-3">
            <div className="min-w-0">
              <div className="font-display font-bold tracking-[0.12em] text-[10px] text-neutral-500 mb-1">
                {current ? 'SWAPPING' : 'ADD EXERCISE'}
              </div>
              <div className="font-display font-bold text-xl leading-tight truncate">{title}</div>
              {current && <div className="text-xs text-neutral-500 mt-0.5">{current.muscle_group} · {current.category}</div>}
            </div>
            <button onClick={onClose} className="text-neutral-400 hover:text-brand-black text-2xl leading-none flex-shrink-0">×</button>
          </div>

          <input value={search} onChange={(e)=>setSearch(e.target.value)}
            placeholder="Search exercises..."
            className="w-full border border-neutral-200 rounded px-3 py-2 text-sm focus:border-brand-orange transition mb-2"/>

          <div className="flex flex-wrap gap-1">
            <button onClick={()=>setFilter('all')}
              className={`font-display font-bold tracking-[0.1em] text-[10px] px-2.5 py-1 rounded transition ${
                filter==='all' ? 'bg-brand-black text-white' : 'bg-neutral-100 text-neutral-600 hover:bg-neutral-200'
              }`}>
              ALL
            </button>
            {MUSCLE_GROUPS_ORDER.map(g => (
              <button key={g} onClick={()=>setFilter(g)}
                className={`font-display font-bold tracking-[0.1em] text-[10px] px-2.5 py-1 rounded transition ${
                  filter===g ? 'bg-brand-black text-white' : 'bg-neutral-100 text-neutral-600 hover:bg-neutral-200'
                }`}>
                {g.toUpperCase()}
              </button>
            ))}
          </div>
        </div>

        <div className="flex-1 overflow-y-auto p-3">
          {creating ? (
            <NewExerciseForm
              defaultGroup={filter !== 'all' ? filter : (current?.muscle_group || 'Legs')}
              onCancel={()=>setCreating(false)}
              onCreated={async (created) => {
                setCreating(false);
                onSelect(created.id);
              }}
              onCreate={onCreateExercise}
            />
          ) : (
            <>
              <button onClick={()=>setCreating(true)}
                className="w-full border border-dashed border-brand-orange text-brand-orange hover:bg-brand-orange/5 font-display font-bold tracking-[0.12em] text-xs py-3 rounded mb-3 transition">
                + NEW EXERCISE
              </button>

              {filtered.length === 0 ? (
                <p className="text-center text-neutral-500 text-sm py-6">No matches. Try "All" or search differently.</p>
              ) : (
                <div className="space-y-1">
                  {filtered.map(ex => (
                    <button key={ex.id} onClick={()=>onSelect(ex.id)}
                      className="w-full text-left px-3 py-3 rounded hover:bg-brand-orange/5 hover:border-brand-orange border border-transparent transition">
                      <div className="flex items-center gap-2">
                        <div className="font-display font-bold text-base leading-tight">{ex.name}</div>
                        {ex.owner_id && <span className="font-display font-bold tracking-[0.1em] text-[9px] px-1.5 py-0.5 rounded bg-neutral-100 text-neutral-600">YOURS</span>}
                      </div>
                      <div className="text-[10px] font-display font-bold tracking-[0.1em] text-neutral-500 uppercase mb-1">
                        {ex.muscle_group} · {ex.category}
                      </div>
                      {ex.notes && <div className="text-xs text-neutral-600 leading-snug">{ex.notes}</div>}
                    </button>
                  ))}
                </div>
              )}
            </>
          )}
        </div>
      </div>
    </div>
  );
}

// Inline form to create a new exercise from within the picker.
function NewExerciseForm({ defaultGroup, onCreate, onCreated, onCancel }) {
  const [name, setName] = useState('');
  const [muscleGroup, setMuscleGroup] = useState(defaultGroup || 'Legs');
  const [category, setCategory] = useState('Compound');
  const [notes, setNotes] = useState('');
  const [busy, setBusy] = useState(false);

  const submit = async () => {
    if (!name.trim() || busy) return;
    setBusy(true);
    try {
      const created = await onCreate({ name: name.trim(), muscle_group: muscleGroup, category, notes });
      onCreated(created);
    } catch (e) { alert('Failed: ' + e.message); setBusy(false); }
  };

  return (
    <div className="bg-neutral-50 border border-neutral-200 rounded p-4">
      <div className="font-display font-bold tracking-[0.12em] text-[10px] text-neutral-500 mb-3">NEW EXERCISE</div>
      <div className="space-y-2">
        <div>
          <label className="font-display font-bold tracking-[0.1em] text-[9px] text-neutral-500 block mb-0.5">NAME</label>
          <input autoFocus value={name} onChange={(e)=>setName(e.target.value)} placeholder="e.g. Hack Squat"
            className="w-full border border-neutral-200 rounded px-2 py-2 text-sm focus:border-brand-orange transition"/>
        </div>
        <div className="grid grid-cols-2 gap-2">
          <div>
            <label className="font-display font-bold tracking-[0.1em] text-[9px] text-neutral-500 block mb-0.5">MUSCLE GROUP</label>
            <select value={muscleGroup} onChange={(e)=>setMuscleGroup(e.target.value)}
              className="w-full border border-neutral-200 rounded px-2 py-2 text-sm bg-white focus:border-brand-orange transition">
              {MUSCLE_GROUPS_ORDER.map(g => <option key={g} value={g}>{g}</option>)}
            </select>
          </div>
          <div>
            <label className="font-display font-bold tracking-[0.1em] text-[9px] text-neutral-500 block mb-0.5">CATEGORY</label>
            <select value={category} onChange={(e)=>setCategory(e.target.value)}
              className="w-full border border-neutral-200 rounded px-2 py-2 text-sm bg-white focus:border-brand-orange transition">
              {['Compound', 'Isolation', 'Accessory'].map(c => <option key={c} value={c}>{c}</option>)}
            </select>
          </div>
        </div>
        <div>
          <label className="font-display font-bold tracking-[0.1em] text-[9px] text-neutral-500 block mb-0.5">NOTES (OPTIONAL)</label>
          <textarea rows={2} value={notes} onChange={(e)=>setNotes(e.target.value)}
            placeholder="Cues or reminders"
            className="w-full border border-neutral-200 rounded px-2 py-2 text-sm focus:border-brand-orange transition resize-none"/>
        </div>
        <div className="flex gap-2 pt-1">
          <button onClick={onCancel} disabled={busy}
            className="flex-1 font-display font-bold tracking-[0.1em] text-[11px] px-3 py-2 rounded border border-neutral-300 text-neutral-600 hover:bg-neutral-100 transition disabled:opacity-60">
            CANCEL
          </button>
          <button onClick={submit} disabled={!name.trim() || busy}
            className="flex-1 font-display font-bold tracking-[0.1em] text-[11px] px-3 py-2 rounded bg-brand-orange hover:bg-brand-orange-dark disabled:bg-neutral-200 disabled:text-neutral-400 text-white transition">
            {busy ? 'CREATING…' : 'CREATE & USE'}
          </button>
        </div>
      </div>
    </div>
  );
}

/* =========================================================
   COACH WORKOUT TAB — wraps WorkoutPlanEditor with coach-only controls.
   ========================================================= */
function WorkoutCoachTab({ client, clientProgram, programs, exercises, onAssign, onUpdate, onUnassign, onSwap, onCreateExercise }) {
  if (!clientProgram) {
    return <AssignProgramPanel client={client} programs={programs} onAssign={onAssign}/>;
  }
  return (
    <div>
      <WorkoutPlanEditor
        plan={clientProgram}
        mode="coach"
        exercises={exercises}
        onUpdate={onUpdate}
        onCreateExercise={onCreateExercise}
      />
      <CoachPlanFooterActions
        clientProgram={clientProgram}
        programs={programs}
        onChangeProgram={(newId) => onUpdate({ __change_to: newId })}
        onUnassign={onUnassign}
      />

}

// AssignProgramPanel — unchanged role, new option: "Start blank".
function AssignProgramPanel({ client, programs, onAssign }) {
  const [mode, setMode] = useState('library'); // 'library' | 'blank'
  const [selectedId, setSelectedId] = useState('');
  const [coachNote, setCoachNote] = useState('');
  const [busy, setBusy] = useState(false);

  const submit = async () => {
    if (busy) return;
    if (mode === 'library' && !selectedId) return;
    setBusy(true);
    try {
      await onAssign(mode === 'library' ? selectedId : null, coachNote);
    }
    catch (e) { alert('Assign failed: ' + e.message); setBusy(false); }
  };

  const selected = programs.find(p => p.id === selectedId);

  return (
    <div className="max-w-2xl">
      <div className="bg-white border border-neutral-200 rounded p-5 mb-4">
        <h3 className="font-display font-bold text-2xl leading-tight mb-1">Assign a workout plan</h3>
        <p className="text-sm text-neutral-600 mb-5">Start from a program in your library, or give {client.name.split(' ')[0]} a blank plan they can build from scratch. You can edit either one after.</p>

        <div className="flex gap-2 mb-4">
          <button onClick={()=>setMode('library')}
            className={`flex-1 font-display font-bold tracking-[0.12em] text-xs px-3 py-2.5 rounded transition ${
              mode==='library' ? 'bg-brand-black text-white' : 'border border-neutral-300 text-neutral-600 hover:border-brand-black hover:text-brand-black'
            }`}>
            FROM LIBRARY
          </button>
          <button onClick={()=>setMode('blank')}
            className={`flex-1 font-display font-bold tracking-[0.12em] text-xs px-3 py-2.5 rounded transition ${
              mode==='blank' ? 'bg-brand-black text-white' : 'border border-neutral-300 text-neutral-600 hover:border-brand-black hover:text-brand-black'
            }`}>
            START BLANK
          </button>
        </div>

        {mode === 'library' && (
          programs.length === 0 ? (
            <div className="text-sm text-neutral-500 italic mb-3">Your program library is empty. Either build one in the Workouts tab up top, or choose START BLANK.</div>
          ) : (
            <>
              <Field label="Program">
                <select value={selectedId} onChange={(e)=>setSelectedId(e.target.value)}
                  className="w-full border border-neutral-200 rounded px-3 py-2.5 focus:border-brand-orange transition bg-white">
                  <option value="">— pick one —</option>
                  {programs.map(p => (
                    <option key={p.id} value={p.id}>{p.name} ({p.days.length} day{p.days.length===1?'':'s'})</option>
                  ))}
                </select>
              </Field>
              {selected && (
                <div className="bg-neutral-50 border border-neutral-200 rounded p-4 my-3 text-sm">
                  {selected.description && <p className="mb-2 text-neutral-800">{selected.description}</p>}
                  <div className="font-display font-bold tracking-[0.12em] text-[10px] text-neutral-500 mb-1">DAYS</div>
                  <ul className="list-disc pl-5 text-neutral-700">
                    {selected.days.map((d, i) => <li key={i}>{d.label}</li>)}
                  </ul>
                </div>
              )}
            </>
          )
        )}

        {mode === 'blank' && (
          <div className="bg-neutral-50 border border-neutral-200 rounded p-4 my-3 text-sm text-neutral-700">
            {client.name.split(' ')[0]} will start with an empty plan called "My Workout". They can add days, exercises, and customize everything. You'll be able to see and edit it too.
          </div>
        )}

        <Field label="Coach note (optional)" hint="Visible to the client on their Workout screen.">
          <textarea rows={3} value={coachNote} onChange={(e)=>setCoachNote(e.target.value)}
            placeholder="e.g. 'Run this 4 weeks. Focus on the lower-body days.'"
            className="w-full border border-neutral-200 rounded px-3 py-2.5 focus:border-brand-orange transition resize-none"/>
        </Field>

        <button onClick={submit} disabled={busy || (mode === 'library' && !selectedId)}
          className="w-full mt-4 bg-brand-orange hover:bg-brand-orange-dark disabled:bg-neutral-200 disabled:text-neutral-400 disabled:cursor-not-allowed text-white font-display font-bold tracking-[0.12em] py-3 rounded transition">
          {busy ? 'ASSIGNING…' : (mode === 'blank' ? 'CREATE BLANK PLAN' : 'ASSIGN PROGRAM')}
        </button>
      </div>
    </div>
  );
}

// Footer actions under the coach's plan view — Change Program + Unassign.
function CoachPlanFooterActions({ clientProgram, programs, onChangeProgram, onUnassign }) {
  const [showChange, setShowChange] = useState(false);

  const changeProgram = async (newBaseProgramId) => {
    if (!confirm('Switching programs will discard any customizations (added days, swaps, edits) on the current plan. Continue?')) return;
    try { await onChangeProgram(newBaseProgramId); setShowChange(false); }
    catch (e) { alert('Swap failed: ' + e.message); }
  };

  const doUnassign = async () => {
    if (!confirm(`Unassign this plan? They won't see any workout until you assign a new one or they build one themselves.`)) return;
    try { await onUnassign(); }
    catch (e) { alert('Unassign failed: ' + e.message); }
  };

  return (
    <div className="bg-white border border-neutral-200 rounded p-4 mt-4">
      <div className="flex items-center justify-between gap-3">
        <div className="min-w-0">
          <div className="font-display font-bold text-sm leading-tight">Plan controls</div>
          <div className="text-xs text-neutral-500 mt-0.5">Replace the current plan with a library program, or unassign entirely.</div>
        </div>
        <div className="flex gap-2 flex-shrink-0">
          <button onClick={()=>setShowChange(!showChange)}
            className="font-display font-bold tracking-[0.1em] text-[11px] px-3 py-1.5 rounded border border-neutral-300 text-neutral-600 hover:border-brand-orange hover:text-brand-orange transition">
            CHANGE PROGRAM
          </button>
          <button onClick={doUnassign}
            className="font-display font-bold tracking-[0.1em] text-[11px] px-3 py-1.5 rounded border border-red-300 text-red-700 hover:bg-red-50 transition">
            UNASSIGN
          </button>
        </div>
      </div>
      {showChange && (
        <div className="mt-4 pt-4 border-t border-neutral-100">
          <div className="font-display font-bold tracking-[0.12em] text-[10px] text-neutral-500 mb-2">SWITCH TO</div>
          <div className="space-y-1">
            {programs.filter(p => p.id !== clientProgram.base_program_id).length === 0 ? (
              <div className="text-sm text-neutral-500 italic">No other programs in your library.</div>
            ) : programs.filter(p => p.id !== clientProgram.base_program_id).map(p => (
              <button key={p.id} onClick={()=>changeProgram(p.id)}
                className="w-full text-left px-3 py-2.5 rounded border border-neutral-200 hover:border-brand-orange hover:bg-brand-orange/5 transition">
                <div className="font-display font-bold text-base leading-tight">{p.name}</div>
                <div className="text-xs text-neutral-500">{p.days.length} day{p.days.length===1?'':'s'} · {p.description}</div>
              </button>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

/* =========================================================
   EXERCISE LIBRARY
   ========================================================= */
const CATEGORY_STYLES = {
  Compound:  'bg-brand-black text-white',
  Isolation: 'bg-neutral-200 text-neutral-700',
  Accessory: 'bg-brand-orange-light text-brand-orange-dark',
};

function ExerciseLibrary({ exercises, onAdd, onUpdate, onDelete, canEdit, onBuildFromSelection }) {
  const [filter, setFilter]     = useState('All');
  const [modalOpen, setModal]   = useState(false);
  const [editing, setEditing]   = useState(null);
  // Selection is only active when the parent opts in (client side). Using a Set
  // keeps order-of-selection stable when we hand the ids off to the editor.
  const [selectedIds, setSelectedIds] = useState(() => []);
  const [isSelecting, setIsSelecting] = useState(false);
  const isEditable = (ex) => !canEdit || canEdit(ex);
  const canSelect = !!onBuildFromSelection;
  // Actual selection mode is only on while the user has explicitly opted in —
  // keeps the library looking like a normal library until they want to build.
  const selectionMode = canSelect && isSelecting;

  const filtered = filter==='All' ? exercises : exercises.filter(e => e.muscle_group === filter);
  const grouped = MUSCLE_GROUPS.reduce((acc, mg) => {
    const items = filtered.filter(e => e.muscle_group === mg);
    if (items.length) acc[mg] = items;
    return acc;
  }, {});

  const openAdd  = ()  => { setEditing(null); setModal(true); };
  const openEdit = (ex)=> {
    if (!isEditable(ex)) return;
    setEditing(ex); setModal(true);
  };
  const handleSave = (data) => {
    if (editing) onUpdate(editing.id, data);
    else onAdd(data);
    setModal(false);
  };

  const enterSelection = () => { setIsSelecting(true); setSelectedIds([]); };
  const exitSelection  = () => { setIsSelecting(false); setSelectedIds([]); };
  const toggleSelect = (id) => {
    setSelectedIds(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
  };
  const clearSelection = () => setSelectedIds([]);
  const buildFromSelection = () => {
    if (!selectedIds.length) return;
    onBuildFromSelection(selectedIds);
    setSelectedIds([]);
    setIsSelecting(false);
  };

  return (
    <>
      <div className="flex items-center justify-between gap-3 mb-5 flex-wrap">
        <div className="flex gap-1 bg-white border border-neutral-200 rounded p-1 flex-wrap">
          {['All', ...MUSCLE_GROUPS].map(mg => (
            <button key={mg} onClick={()=>setFilter(mg)}
              className={`font-display font-semibold tracking-[0.1em] text-xs px-3 py-1.5 rounded transition ${filter===mg ? 'bg-brand-black text-white' : 'text-neutral-600 hover:text-brand-black'}`}>
              {mg.toUpperCase()}
            </button>
          ))}
        </div>
        <div className="flex gap-2 flex-wrap">
          {canSelect && !isSelecting && (
            <button onClick={enterSelection}
              className="bg-brand-black hover:bg-neutral-800 text-white font-display font-bold tracking-[0.12em] text-sm px-4 py-2 rounded transition flex items-center gap-2">
              <Icon.Plus className="w-4 h-4"/>BUILD WORKOUT DAY
            </button>
          )}
          <button onClick={openAdd}
            className="bg-brand-orange hover:bg-brand-orange-dark text-white font-display font-bold tracking-[0.12em] text-sm px-4 py-2 rounded transition flex items-center gap-2">
            <Icon.Plus className="w-4 h-4"/>NEW EXERCISE
          </button>
        </div>
      </div>

      {/* Build-from-selection banner — visible only while the user is actively
          selecting. The CANCEL button gives a clear exit. */}
      {selectionMode && (
        <div className="bg-brand-black text-white rounded p-4 mb-5 flex items-center justify-between gap-3 flex-wrap sticky top-0 z-10">
          <div className="flex items-center gap-3 min-w-0">
            <div className="font-display font-bold tracking-[0.12em] text-[10px] text-white/60 uppercase">Building a workout day</div>
            <div className="font-display font-bold text-lg leading-none">
              {selectedIds.length === 0 ? 'Tap exercises to add them' : `${selectedIds.length} selected`}
            </div>
          </div>
          <div className="flex items-center gap-2">
            <button onClick={exitSelection}
              className="font-display font-bold tracking-[0.12em] text-[11px] text-white/70 hover:text-white px-3 py-1.5 transition">
              CANCEL
            </button>
            {selectedIds.length > 0 && (
              <button onClick={clearSelection}
                className="font-display font-bold tracking-[0.12em] text-[11px] text-white/70 hover:text-white px-3 py-1.5 transition">
                CLEAR
              </button>
            )}
            <button onClick={buildFromSelection} disabled={!selectedIds.length}
              className="font-display font-bold tracking-[0.12em] text-xs bg-brand-orange hover:bg-brand-orange-dark text-white disabled:bg-white/10 disabled:text-white/40 disabled:cursor-not-allowed px-4 py-2 rounded transition">
              BUILD {selectedIds.length > 0 ? `(${selectedIds.length})` : ''}
            </button>
          </div>
        </div>
      )}

      {Object.keys(grouped).length === 0 ? (
        <div className="bg-white border border-dashed border-neutral-300 rounded p-12 text-center">
          <p className="font-display text-xl text-neutral-500">No exercises in this muscle group yet</p>
          <p className="text-sm text-neutral-400 mt-1">Add one with the button above.</p>
        </div>
      ) : (
        <div className="space-y-8">
          {Object.entries(grouped).map(([mg, items]) => (
            <div key={mg}>
              <div className="flex items-center gap-3 mb-3">
                <div className="font-display font-bold text-xl">{mg.toUpperCase()}</div>
                <div className="flex-1 h-px bg-neutral-200"></div>
                <div className="text-[10px] font-display font-semibold tracking-[0.12em] text-neutral-500">
                  {items.length} {items.length===1 ? 'EXERCISE' : 'EXERCISES'}
                </div>
              </div>
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
                {items.map(ex => {
                  const editable = isEditable(ex);
                  const selected = selectionMode && selectedIds.includes(ex.id);
                  // In selection mode the entire card toggles selection. Edit/delete
                  // still work via stopPropagation on their own buttons.
                  const cardOnClick = selectionMode ? ()=>toggleSelect(ex.id) : undefined;
                  return (
                  <div key={ex.id} onClick={cardOnClick}
                    className={`bg-white border rounded p-4 flex flex-col transition ${
                      selected ? 'border-brand-orange ring-2 ring-brand-orange/30 bg-brand-orange/5' :
                      'border-neutral-200'
                    } ${selectionMode ? 'cursor-pointer hover:border-brand-orange' : ''}`}>
                    <div className="flex items-start justify-between gap-2 mb-2">
                      <div className="flex items-start gap-2 flex-1 min-w-0">
                        {selectionMode && (
                          <div className={`w-5 h-5 rounded border-2 flex items-center justify-center flex-shrink-0 transition mt-0.5 ${
                            selected ? 'bg-brand-orange border-brand-orange' : 'border-neutral-300 bg-white'
                          }`}>
                            {selected && <Icon.Check className="w-3.5 h-3.5 text-white"/>}
                          </div>
                        )}
                        <h3 className="font-display font-bold text-base leading-tight flex-1 min-w-0">{ex.name}</h3>
                      </div>
                      <div className="flex items-center gap-1 flex-shrink-0">
                        {canEdit && !editable && (
                          <span className="text-[9px] font-display font-bold tracking-[0.12em] text-brand-orange bg-brand-orange/10 px-2 py-0.5 rounded whitespace-nowrap">LIBRARY</span>
                        )}
                        <span className={`text-[9px] font-display font-bold tracking-[0.12em] px-2 py-0.5 rounded whitespace-nowrap ${CATEGORY_STYLES[ex.category] || 'bg-neutral-200 text-neutral-700'}`}>
                          {ex.category.toUpperCase()}
                        </span>
                      </div>
                    </div>
                    {ex.notes && <p className="text-sm text-neutral-600 leading-relaxed flex-1">{ex.notes}</p>}
                    {editable && (
                      <div className="flex justify-end gap-1 mt-3 -mb-1 -mr-1">
                        <button onClick={(e)=>{ e.stopPropagation(); openEdit(ex); }} title="Edit"
                          className="text-neutral-400 hover:text-brand-black p-1.5 transition"><Icon.Edit className="w-4 h-4"/></button>
                        <button onClick={(e)=>{ e.stopPropagation(); if(confirm(`Delete "${ex.name}"?`)) onDelete(ex.id); }} title="Delete"
                          className="text-neutral-400 hover:text-red-600 p-1.5 transition"><Icon.Trash className="w-4 h-4"/></button>
                      </div>
                    )}
                  </div>
                  );
                })}
              </div>
            </div>
          ))}
        </div>
      )}

      {modalOpen && <ExerciseModal existing={editing} onClose={()=>setModal(false)} onSave={handleSave}/>}
    </>
  );
}

/* =========================================================
   EXERCISE MODAL (add/edit)
   ========================================================= */
function ExerciseModal({ existing, onClose, onSave }) {
  const [form, setForm] = useState(existing || { name:'', muscle_group:'Legs', category:'Compound', notes:'' });
  const [errors, setErrors] = useState({});
  const submit = () => {
    const e = {};
    if (!form.name.trim()) e.name = 'Required';
    if (Object.keys(e).length) return setErrors(e);
    onSave(form);
  };
  return (
    <Modal onClose={onClose}>
      <div className="p-6">
        <h2 className="font-display font-bold text-3xl leading-tight">{existing ? 'Edit Exercise' : 'New Exercise'}</h2>
        <p className="text-neutral-500 text-sm mb-6 mt-1">{existing ? 'Update the exercise details below.' : 'Add a new exercise to your library.'}</p>
        <div className="space-y-4">
          <Field label="Name" error={errors.name}>
            <input value={form.name} onChange={(e)=>setForm({...form, name:e.target.value})} autoFocus placeholder="e.g. Bulgarian Split Squat"
              className="w-full border border-neutral-200 rounded px-3 py-2.5 focus:border-brand-orange transition"/>
          </Field>
          <div className="grid grid-cols-2 gap-4">
            <Field label="Muscle group">
              <select value={form.muscle_group} onChange={(e)=>setForm({...form, muscle_group:e.target.value})}
                className="w-full border border-neutral-200 rounded px-3 py-2.5 focus:border-brand-orange bg-white transition">
                {MUSCLE_GROUPS.map(mg => <option key={mg} value={mg}>{mg}</option>)}
              </select>
            </Field>
            <Field label="Category">
              <select value={form.category} onChange={(e)=>setForm({...form, category:e.target.value})}
                className="w-full border border-neutral-200 rounded px-3 py-2.5 focus:border-brand-orange bg-white transition">
                {CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
              </select>
            </Field>
          </div>
          <Field label="Coaching notes" hint="When to use this, what to watch for, progression cues.">
            <textarea rows={4} value={form.notes} onChange={(e)=>setForm({...form, notes:e.target.value})}
              placeholder="How you think about this exercise — when it goes in a program, what cues to emphasize…"
              className="w-full border border-neutral-200 rounded px-3 py-2.5 focus:border-brand-orange resize-none transition"/>
          </Field>
        </div>
        <div className="flex gap-3 mt-6">
          <button onClick={onClose} className="flex-1 border border-neutral-300 text-brand-black font-display font-bold tracking-[0.12em] py-3 rounded hover:bg-neutral-50 transition">CANCEL</button>
          <button onClick={submit} className="flex-1 bg-brand-orange hover:bg-brand-orange-dark text-white font-display font-bold tracking-[0.12em] py-3 rounded transition">
            {existing ? 'SAVE CHANGES' : 'ADD EXERCISE'}
          </button>
        </div>
      </div>
    </Modal>
  );
}

  return (
    <>
      <div className="flex items-center justify-end mb-5">

          className="bg-brand-orange hover:bg-brand-orange-dark text-white font-display font-bold tracking-[0.12em] text-sm px-4 py-2 rounded transition flex items-center gap-2">
          <Icon.Plus className="w-4 h-4"/>NEW WORKOUT DAY

      {templates.length === 0 ? (
        <div className="bg-white border border-dashed border-neutral-300 rounded p-12 text-center">
