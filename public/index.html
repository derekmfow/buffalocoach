function MealSuggestionModal({ log, existing, onClose, onSave }) {
  const [meals, setMeals] = useState(existing?.meals || []);
  const [message, setMessage] = useState(existing?.message || '');

  const save = () => {
    if (meals.length === 0) { alert('Add at least one meal suggestion before saving.'); return; }
    onSave({
      id: existing?.id,
      meal_log_id: log.id,
      meals,
      message: message.trim(),
    });
  };

  return (
    <Modal onClose={onClose} size="xl">
      <div className="p-6">
        <div className="flex items-start justify-between gap-3 mb-2">
          <div>
            <div className="font-display font-semibold text-[10px] tracking-[0.12em] text-brand-orange mb-1">
              {existing ? 'EDIT SUGGESTION' : 'SUGGEST MEALS'} · {displayDate(log.log_date).toUpperCase()}
            </div>
            <h2 className="font-display font-bold text-3xl leading-tight">Reply with meal ideas</h2>
          </div>
          <button onClick={onClose} className="text-neutral-400 hover:text-brand-black p-1 -mt-1 -mr-1 transition">
            <Icon.X className="w-5 h-5"/>
          </button>
        </div>
        <p className="text-neutral-600 text-sm mb-5">Build one or more meal suggestions for this upload. They'll show up inline on this log in the client's timeline.</p>

        {log.note && (
          <div className="bg-brand-orange-light border-l-2 border-brand-orange px-3 py-2 mb-5 rounded-r">
            <div className="font-display font-bold text-[10px] tracking-[0.12em] text-brand-orange mb-0.5">CLIENT'S NOTE</div>
            <p className="text-sm text-neutral-800 italic">"{log.note}"</p>
          </div>
        )}

        <MealBuilder value={meals} onChange={setMeals} compact/>

        <Field label="Coach message" hint="Optional — a quick note to frame the suggestion.">
          <textarea rows={3} value={message} onChange={(e)=>setMessage(e.target.value)}
            placeholder="e.g. 'Instead of skipping lunch, try prepping one of these for the fridge…'"
            className="w-full border border-neutral-200 rounded px-3 py-2.5 focus:border-brand-orange resize-none transition"/>
        </Field>

        <div className="flex gap-3 mt-6">
          <button onClick={onClose} className="flex-1 border border-neutral-300 text-brand-black font-display font-bold tracking-[0.12em] py-3 rounded hover:bg-neutral-50 transition">CANCEL</button>
          <button onClick={save} className="flex-1 bg-brand-orange hover:bg-brand-orange-dark text-white font-display font-bold tracking-[0.12em] py-3 rounded transition">
            {existing ? 'SAVE CHANGES' : 'ATTACH SUGGESTION'}
          </button>
        </div>
      </div>
    </Modal>
  );
}

/* =========================================================
   LEADS VIEW — inquiries from the HAM app CTA + any direct leads.
   Columns: New (unreviewed) · Contacted (reached out, waiting) ·
   Converted (became a client) · Archived (spam or no-go).
   ========================================================= */
function LeadsView({ leads, onUpdateLead, onDeleteLead, onConvertLead }) {
  const [filter, setFilter] = useState('active'); // active | converted | archived
  const [expandedId, setExpandedId] = useState(null);

  const counts = {
    new:       leads.filter(l => l.status === 'new').length,
    contacted: leads.filter(l => l.status === 'contacted').length,
    converted: leads.filter(l => l.status === 'converted').length,
    archived:  leads.filter(l => l.status === 'archived').length,
  };

  const filtered = leads.filter(l => {
    if (filter === 'active')    return l.status === 'new' || l.status === 'contacted';
    if (filter === 'converted') return l.status === 'converted';
    if (filter === 'archived')  return l.status === 'archived';
    return true;
  });

  const timeAgo = (iso) => {
    const diff = Date.now() - new Date(iso).getTime();
    const mins  = Math.floor(diff / 60000);
    const hours = Math.floor(diff / 3600000);
    const days  = Math.floor(diff / 86400000);
    if (mins < 1)  return 'just now';
    if (mins < 60) return mins + 'm ago';
    if (hours < 24) return hours + 'h ago';
    if (days < 7)   return days + 'd ago';
    return new Date(iso).toLocaleDateString('en-US', { month:'short', day:'numeric' });
  };

  const statusStyles = {
    new:       'bg-brand-orange text-white',
    contacted: 'bg-amber-100 text-amber-900 border border-amber-300',
    converted: 'bg-emerald-100 text-emerald-900 border border-emerald-300',
    archived:  'bg-neutral-200 text-neutral-600',
  };

  return (
    <div className="max-w-7xl mx-auto px-6 py-8">
      <div className="flex items-end justify-between mb-8">
        <div>
          <h1 className="font-display font-bold text-4xl leading-none">Leads</h1>
          <p className="text-neutral-500 text-sm mt-2">Inquiries from the HAM app. Work them down — mark contacted, convert the good ones, archive the rest.</p>
        </div>
      </div>

      <div className="grid grid-cols-4 gap-4 mb-6">
        <StatCard label="NEW"       value={counts.new}       accent={counts.new > 0 ? 'orange' : undefined}/>
        <StatCard label="CONTACTED" value={counts.contacted}/>
        <StatCard label="CONVERTED" value={counts.converted}/>
        <StatCard label="ARCHIVED"  value={counts.archived}/>
      </div>

      <div className="flex gap-1 mb-4 border-b border-neutral-200">
        {[
          { id:'active',    label:'ACTIVE',    count: counts.new + counts.contacted },
          { id:'converted', label:'CONVERTED', count: counts.converted },
          { id:'archived',  label:'ARCHIVED',  count: counts.archived },
        ].map(tab => (
          <button key={tab.id} onClick={()=>setFilter(tab.id)}
            className={`font-display font-bold tracking-[0.12em] text-xs px-4 py-2 -mb-px border-b-2 transition ${filter===tab.id ? 'border-brand-orange text-brand-black' : 'border-transparent text-neutral-500 hover:text-brand-black'}`}>
            {tab.label} <span className="text-neutral-400 ml-1">{tab.count}</span>
          </button>
        ))}
      </div>

      {filtered.length === 0 ? (
        <div className="text-center py-16 text-neutral-400">
          <div className="font-display tracking-[0.2em] text-sm">
            {filter === 'active'    && 'NO ACTIVE LEADS — YOU\'RE CAUGHT UP'}
            {filter === 'converted' && 'NO CONVERTED LEADS YET'}
            {filter === 'archived'  && 'NO ARCHIVED LEADS'}
          </div>
        </div>
      ) : (
        <div className="space-y-2">
          {filtered.map(lead => {
            const isOpen = expandedId === lead.id;
            return (
              <div key={lead.id} className={`border rounded bg-white transition ${isOpen ? 'border-brand-orange shadow-sm' : 'border-neutral-200 hover:border-neutral-300'}`}>
                <button onClick={()=>setExpandedId(isOpen ? null : lead.id)}
                  className="w-full text-left px-5 py-4 flex items-center gap-4">
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-3 flex-wrap">
                      <div className="font-display font-bold text-lg leading-tight">{lead.name}</div>
                      <span className={`font-display font-bold tracking-[0.12em] text-[10px] px-2 py-0.5 rounded uppercase ${statusStyles[lead.status]}`}>
                        {lead.status}
                      </span>
                    </div>
                    <div className="text-sm text-neutral-600 mt-0.5 truncate">
                      {lead.email}
                      {lead.phone && <span className="text-neutral-400 ml-2">· {lead.phone}</span>}
                    </div>
                  </div>
                  <div className="text-xs text-neutral-400 font-display tracking-[0.1em] flex-shrink-0">{timeAgo(lead.created_at)}</div>
                  <div className={`text-neutral-400 transition-transform ${isOpen ? 'rotate-90' : ''}`}>›</div>
                </button>

                {isOpen && (
                  <div className="border-t border-neutral-100 px-5 py-4 space-y-4 bg-neutral-50/50">
                    {lead.message && (
                      <div>
                        <div className="font-display font-bold tracking-[0.12em] text-[10px] text-neutral-500 mb-1">THEIR MESSAGE</div>
                        <p className="text-sm leading-relaxed whitespace-pre-wrap text-neutral-800">{lead.message}</p>
                      </div>
                    )}

                    <LeadCoachNotes lead={lead} onSave={(notes)=>onUpdateLead(lead.id, { coach_notes: notes })}/>

                    <div className="flex flex-wrap gap-2 pt-2">
                      {lead.status === 'new' && (
                        <button onClick={()=>onUpdateLead(lead.id, { status:'contacted' })}
                          className="font-display font-bold tracking-[0.1em] text-xs px-4 py-2 rounded border border-amber-400 text-amber-900 bg-amber-50 hover:bg-amber-100 transition">
                          MARK CONTACTED
                        </button>
                      )}
                      {(lead.status === 'new' || lead.status === 'contacted') && (
                        <>
                          <button onClick={()=>onConvertLead(lead)}
                            className="font-display font-bold tracking-[0.1em] text-xs px-4 py-2 rounded bg-brand-orange hover:bg-brand-orange-dark text-white transition">
                            CONVERT TO CLIENT
                          </button>
                          <button onClick={()=>onUpdateLead(lead.id, { status:'archived' })}
                            className="font-display font-bold tracking-[0.1em] text-xs px-4 py-2 rounded border border-neutral-300 text-neutral-600 hover:bg-neutral-100 transition">
                            ARCHIVE
                          </button>
                        </>
                      )}
                      {lead.status === 'archived' && (
                        <button onClick={()=>onUpdateLead(lead.id, { status:'new' })}
                          className="font-display font-bold tracking-[0.1em] text-xs px-4 py-2 rounded border border-neutral-300 text-neutral-700 hover:bg-neutral-100 transition">
                          RESTORE TO NEW
                        </button>
                      )}
                      <div className="flex-1"/>
                      <button onClick={()=>{
                        if (confirm('Permanently delete this lead? This cannot be undone.')) onDeleteLead(lead.id);
                      }}
                        className="font-display font-bold tracking-[0.1em] text-xs px-4 py-2 rounded text-red-700 hover:bg-red-50 transition">
                        DELETE
                      </button>
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// Editable coach notes block inside each expanded lead row.
function LeadCoachNotes({ lead, onSave }) {
  const [value, setValue] = useState(lead.coach_notes || '');
  const [saving, setSaving] = useState(false);
  const [savedAt, setSavedAt] = useState(0);
  // If a lead updates externally, sync
  useEffect(() => { setValue(lead.coach_notes || ''); }, [lead.id, lead.coach_notes]);
  const dirty = value !== (lead.coach_notes || '');
  const save = async () => {
    if (!dirty || saving) return;
    setSaving(true);
    await onSave(value);
    setSaving(false);
    setSavedAt(Date.now());
    setTimeout(() => setSavedAt(0), 2000);
  };
  return (
    <div>
      <div className="font-display font-bold tracking-[0.12em] text-[10px] text-neutral-500 mb-1">PRIVATE NOTES (only you see these)</div>
      <textarea rows={2} value={value} onChange={(e)=>setValue(e.target.value)}
        placeholder="e.g. Referred by Mike. Wants to focus on post-partum body comp. Called Tue 3/12."
        className="w-full border border-neutral-200 rounded px-3 py-2 text-sm focus:border-brand-orange resize-none bg-white transition"/>
      {dirty && (
        <div className="mt-2">
          <button onClick={save} disabled={saving}
            className="font-display font-bold tracking-[0.1em] text-xs px-3 py-1.5 rounded bg-neutral-900 hover:bg-brand-black text-white disabled:opacity-50 transition">
            {saving ? 'SAVING…' : 'SAVE NOTES'}
          </button>
        </div>
      )}
      {savedAt > 0 && <div className="text-xs text-emerald-700 mt-1">✓ Saved</div>}
    </div>
  );
}

/* =========================================================
   CLIENT LOGIN — email + 4-digit PIN.

   Lives at the /client path. Separate from the coach login so
   clients land in a clean, branded entry point that matches the
   welcome email they just received.
   ========================================================= */
function ClientLogin({ onLogin }) {
  const [email, setEmail] = useState('');
  const [pin, setPin] = useState('');
  const [error, setError] = useState('');
  const [submitting, setSubmitting] = useState(false);

  const submit = async (e) => {
    e?.preventDefault();
    if (!email.trim() || !/^\d{4}$/.test(pin)) {
      setError('Enter your email and 4-digit PIN.');
      return;
    }
    setSubmitting(true);
    setError('');
    try {
      const result = await api.post('/api/client-login', { email: email.trim(), pin });
      onLogin(result.client);
    } catch (err) {
      setError(err.message || 'Login failed.');
      setSubmitting(false);
    }
  };

  return (
    <div className="min-h-screen bg-brand-black text-white flex items-center justify-center p-6">
      <div className="w-full max-w-sm">
        <div className="flex items-center gap-2 mb-10">
          <div className="w-2.5 h-2.5 bg-brand-orange"/>
          <span className="font-display font-bold text-xs tracking-[0.25em]">THE BUFFALO METHOD</span>
        </div>
        <h1 className="font-display font-bold text-5xl leading-none mb-2">Welcome<br/>back.</h1>
        <p className="text-neutral-400 text-sm mb-8">Log in with the email and PIN Derek sent you.</p>

        <form onSubmit={submit} className="space-y-4">
          <div>
            <label className="font-display font-bold tracking-[0.12em] text-[10px] text-neutral-400 block mb-1.5">EMAIL</label>
            <input type="email" autoComplete="email" autoFocus
              value={email} onChange={(e)=>setEmail(e.target.value)}
              disabled={submitting}
              className="w-full bg-neutral-900 border border-neutral-700 rounded px-3 py-2.5 focus:border-brand-orange focus:outline-none transition disabled:opacity-60"/>
          </div>
          <div>
            <label className="font-display font-bold tracking-[0.12em] text-[10px] text-neutral-400 block mb-1.5">4-DIGIT PIN</label>
            <input type="text" inputMode="numeric" maxLength={4} autoComplete="off"
              value={pin} onChange={(e)=>setPin(e.target.value.replace(/\D/g, ''))}
              disabled={submitting} placeholder="0000"
              className="w-full bg-neutral-900 border border-neutral-700 rounded px-3 py-2.5 font-mono text-2xl tracking-[0.5em] text-center focus:border-brand-orange focus:outline-none transition disabled:opacity-60"/>
          </div>

          {error && <div className="text-red-400 text-sm bg-red-950/30 border border-red-900/50 rounded px-3 py-2">{error}</div>}

          <button type="submit" disabled={submitting}
            className="w-full bg-brand-orange hover:bg-brand-orange-dark text-white font-display font-bold tracking-[0.15em] text-sm py-3 rounded transition disabled:opacity-60 disabled:cursor-wait">
            {submitting ? 'LOGGING IN…' : 'LOG IN'}
          </button>
        </form>

        <p className="text-neutral-500 text-xs mt-8 leading-relaxed">
          Lost your PIN? Text Derek directly — he'll reset it and send a new welcome email.
        </p>
      </div>
    </div>
  );
}

/* =========================================================
   CLIENT ROOT — session check + login/app routing for the /client path.
   ========================================================= */
function ClientRoot() {
  const [state, setState] = useState({ loading: true, client: null });

  useEffect(() => {
    api.get('/api/me')
      .then(me => {
        if (me.role === 'client') setState({ loading: false, client: me.client });
        else setState({ loading: false, client: null });
      })
      .catch(() => setState({ loading: false, client: null }));
  }, []);

  const logout = async () => {
    try { await api.post('/api/logout'); } catch {}
    setState({ loading: false, client: null });
  };

  if (state.loading) {
    return (
      <div className="min-h-screen flex items-center justify-center bg-brand-black">
        <div className="text-white/60 font-display tracking-[0.2em] text-sm">LOADING…</div>
      </div>
    );
  }
  if (!state.client) {
    return <ClientLogin onLogin={(client)=>setState({ loading: false, client })}/>;
  }
  return <ClientApp client={state.client} onLogout={logout}/>;
}

/* =========================================================
   APP ROOT
   ========================================================= */
function App() {
  // Route by URL path: /client* → client experience, everything else → coach.
  // Deliberately simple: no history/back handling since each side has one
  // entry point. If path-based routing grows, switch to a real router.
  const isClientPath = typeof window !== 'undefined' && window.location.pathname.startsWith('/client');
  if (isClientPath) return <ClientRoot/>;

  return <CoachApp/>;
}

function CoachApp() {
  // Auth state — check session on mount
  const [authState, setAuthState] = useState({ loading: true, role: null });

  // UI navigation state
  const [view, setView] = useState('list'); // list | detail | workouts | template-editor | program-editor | meal-builder | leads
  const [selectedId, setSelectedId] = useState(null);
  const [addOpen, setAddOpen] = useState(false);
  const [selectedTemplateId, setSelectedTemplateId] = useState(null);
  const [selectedProgramId, setSelectedProgramId] = useState(null);

  // Data — all start empty, get populated from the API
  const [clients, setClients]     = useState([]);
  const [mealLogs, setMealLogs]   = useState([]);
  const [checkins, setCheckins]   = useState([]);
  const [notes, setNotes]         = useState([]);
  const [questions, setQuestions] = useState([]);
  const [exercises, setExercises] = useState([]);
  const [templates, setTemplates] = useState([]);
  const [programs, setPrograms]   = useState([]);
  const [mealSuggestions, setMealSuggestions] = useState([]);
  const [leads, setLeads]         = useState([]);
  const [leadToConvert, setLeadToConvert] = useState(null); // when set, AddClientModal opens pre-filled
  const [dataLoading, setDataLoading] = useState(false);

  // Check session on boot
  useEffect(() => {
    api.get('/api/me')
      .then(me => {
        // If a client accidentally lands here, route them to their own app instead of stranding them on the coach login.
        if (me.role === 'client') {
          window.location.replace('/client');
          return;
        }
        setAuthState({ loading: false, role: me.role });
      })
      .catch(() => setAuthState({ loading: false, role: null }));
  }, []);

  // After login, load all the data the coach dashboard needs
  const loadAll = useCallback(async () => {
    setDataLoading(true);
    try {
      const [c, l, k, n, q, e, t, p, s, ld] = await Promise.all([
        api.get('/api/clients'),
        api.get('/api/meal-logs'),
        api.get('/api/checkins'),
        api.get('/api/notes'),
        api.get('/api/questions'),
        api.get('/api/exercises'),
        api.get('/api/templates'),
        api.get('/api/programs'),
        api.get('/api/meal-suggestions'),
        api.get('/api/leads'),
      ]);
      setClients(c); setMealLogs(l); setCheckins(k); setNotes(n); setQuestions(q);
      setExercises(e); setTemplates(t); setPrograms(p); setMealSuggestions(s);
      setLeads(ld);
    } catch (err) {
      console.error('Failed to load data:', err);
      alert('Failed to load data: ' + err.message);
    } finally {
      setDataLoading(false);
    }
  }, []);

  useEffect(() => {
    if (authState.role === 'coach') loadAll();
  }, [authState.role, loadAll]);

  // ---- Clients ----
  const addClient = async (data) => {
    try {
      const result = await api.post('/api/clients', data);
      // Server response is now an envelope: { client, email_sent, email_error }
      const created = result.client;
      setClients(prev => [created, ...prev]);

      // If this client came from converting a lead, mark the lead converted
      if (leadToConvert) {
        try {
          const updatedLead = await api.patch('/api/leads/' + leadToConvert.id, {
            status: 'converted',
            converted_to_client_id: created.id,
          });
          setLeads(prev => prev.map(l => l.id === updatedLead.id ? updatedLead : l));
        } catch (e) {
          // Client was created — don't block success, but surface the issue
          console.warn('Client created but failed to update lead:', e.message);
        }
      }

      setAddOpen(false);
      setLeadToConvert(null);

      // Surface email delivery status. Coach needs to know whether to fall back
      // to manual PIN delivery, so we don't silently swallow failures.
      if (result.email_sent) {
        // Deliberately quiet on success — don't interrupt flow with a modal.
        console.log(`[welcome email] sent to ${created.email}`);
      } else {
        alert(
          `Client ${created.name} was created, but the welcome email didn't send:\n\n` +
          `${result.email_error || 'unknown error'}\n\n` +
          `Text them their PIN manually, or use "Resend login" on their profile.`
        );
      }
    } catch (e) { alert('Failed to create client: ' + e.message); }
  };
  const closeAddClient = () => { setAddOpen(false); setLeadToConvert(null); };

  // ---- Leads ----
  const updateLead = async (id, patch) => {
    try {
      const updated = await api.patch('/api/leads/' + id, patch);
      setLeads(prev => prev.map(l => l.id === id ? updated : l));
    } catch (e) { alert('Failed to update lead: ' + e.message); }
  };
  const deleteLead = async (id) => {
    try {
      await api.del('/api/leads/' + id);
      setLeads(prev => prev.filter(l => l.id !== id));
    } catch (e) { alert('Failed to delete lead: ' + e.message); }
  };
  const convertLead = (lead) => {
    setLeadToConvert(lead);
    setAddOpen(true);
  };

  // ---- Meal logs ----
  // addLog receives the full saved object (UploadModal does the POST itself for multipart)
  const addLog = (saved) => setMealLogs(prev => [saved, ...prev]);

  // ---- Coach notes ----
  const addNote = async (cid, text) => {
    try {
      const created = await api.post('/api/notes', { client_id: cid, note: text });
      setNotes(prev => [created, ...prev]);
    } catch (e) { alert('Failed to add note: ' + e.message); }
  };
  const updateNote = async (id, text) => {
    try {
      const updated = await api.patch('/api/notes/' + id, { note: text });
      setNotes(prev => prev.map(n => n.id === id ? updated : n));
    } catch (e) { alert('Failed to update note: ' + e.message); }
  };
  const deleteNote = async (id) => {
    try {
      await api.del('/api/notes/' + id);
      setNotes(prev => prev.filter(n => n.id !== id));
    } catch (e) { alert('Failed to delete note: ' + e.message); }
  };

  // ---- Client questions ----
  const toggleResolveQuestion = async (id) => {
    const current = questions.find(q => q.id === id);
    if (!current) return;
    try {
      const updated = await api.patch('/api/questions/' + id, { is_resolved: !current.is_resolved });
      setQuestions(prev => prev.map(q => q.id === id ? updated : q));
    } catch (e) { alert('Failed to update question: ' + e.message); }
  };

  // ---- Exercises ----
  const addExercise = async (data) => {
    try {
      const created = await api.post('/api/exercises', data);
      setExercises(prev => [...prev, created]);
    } catch (e) { alert('Failed to add exercise: ' + e.message); }
  };
  const updateExercise = async (id, data) => {
    try {
      const updated = await api.patch('/api/exercises/' + id, data);
      setExercises(prev => prev.map(e => e.id === id ? updated : e));
    } catch (e) { alert('Failed to update exercise: ' + e.message); }
  };
  const deleteExercise = async (id) => {
    try {
      await api.del('/api/exercises/' + id);
      setExercises(prev => prev.filter(e => e.id !== id));
    } catch (e) { alert('Failed to delete exercise: ' + e.message); }
  };

  // ---- Templates ----
  const newTemplate  = () => { setSelectedTemplateId('__new__'); setView('template-editor'); };
  const editTemplate = (id) => { setSelectedTemplateId(id); setView('template-editor'); };
  const saveTemplate = async (data) => {
    try {
      if (!data.id) {
        const created = await api.post('/api/templates', data);
        setTemplates(prev => [...prev, created]);
      } else {
        const { id, ...rest } = data;
        const updated = await api.patch('/api/templates/' + id, rest);
        setTemplates(prev => prev.map(t => t.id === id ? updated : t));
      }
      setSelectedTemplateId(null);
      setView('workouts');
    } catch (e) { alert('Failed to save template: ' + e.message); }
  };
  const deleteTemplate = async (id) => {
    try {
      await api.del('/api/templates/' + id);
      setTemplates(prev => prev.filter(t => t.id !== id));
    } catch (e) { alert('Failed to delete template: ' + e.message); }
  };

  // ---- Programs ----
  const newProgram  = () => { setSelectedProgramId('__new__'); setView('program-editor'); };
  const editProgram = (id) => { setSelectedProgramId(id); setView('program-editor'); };
  const saveProgram = async (data) => {
    try {
      if (!data.id) {
        const created = await api.post('/api/programs', data);
        setPrograms(prev => [...prev, created]);
      } else {
        const { id, ...rest } = data;
        const updated = await api.patch('/api/programs/' + id, rest);
        setPrograms(prev => prev.map(p => p.id === id ? updated : p));
      }
      setSelectedProgramId(null);
      setView('workouts');
    } catch (e) { alert('Failed to save program: ' + e.message); }
  };
  const deleteProgram = async (id) => {
    try {
      await api.del('/api/programs/' + id);
      setPrograms(prev => prev.filter(p => p.id !== id));
    } catch (e) { alert('Failed to delete program: ' + e.message); }
  };

  // ---- Meal suggestions ----
  const saveMealSuggestion = async (data) => {
    try {
      const saved = await api.post('/api/meal-suggestions', data);
      setMealSuggestions(prev => {
        // Dedupe by meal_log_id (server enforces uniqueness)
        const filtered = prev.filter(s => s.meal_log_id !== saved.meal_log_id);
        return [...filtered, saved];
      });
    } catch (e) { alert('Failed to save suggestion: ' + e.message); }
  };
  const deleteMealSuggestion = async (id) => {
    try {
      await api.del('/api/meal-suggestions/' + id);
      setMealSuggestions(prev => prev.filter(s => s.id !== id));
    } catch (e) { alert('Failed to delete suggestion: ' + e.message); }
  };

  const logout = async () => {
    try { await api.post('/api/logout'); } catch {}
    setAuthState({ loading: false, role: null });
    setView('list'); setSelectedId(null); setSelectedTemplateId(null); setSelectedProgramId(null);
    setClients([]); setMealLogs([]); setCheckins([]); setNotes([]); setQuestions([]);
    setExercises([]); setTemplates([]); setPrograms([]); setMealSuggestions([]);
    setLeads([]);
  };

  const selectedClient   = clients.find(c => c.id === selectedId);
  const selectedTemplate = selectedTemplateId === '__new__'
    ? { id:null, name:'', description:'', exercises:[] }
    : templates.find(t => t.id === selectedTemplateId);
  const selectedProgram = selectedProgramId === '__new__'
    ? { id:null, name:'', description:'', notes:'', days:[] }
    : programs.find(p => p.id === selectedProgramId);

  const currentSection =
    (view === 'workouts' || view === 'template-editor' || view === 'program-editor') ? 'workouts' :
    (view === 'meal-builder') ? 'meal-builder' :
    (view === 'leads') ? 'leads' :
    'clients';

  const navigate = (section) => {
    if (section === 'clients')      { setView('list');         setSelectedId(null); setSelectedTemplateId(null); setSelectedProgramId(null); }
    if (section === 'leads')        { setView('leads');        setSelectedId(null); setSelectedTemplateId(null); setSelectedProgramId(null); }
    if (section === 'workouts')     { setView('workouts');     setSelectedId(null); setSelectedTemplateId(null); setSelectedProgramId(null); }
    if (section === 'meal-builder') { setView('meal-builder'); setSelectedId(null); setSelectedTemplateId(null); setSelectedProgramId(null); }
  };

  const newLeadsCount = leads.filter(l => l.status === 'new').length;

  // ---- Render ----
  if (authState.loading) {
    return (
      <div className="min-h-screen flex items-center justify-center bg-brand-black">
        <div className="text-white/60 font-display tracking-[0.2em] text-sm">LOADING…</div>
      </div>
    );
  }
  if (authState.role !== 'coach') {
    return <CoachLogin onLogin={()=>setAuthState({ loading: false, role: 'coach' })}/>;
  }

  return (
    <div className="min-h-screen">
      <DashboardHeader
        onLogout={logout}
        currentSection={currentSection}
        onNavigate={navigate}
        newLeadsCount={newLeadsCount}
      />

      {dataLoading && clients.length === 0 ? (
        <div className="max-w-7xl mx-auto px-6 py-16 text-center">
          <div className="text-neutral-400 font-display tracking-[0.2em] text-sm">LOADING YOUR DATA…</div>
        </div>
      ) : (
        <>
          {view === 'list' && (
            <ClientListView
              clients={clients}
              mealLogs={mealLogs}
              onSelectClient={(id)=>{ setSelectedId(id); setView('detail'); }}
              onAddClient={()=>setAddOpen(true)}
            />
          )}

          {view === 'detail' && selectedClient && (
            <ClientDetailView
              client={selectedClient}
              mealLogs={mealLogs}
              checkins={checkins}
              notes={notes}
              questions={questions}
              mealSuggestions={mealSuggestions}
              onAddLog={addLog}
              onAddNote={addNote}
              onUpdateNote={updateNote}
              onDeleteNote={deleteNote}
              onToggleResolveQuestion={toggleResolveQuestion}
              onSaveMealSuggestion={saveMealSuggestion}
              onDeleteMealSuggestion={deleteMealSuggestion}
              onBack={()=>{ setView('list'); setSelectedId(null); }}
            />
          )}

          {view === 'meal-builder' && <MealBuilderView/>}

          {view === 'leads' && (
            <LeadsView
              leads={leads}
              onUpdateLead={updateLead}
              onDeleteLead={deleteLead}
              onConvertLead={convertLead}
            />
          )}

          {view === 'workouts' && (
            <WorkoutsView
              exercises={exercises}
              templates={templates}
              programs={programs}
              onAddExercise={addExercise}
              onUpdateExercise={updateExercise}
              onDeleteExercise={deleteExercise}
              onNewTemplate={newTemplate}
              onEditTemplate={editTemplate}
              onDeleteTemplate={deleteTemplate}
              onNewProgram={newProgram}
              onEditProgram={editProgram}
              onDeleteProgram={deleteProgram}
            />
          )}

          {view === 'template-editor' && selectedTemplate && (
            <TemplateEditor
              template={selectedTemplate}
              exercises={exercises}
              onSave={saveTemplate}
              onBack={()=>{ setSelectedTemplateId(null); setView('workouts'); }}
            />
          )}

          {view === 'program-editor' && selectedProgram && (
            <ProgramEditor
              program={selectedProgram}
              templates={templates}
              onSave={saveProgram}
              onBack={()=>{ setSelectedProgramId(null); setView('workouts'); }}
            />
          )}
        </>
      )}

      {addOpen && <AddClientModal onClose={closeAddClient} onSave={addClient} prefill={leadToConvert}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
