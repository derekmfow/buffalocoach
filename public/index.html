/* =========================================================
   EXERCISE PICKER (smart slide-out panel)
   ========================================================= */
function ExercisePicker({ exercises, excludeIds = [], onPick, onClose }) {
  const [query, setQuery] = useState('');
  const [mgFilter, setMgFilter] = useState('All');
  const [catFilter, setCatFilter] = useState('All');

  useEffect(() => {
    const h = (e) => e.key === 'Escape' && onClose();
    document.addEventListener('keydown', h);
    return () => document.removeEventListener('keydown', h);
  }, [onClose]);

  const filtered = exercises.filter(e => {
    if (mgFilter  !== 'All' && e.muscle_group !== mgFilter)  return false;
    if (catFilter !== 'All' && e.category     !== catFilter) return false;
    if (query.trim()) {
      const q = query.toLowerCase();
      if (!e.name.toLowerCase().includes(q) &&
          !(e.notes || '').toLowerCase().includes(q) &&
          !e.muscle_group.toLowerCase().includes(q)) return false;
    }
    return true;
  });

  const grouped = MUSCLE_GROUPS.reduce((acc, mg) => {
    const items = filtered.filter(e => e.muscle_group === mg);
    if (items.length) acc[mg] = items;
    return acc;
  }, {});

  return (
    <div className="fixed inset-0 bg-brand-black/60 z-50 flex justify-end animate-[fade_0.15s_ease-out]" onClick={onClose}>
      <div className="bg-white w-full max-w-xl h-full shadow-2xl flex flex-col" onClick={(e)=>e.stopPropagation()}>
        {/* Header */}
        <div className="px-6 pt-6 pb-4 border-b border-neutral-200 flex-shrink-0">
          <div className="flex items-start justify-between gap-3 mb-4">
            <div>
              <h2 className="font-display font-bold text-2xl leading-none">Add Exercise</h2>
              <p className="text-neutral-500 text-sm mt-1">Filter, search, and tap to add to this slot.</p>
            </div>
            <button onClick={onClose} className="text-neutral-400 hover:text-brand-black p-1 -mr-1 transition">
              <Icon.X className="w-5 h-5"/>
            </button>
          </div>

          <div className="relative mb-3">
            <Icon.Search className="w-4 h-4 text-neutral-400 absolute left-3 top-1/2 -translate-y-1/2"/>
            <input value={query} onChange={(e)=>setQuery(e.target.value)} autoFocus
              placeholder="Search by name, muscle group, or notes…"
              className="w-full border border-neutral-200 rounded py-2.5 pl-10 pr-4 focus:outline-none focus:border-brand-orange transition"/>
          </div>

          <div className="flex flex-wrap gap-3">
            <div>
              <div className="font-display font-semibold text-[10px] tracking-[0.12em] text-neutral-500 mb-1">MUSCLE GROUP</div>
              <div className="flex flex-wrap gap-1 bg-neutral-50 border border-neutral-200 rounded p-1">
                {['All', ...MUSCLE_GROUPS].map(mg => (
                  <button key={mg} onClick={()=>setMgFilter(mg)}
                    className={`font-display font-semibold tracking-[0.1em] text-[10px] px-2.5 py-1 rounded transition ${mgFilter===mg ? 'bg-brand-black text-white' : 'text-neutral-600 hover:text-brand-black'}`}>
                    {mg.toUpperCase()}
                  </button>
                ))}
              </div>
            </div>
            <div>
              <div className="font-display font-semibold text-[10px] tracking-[0.12em] text-neutral-500 mb-1">CATEGORY</div>
              <div className="flex gap-1 bg-neutral-50 border border-neutral-200 rounded p-1">
                {['All', ...CATEGORIES].map(c => (
                  <button key={c} onClick={()=>setCatFilter(c)}
                    className={`font-display font-semibold tracking-[0.1em] text-[10px] px-2.5 py-1 rounded transition ${catFilter===c ? 'bg-brand-black text-white' : 'text-neutral-600 hover:text-brand-black'}`}>
                    {c.toUpperCase()}
                  </button>
                ))}
              </div>
            </div>
          </div>
        </div>

        {/* Results */}
        <div className="flex-1 overflow-y-auto px-6 py-4">
          {Object.keys(grouped).length === 0 ? (
            <div className="text-center py-16">
              <p className="font-display text-lg text-neutral-500">No matches</p>
              <p className="text-sm text-neutral-400 mt-1">Try clearing filters or a different search.</p>
            </div>
          ) : (
            <div className="space-y-6">
              {Object.entries(grouped).map(([mg, items]) => (
                <div key={mg}>
                  <div className="font-display font-bold text-xs tracking-[0.12em] text-neutral-500 mb-2">
                    {mg.toUpperCase()} <span className="text-neutral-400">({items.length})</span>
                  </div>
                  <div className="space-y-2">
                    {items.map(ex => {
                      const already = excludeIds.includes(ex.id);
                      return (
                        <button key={ex.id} onClick={()=>!already && onPick(ex.id)} disabled={already}
                          className={`w-full text-left border rounded p-3 transition group ${
                            already
                              ? 'border-neutral-200 bg-neutral-50 opacity-60 cursor-not-allowed'
                              : 'border-neutral-200 hover:border-brand-orange hover:bg-brand-orange-light/30'
                          }`}>
                          <div className="flex items-start justify-between gap-2 mb-1">
                            <div className="font-display font-bold text-base leading-tight flex items-center gap-2">
                              {ex.name}
                              {already && <span className="text-[9px] font-display font-bold tracking-[0.12em] text-neutral-500 bg-neutral-200 px-1.5 py-0.5 rounded">IN TEMPLATE</span>}
                            </div>
                            <span className={`text-[9px] font-display font-bold tracking-[0.12em] px-2 py-0.5 rounded whitespace-nowrap ${CATEGORY_STYLES[ex.category] || 'bg-neutral-200 text-neutral-700'}`}>
                              {ex.category.toUpperCase()}
                            </span>
                          </div>
                          {ex.notes && <p className="text-sm text-neutral-600 leading-snug">{ex.notes}</p>}
                        </button>
                      );
                    })}
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* =========================================================
   TEMPLATE EDITOR (full page)
   ========================================================= */
function TemplateEditor({ template, exercises, onSave, onBack }) {
  const isNew = !template.id;
  const [name, setName] = useState(template.name || '');
  const [description, setDescription] = useState(template.description || '');
  const [items, setItems] = useState(template.exercises || []);
  const [pickerFor, setPickerFor] = useState(null); // null | 'new' | { index: n } to swap

  const exName = (id) => exercises.find(e => e.id === id)?.name || '(removed)';
  const exMG   = (id) => exercises.find(e => e.id === id)?.muscle_group || '';
  const exCat  = (id) => exercises.find(e => e.id === id)?.category || '';

  const handlePick = (exerciseId) => {
    if (pickerFor === 'new') {
      setItems(prev => [...prev, {
        exercise_id: exerciseId, order: prev.length+1,
        sets: 3, reps: '8-10', rest_seconds: 90, rationale: '',
      }]);
    } else if (pickerFor && typeof pickerFor.index === 'number') {
      setItems(prev => prev.map((it, i) => i === pickerFor.index ? { ...it, exercise_id: exerciseId } : it));
    }
    setPickerFor(null);
  };

  const updateItem = (idx, patch) => setItems(prev => prev.map((it,i) => i===idx ? {...it, ...patch} : it));
  const removeItem = (idx) => setItems(prev => prev.filter((_,i)=>i!==idx).map((it,i)=>({...it, order:i+1})));
  const moveItem = (idx, dir) => {
    const j = idx + dir;
    if (j < 0 || j >= items.length) return;
    const next = [...items];
    [next[idx], next[j]] = [next[j], next[idx]];
    setItems(next.map((it,i)=>({...it, order:i+1})));
  };

  const save = () => {
    if (!name.trim()) { alert('Template name is required'); return; }
    onSave({ ...template, name:name.trim(), description:description.trim(), exercises:items });
  };

  const fmtRest = (s) => s >= 60 ? `${Math.floor(s/60)} min${s%60 ? ` ${s%60} sec` : ''}` : `${s} sec`;
  const fmtSetsReps = (sets, reps) => `${sets} ${sets===1?'set':'sets'} of ${reps} reps`;

  return (
    <div className="max-w-5xl mx-auto px-6 py-6">
      <button onClick={onBack} className="text-neutral-500 hover:text-brand-black text-xs font-display font-semibold tracking-[0.12em] transition flex items-center gap-1.5 mb-5">
        <Icon.Arrow className="w-3.5 h-3.5"/>ALL TEMPLATES
      </button>

      <div className="flex items-start justify-between gap-4 mb-6 flex-wrap">
        <div>
          <div className="font-display font-semibold text-[10px] tracking-[0.12em] text-brand-orange mb-1">
            {isNew ? 'NEW TEMPLATE' : 'EDIT TEMPLATE'}
          </div>
          <h1 className="font-display font-bold text-4xl leading-none">{name || 'Untitled template'}</h1>
        </div>
        <button onClick={save}
          className="bg-brand-orange hover:bg-brand-orange-dark text-white font-display font-bold tracking-[0.12em] px-6 py-2.5 rounded transition">
          SAVE TEMPLATE
        </button>
      </div>

      <div className="bg-white border border-neutral-200 rounded p-5 mb-6 space-y-4">
        <Field label="Template name">
          <input value={name} onChange={(e)=>setName(e.target.value)} placeholder="e.g. Upper Body — Primer"
            className="w-full border border-neutral-200 rounded px-3 py-2.5 focus:border-brand-orange transition"/>
        </Field>
        <Field label="Description" hint="When to use this template — training phase, frequency, client profile.">
          <textarea rows={2} value={description} onChange={(e)=>setDescription(e.target.value)}
            placeholder="Who this is for and when it goes in the program…"
            className="w-full border border-neutral-200 rounded px-3 py-2.5 focus:border-brand-orange resize-none transition"/>
        </Field>
      </div>

      <div className="flex items-center gap-3 mb-4">
        <div className="font-display font-bold text-xl">EXERCISES IN ORDER</div>
        <div className="flex-1 h-px bg-neutral-200"></div>
        <div className="text-[10px] font-display font-semibold tracking-[0.12em] text-neutral-500">
          {items.length} {items.length===1?'MOVEMENT':'MOVEMENTS'}
        </div>
      </div>

      {items.length === 0 ? (
        <div className="bg-white border border-dashed border-neutral-300 rounded p-10 text-center mb-4">
          <p className="font-display text-lg text-neutral-500">No exercises yet</p>
          <p className="text-sm text-neutral-400 mt-1">Add exercises below and explain why each sits where it does.</p>
        </div>
      ) : (
        <div className="space-y-3 mb-4">
          {items.map((it, idx) => (
            <div key={idx} className="bg-white border border-neutral-200 rounded p-4">
              <div className="flex items-start gap-3">
                <div className="flex flex-col items-center gap-1 pt-1 flex-shrink-0">
                  <button onClick={()=>moveItem(idx, -1)} disabled={idx===0} title="Move up"
                    className="text-neutral-400 hover:text-brand-black disabled:opacity-30 disabled:cursor-not-allowed p-0.5 transition">
                    <Icon.ChevUp className="w-4 h-4"/>
                  </button>
                  <div className="w-7 h-7 bg-brand-black text-white rounded-full flex items-center justify-center font-display font-bold text-sm">{idx+1}</div>
                  <button onClick={()=>moveItem(idx, 1)} disabled={idx===items.length-1} title="Move down"
                    className="text-neutral-400 hover:text-brand-black disabled:opacity-30 disabled:cursor-not-allowed p-0.5 transition">
                    <Icon.ChevDn className="w-4 h-4"/>
                  </button>
                </div>

                <div className="flex-1 min-w-0 space-y-3">
                  <div className="flex items-start justify-between gap-3">
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center gap-2 flex-wrap">
                        <h3 className="font-display font-bold text-lg leading-tight">{exName(it.exercise_id)}</h3>
                        {exCat(it.exercise_id) && (
                          <span className={`text-[9px] font-display font-bold tracking-[0.12em] px-2 py-0.5 rounded whitespace-nowrap ${CATEGORY_STYLES[exCat(it.exercise_id)] || 'bg-neutral-200 text-neutral-700'}`}>
                            {exCat(it.exercise_id).toUpperCase()}
                          </span>
                        )}
                      </div>
                      <div className="flex items-center gap-3 mt-1">
                        {exMG(it.exercise_id) && (
                          <div className="text-[10px] font-display font-semibold tracking-[0.12em] text-neutral-500">
                            {exMG(it.exercise_id).toUpperCase()}
                          </div>
                        )}
                        <button onClick={()=>setPickerFor({ index: idx })}
                          className="text-[10px] font-display font-semibold tracking-[0.12em] text-neutral-500 hover:text-brand-orange transition">
                          CHANGE EXERCISE
                        </button>
                      </div>
                    </div>
                    <button onClick={()=>removeItem(idx)} title="Remove" className="text-neutral-400 hover:text-red-600 p-1.5 flex-shrink-0 transition">
                      <Icon.Trash className="w-4 h-4"/>
                    </button>
                  </div>

                  <div className="bg-neutral-50 border border-neutral-200 rounded p-3">
                    <div className="font-display font-semibold text-[10px] tracking-[0.12em] text-neutral-500 mb-2">
                      PRESCRIPTION · <span className="text-brand-black">{fmtSetsReps(it.sets, it.reps)}, {fmtRest(it.rest_seconds||0)} rest</span>
                    </div>
                    <div className="grid grid-cols-3 gap-2">
                      <Field label="Sets">
                        <input type="number" min="1" value={it.sets} onChange={(e)=>updateItem(idx, { sets:parseInt(e.target.value)||0 })}
                          className="w-full border border-neutral-200 rounded px-2 py-1.5 focus:border-brand-orange transition"/>
                      </Field>
                      <Field label="Reps" hint="e.g. 8, 8-10, AMRAP">
                        <input value={it.reps} onChange={(e)=>updateItem(idx, { reps:e.target.value })} placeholder="8-10"
                          className="w-full border border-neutral-200 rounded px-2 py-1.5 focus:border-brand-orange transition"/>
                      </Field>
                      <Field label="Rest (seconds)">
                        <input type="number" min="0" step="15" value={it.rest_seconds} onChange={(e)=>updateItem(idx, { rest_seconds:parseInt(e.target.value)||0 })}
                          className="w-full border border-neutral-200 rounded px-2 py-1.5 focus:border-brand-orange transition"/>
                      </Field>
                    </div>
                  </div>

                  <Field label="Why here?" hint="The reasoning this exercise goes in this position.">
                    <textarea rows={2} value={it.rationale} onChange={(e)=>updateItem(idx, { rationale:e.target.value })}
                      placeholder="What this exercise does in this slot — fresh CNS, balances the push, finisher, etc."
                      className="w-full border border-neutral-200 rounded px-3 py-2 focus:border-brand-orange resize-none text-sm transition"/>
                  </Field>
                </div>
              </div>
            </div>
          ))}
        </div>
      )}

      <button onClick={()=>setPickerFor('new')} disabled={exercises.length === 0}
        className="w-full border-2 border-dashed border-neutral-300 hover:border-brand-orange hover:text-brand-orange disabled:opacity-50 disabled:cursor-not-allowed text-neutral-500 font-display font-bold tracking-[0.12em] py-4 rounded transition flex items-center justify-center gap-2">
        <Icon.Plus className="w-4 h-4"/>ADD EXERCISE
      </button>

      {exercises.length === 0 && (
        <p className="text-xs text-neutral-500 text-center mt-2">Add exercises to your library first.</p>
      )}

      {pickerFor && (
        <ExercisePicker
          exercises={exercises}
          excludeIds={pickerFor === 'new' ? items.map(it => it.exercise_id) : items.filter((_,i)=>i !== pickerFor.index).map(it => it.exercise_id)}
          onPick={handlePick}
          onClose={()=>setPickerFor(null)}
        />
      )}
    </div>
  );
}

/* =========================================================
   PROGRAMS LIST
   ========================================================= */
function ProgramsList({ programs, templates, onNew, onEdit, onDelete, onRun, canEdit }) {
  const tplName = (id) => templates.find(t => t.id === id)?.name || '(missing)';
  const isEditable = (p) => !canEdit || canEdit(p); // coach case (no predicate) = everything editable
  const handleRun = (p) => {
    if (!confirm(`Set "${p.name}" as your active workout? This replaces your current plan.`)) return;
    onRun(p.id);
  };
  return (
    <>
      <div className="flex items-center justify-end mb-5">
        <button onClick={onNew}
          className="bg-brand-orange hover:bg-brand-orange-dark text-white font-display font-bold tracking-[0.12em] text-sm px-4 py-2 rounded transition flex items-center gap-2">
          <Icon.Plus className="w-4 h-4"/>NEW PROGRAM
        </button>
      </div>

      {programs.length === 0 ? (
        <div className="bg-white border border-dashed border-neutral-300 rounded p-12 text-center">
          <p className="font-display text-xl text-neutral-500">No programs yet</p>
          <p className="text-sm text-neutral-400 mt-1">A program combines workout days into a weekly split.</p>
        </div>
      ) : (
        <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
          {programs.map(p => {
            const editable = isEditable(p);
            // When the card shouldn't open an editor (read-only library item for
            // a client), render a static div instead of a clickable button so
            // there's no confusing hover/click affordance.
            const CardWrap = editable ? 'button' : 'div';
            const cardWrapProps = editable ? { onClick: ()=>onEdit(p.id), className: 'w-full text-left p-5' } : { className: 'p-5' };
            return (
              <div key={p.id} className="bg-white border border-neutral-200 rounded overflow-hidden hover:border-brand-orange transition group">
                <CardWrap {...cardWrapProps}>
                  <div className="flex items-start justify-between gap-3 mb-2">
                    <h3 className={`font-display font-bold text-2xl leading-tight ${editable ? 'group-hover:text-brand-orange' : ''} transition`}>{p.name}</h3>
                    <div className="flex items-center gap-2 flex-shrink-0">
                      {canEdit && !editable && (
                        <span className="text-[9px] font-display font-bold tracking-[0.12em] text-brand-orange bg-brand-orange/10 px-2 py-1 rounded whitespace-nowrap">LIBRARY</span>
                      )}
                      <span className="text-[10px] font-display font-semibold tracking-[0.12em] text-neutral-500 whitespace-nowrap bg-neutral-100 px-2 py-1 rounded">
                        {p.days.length} {p.days.length===1?'DAY':'DAYS'}
                      </span>

                    <button onClick={()=>onEdit(p.id)} className="text-xs font-display font-bold tracking-[0.12em] text-brand-black hover:text-brand-orange transition">
                      EDIT PROGRAM →

                  <div className="flex items-center gap-2">
                    {onRun && (
                      <button onClick={()=>handleRun(p)}
                        className="text-xs font-display font-bold tracking-[0.12em] bg-brand-orange text-white hover:bg-brand-orange-dark px-3 py-1.5 rounded transition">

                        className="text-neutral-400 hover:text-red-600 p-1 transition"><Icon.Trash className="w-4 h-4"/></button>
                    )}
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </>
  );
}

/* =========================================================
   PROGRAM EDITOR (full page)
   ========================================================= */
function ProgramEditor({ program, templates, onSave, onBack }) {
  const isNew = !program.id;
  const [name, setName] = useState(program.name || '');
  const [description, setDescription] = useState(program.description || '');
  const [notes, setNotes] = useState(program.notes || '');
  const [days, setDays] = useState(program.days || []);

  const tpl = (id) => templates.find(t => t.id === id);
  const tplName = (id) => tpl(id)?.name || '(removed)';

  const addDay = () => {
    const first = templates[0];
    if (!first) return;
    setDays(prev => [...prev, { template_id: first.id, label: first.name }]);
  };
  const updateDay = (idx, patch) => setDays(prev => prev.map((d, i) => i === idx ? { ...d, ...patch } : d));
  const removeDay = (idx) => setDays(prev => prev.filter((_, i) => i !== idx));
  const moveDay = (idx, dir) => {
    const j = idx + dir;
    if (j < 0 || j >= days.length) return;
    const next = [...days];
    [next[idx], next[j]] = [next[j], next[idx]];
    setDays(next);
  };

  const save = () => {
    if (!name.trim()) { alert('Program name is required'); return; }
    onSave({ ...program, name:name.trim(), description:description.trim(), notes:notes.trim(), days });
  };

  return (
    <div className="max-w-5xl mx-auto px-6 py-6">
      <button onClick={onBack} className="text-neutral-500 hover:text-brand-black text-xs font-display font-semibold tracking-[0.12em] transition flex items-center gap-1.5 mb-5">
        <Icon.Arrow className="w-3.5 h-3.5"/>ALL PROGRAMS
      </button>

      <div className="flex items-start justify-between gap-4 mb-6 flex-wrap">
        <div>
          <div className="font-display font-semibold text-[10px] tracking-[0.12em] text-brand-orange mb-1">
            {isNew ? 'NEW PROGRAM' : 'EDIT PROGRAM'}
          </div>
          <h1 className="font-display font-bold text-4xl leading-none">{name || 'Untitled program'}</h1>
        </div>
        <button onClick={save}
          className="bg-brand-orange hover:bg-brand-orange-dark text-white font-display font-bold tracking-[0.12em] px-6 py-2.5 rounded transition">
          SAVE PROGRAM
        </button>
      </div>

      <div className="bg-white border border-neutral-200 rounded p-5 mb-6 space-y-4">
        <Field label="Program name">
          <input value={name} onChange={(e)=>setName(e.target.value)} placeholder="e.g. Upper / Lower"
            className="w-full border border-neutral-200 rounded px-3 py-2.5 focus:border-brand-orange transition"/>
        </Field>
        <Field label="Description" hint="What makes this program distinct and who it's for.">
          <textarea rows={2} value={description} onChange={(e)=>setDescription(e.target.value)}
            placeholder="Two-day split rotated through the week…"
            className="w-full border border-neutral-200 rounded px-3 py-2.5 focus:border-brand-orange resize-none transition"/>
        </Field>
        <Field label="Frequency / notes" hint="Suggested weekly frequency, progression tips, exceptions.">
          <textarea rows={2} value={notes} onChange={(e)=>setNotes(e.target.value)}
            placeholder="e.g. Run 4 days/week: Upper → Lower → Upper → Lower."
            className="w-full border border-neutral-200 rounded px-3 py-2.5 focus:border-brand-orange resize-none transition"/>
        </Field>
      </div>

      <div className="flex items-center gap-3 mb-4">
        <div className="font-display font-bold text-xl">DAYS IN ORDER</div>
        <div className="flex-1 h-px bg-neutral-200"></div>
        <div className="text-[10px] font-display font-semibold tracking-[0.12em] text-neutral-500">
          {days.length} {days.length===1?'DAY':'DAYS'}
        </div>
      </div>

      {days.length === 0 ? (
        <div className="bg-white border border-dashed border-neutral-300 rounded p-10 text-center mb-4">
          <p className="font-display text-lg text-neutral-500">No days added yet</p>
          <p className="text-sm text-neutral-400 mt-1">Add workout days in the order they run through the week.</p>
        </div>
      ) : (
        <div className="space-y-3 mb-4">
          {days.map((d, idx) => {
            const t = tpl(d.template_id);
            return (
              <div key={idx} className="bg-white border border-neutral-200 rounded p-4">
                <div className="flex items-start gap-3">
                  <div className="flex flex-col items-center gap-1 pt-1 flex-shrink-0">
                    <button onClick={()=>moveDay(idx, -1)} disabled={idx===0} title="Move up"
                      className="text-neutral-400 hover:text-brand-black disabled:opacity-30 disabled:cursor-not-allowed p-0.5 transition">
                      <Icon.ChevUp className="w-4 h-4"/>
                    </button>
                    <div className="w-7 h-7 bg-brand-black text-white rounded-full flex items-center justify-center font-display font-bold text-sm">{idx+1}</div>
                    <button onClick={()=>moveDay(idx, 1)} disabled={idx===days.length-1} title="Move down"
                      className="text-neutral-400 hover:text-brand-black disabled:opacity-30 disabled:cursor-not-allowed p-0.5 transition">
                      <Icon.ChevDn className="w-4 h-4"/>
                    </button>
                  </div>

                  <div className="flex-1 min-w-0 grid grid-cols-1 sm:grid-cols-2 gap-3">
                    <Field label="Workout day">
                      <select value={d.template_id} onChange={(e)=>updateDay(idx, { template_id: e.target.value })}
                        className="w-full border border-neutral-200 rounded px-3 py-2 focus:border-brand-orange bg-white transition">
                        {templates.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}

                        <div className="text-[10px] font-display font-semibold tracking-[0.12em] text-neutral-500 mt-1">
                          {t.exercises.length} {t.exercises.length===1?'MOVEMENT':'MOVEMENTS'}
                        </div>
                      )}

                    <Field label="Label" hint="What to call this day in the program (optional).">
                      <input value={d.label || ''} onChange={(e)=>updateDay(idx, { label: e.target.value })}

                        className="w-full border border-neutral-200 rounded px-3 py-2 focus:border-brand-orange transition"/>
                    </Field>
                  </div>

                  <button onClick={()=>removeDay(idx)} title="Remove" className="text-neutral-400 hover:text-red-600 p-1.5 flex-shrink-0 transition mt-5">

      <button onClick={addDay} disabled={templates.length === 0}
        className="w-full border-2 border-dashed border-neutral-300 hover:border-brand-orange hover:text-brand-orange disabled:opacity-50 disabled:cursor-not-allowed text-neutral-500 font-display font-bold tracking-[0.12em] py-4 rounded transition flex items-center justify-center gap-2">
        <Icon.Plus className="w-4 h-4"/>ADD DAY
      </button>

      {templates.length === 0 && (
        <p className="text-xs text-neutral-500 text-center mt-2">Create workout days first — programs reference them.</p>
      )}
    </div>
  );
}

/* =========================================================
   MEAL BUILDER — core component
   Reusable: used in standalone tab AND in the reply-to-upload modal.
   ========================================================= */
const MACRO_COLORS = {
  protein: { dot:'bg-emerald-500',  text:'text-emerald-700',  border:'border-emerald-500', bg:'bg-emerald-50',  chipSel:'bg-emerald-100 border-emerald-500 text-emerald-800' },
  carb:    { dot:'bg-brand-orange', text:'text-brand-orange', border:'border-brand-orange',bg:'bg-brand-orange-light', chipSel:'bg-brand-orange-light border-brand-orange text-brand-orange-dark' },
  fat:     { dot:'bg-violet-500',   text:'text-violet-700',   border:'border-violet-500',  bg:'bg-violet-50',    chipSel:'bg-violet-100 border-violet-500 text-violet-800' },
};

function MealChip({ type, label, selected, onClick }) {
  const c = MACRO_COLORS[type];
  return (
    <button onClick={onClick}
      className={`text-xs font-display font-semibold tracking-[0.05em] px-3 py-1.5 rounded-full border transition ${
        selected ? c.chipSel : 'bg-white border-neutral-200 text-neutral-600 hover:border-neutral-400'
      }`}>
      {label}
    </button>
  );
}

function MealPill({ type, value }) {
  const c = MACRO_COLORS[type];
  return (
    <span className={`inline-flex items-center text-xs font-display font-semibold tracking-[0.05em] px-2.5 py-1 rounded-full ${c.bg} ${c.text}`}>
      {value}
    </span>
  );
}

function lookupNote(type, label) {
  return (MEAL_INGREDIENTS[type].find(o => o.label === label) || {}).note || '';
}

/**
 * normalizeMeal — upgrades a meal object to the multi-select shape.
 *
 * Before multi-select: meals stored as { name, protein, carb, fat } — each a string or null.
 * After:               { name, proteins: [], carbs: [], fats: [] } — arrays, possibly empty.
 *
 * Call this on read (both for in-memory state and for meals loaded from the server).
 * Safe to call on already-normalized meals.
 */
function normalizeMeal(m) {
  if (!m) return { name:'', proteins:[], carbs:[], fats:[] };
  const proteins = Array.isArray(m.proteins) ? m.proteins : (m.protein ? [m.protein] : []);
  const carbs    = Array.isArray(m.carbs)    ? m.carbs    : (m.carb    ? [m.carb]    : []);
  const fats     = Array.isArray(m.fats)     ? m.fats     : (m.fat     ? [m.fat]     : []);
  return { name: m.name || '', proteins, carbs, fats };
}

function autoMealName(state) {
  const p = state.proteins?.[0];
  const c = state.carbs?.[0];
  if (!p) return '';
  if (c) return `${p} & ${c} Bowl`;
  return `${p} Bowl`;
}

/**
 * MealBuilder
 *  - value:     current meals[] array
 *  - onChange:  (nextMeals) => void
 *  - compact:   if true, render tighter for modal use
 */
function MealBuilder({ value, onChange, compact = false }) {
  // Current selection — arrays, possibly empty. Using arrays across the board keeps
  // the add/remove/preview code uniform and makes the multi-select behavior natural.
  const [state, setState]   = useState({ proteins:[], carbs:[], fats:[] });
  const [mealName, setName] = useState('');

  // Flip a single ingredient in/out of the currently-selected array for its macro.
  const toggle = (type, label) => {
    const key = type + 's'; // 'protein' -> 'proteins'
    setState(prev => {
      const arr = prev[key];
      const next = arr.includes(label) ? arr.filter(x => x !== label) : [...arr, label];
      return { ...prev, [key]: next };
    });
  };

  const addMeal = () => {
    if (state.proteins.length === 0) return;
    const name = mealName.trim() || autoMealName(state);
    const next = [...value, {
      name,
      proteins: [...state.proteins],
      carbs:    [...state.carbs],
      fats:     [...state.fats],
    }];
    onChange(next);
    setState({ proteins:[], carbs:[], fats:[] });
    setName('');
  };
  const removeMeal = (i) => onChange(value.filter((_, idx) => idx !== i));

  // Render stored meals through the normalizer so legacy single-macro rows still display.
  const rendered = value.map(normalizeMeal);

  const Section = ({ type, title }) => {
    const key = type + 's';
    const c = MACRO_COLORS[type];
    const selected = state[key];
    return (
      <div>
        <div className="flex items-center gap-2 mb-2">
          <div className={`w-2 h-2 rounded-full ${c.dot}`}></div>
          <span className={`font-display font-bold text-[11px] tracking-[0.12em] ${c.text}`}>
            {title.toUpperCase()}{type==='protein' && <span className="text-red-500 ml-0.5">*</span>}
          </span>
          {selected.length > 1 && (
            <span className="ml-auto text-[10px] font-display tracking-[0.1em] text-neutral-400">
              {selected.length} SELECTED
            </span>
          )}
        </div>
        <div className="flex flex-wrap gap-1.5">
          {MEAL_INGREDIENTS[type].map(opt => (
            <MealChip key={opt.label} type={type} label={opt.label}
              selected={selected.includes(opt.label)} onClick={()=>toggle(type, opt.label)}/>
          ))}
        </div>
      </div>
    );
  };

  const hasSelection = state.proteins.length > 0;

  return (
    <div className={compact ? '' : 'max-w-3xl mx-auto'}>
      <div className="bg-white border border-neutral-200 rounded p-5 mb-4 space-y-4">
        <Section type="protein" title="Protein"/>
        <div className="h-px bg-neutral-100"></div>
        <Section type="carb"    title="Carb"/>
        <div className="h-px bg-neutral-100"></div>
        <Section type="fat"     title="Fat"/>

        <div className="bg-neutral-50 border border-neutral-200 rounded p-3">
          <div className="font-display font-bold text-[10px] tracking-[0.12em] text-neutral-500 mb-2">MEAL PREVIEW</div>
          {!hasSelection ? (
            <p className="text-sm text-neutral-400 italic">Select at least one protein to preview this meal. Tap chips to add or remove — you can select as many as you want.</p>
          ) : (
            <div className="flex flex-wrap gap-1.5">
              {state.proteins.map(v => <MealPill key={'p-'+v} type="protein" value={v}/>)}
              {state.carbs.map(v    => <MealPill key={'c-'+v} type="carb"    value={v}/>)}
              {state.fats.map(v     => <MealPill key={'f-'+v} type="fat"     value={v}/>)}
            </div>
          )}
        </div>

        <Field label="Meal name" hint="Optional — auto-generated if blank.">
          <input value={mealName} onChange={(e)=>setName(e.target.value)}
            placeholder={hasSelection ? autoMealName(state) : "e.g. Post-Workout Bowl"}
            className="w-full border border-neutral-200 rounded px-3 py-2 focus:border-brand-orange transition"/>
        </Field>

        <button onClick={addMeal} disabled={!hasSelection}
          className="w-full bg-brand-orange hover:bg-brand-orange-dark disabled:bg-neutral-200 disabled:text-neutral-400 disabled:cursor-not-allowed text-white font-display font-bold tracking-[0.12em] py-3 rounded transition flex items-center justify-center gap-2">
          <Icon.Plus className="w-4 h-4"/>ADD MEAL TO PLAN
        </button>
      </div>

      {rendered.length > 0 && (
        <div className="mb-4">
          <div className="font-display font-bold text-[10px] tracking-[0.12em] text-neutral-500 mb-2">
            MEAL PLAN · {rendered.length} {rendered.length===1?'MEAL':'MEALS'}
          </div>
          <div className="space-y-2">
            {rendered.map((m, i) => (
              <div key={i} className="bg-white border border-neutral-200 rounded p-3 flex items-start justify-between gap-3">
                <div className="min-w-0 flex-1">
                  <div className="font-display font-bold text-sm leading-tight">{m.name}</div>
                  <div className="flex flex-wrap gap-1 mt-1.5">
                    {m.proteins.map(v => <MealPill key={'p-'+v} type="protein" value={v}/>)}
                    {m.carbs.map(v    => <MealPill key={'c-'+v} type="carb"    value={v}/>)}
                    {m.fats.map(v     => <MealPill key={'f-'+v} type="fat"     value={v}/>)}
                  </div>
                </div>
                <button onClick={()=>removeMeal(i)} title="Remove" className="text-neutral-400 hover:text-red-600 p-1 flex-shrink-0 transition">
                  <Icon.X className="w-4 h-4"/>
                </button>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

/* =========================================================
   MEAL BUILDER — standalone page (Meal Builder nav tab)
   ========================================================= */
function MealBuilderView() {
  const [meals, setMeals] = useState([]);
  const [copied, setCopied] = useState(false);

  const buildCopyText = () => {
    if (!meals.length) return '';
    const lines = ['=== HORMONE ALIGNED MEAL PLAN ===', ''];
    meals.map(normalizeMeal).forEach((m, i) => {
      lines.push(`MEAL ${i+1}: ${m.name.toUpperCase()}`);
      // One line per item per macro. Keeps per-item notes visible and reads cleanly in a text message.
      const emit = (type, label, items) => {
        items.forEach(item => {
          const note = lookupNote(type, item);
          lines.push(`  ${label.padEnd(7)} : ${item}${note ? ' ('+note+')' : ''}`);
        });
      };
      emit('protein', 'Protein', m.proteins);
      emit('carb',    'Carb',    m.carbs);
      emit('fat',     'Fat',     m.fats);
      lines.push('');
    });
    lines.push('--- Derek Fowler / The Buffalo Method ---');
    return lines.join('\n');
  };

  const copyToClipboard = () => {
    const text = buildCopyText();
    navigator.clipboard.writeText(text).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    });
  };

  return (
    <div className="max-w-3xl mx-auto px-6 py-8">
      <div className="mb-6">
        <div className="font-display font-bold text-[10px] tracking-[0.2em] text-brand-orange mb-2">FREE THE MACRO</div>
        <h1 className="font-display font-bold text-4xl leading-none">Meal Builder</h1>
        <p className="text-neutral-600 mt-2 text-sm">Build hormone-aligned meals from approved building blocks. Use the standalone tool for planning or reply to a client's meal upload with suggestions directly.</p>
      </div>

      <MealBuilder value={meals} onChange={setMeals}/>

      {meals.length > 0 && (
        <div className="bg-white border border-neutral-200 rounded p-5">
          <div className="font-display font-bold text-[10px] tracking-[0.12em] text-neutral-500 mb-3">
            OUTPUT · COPY INTO ANY APP
          </div>
          <pre className="bg-neutral-900 text-neutral-100 font-mono text-xs leading-relaxed rounded p-4 overflow-x-auto mb-3 whitespace-pre-wrap">{buildCopyText()}</pre>
          <div className="flex gap-2">
            <button onClick={copyToClipboard}
              className="flex-1 bg-brand-black hover:bg-brand-orange text-white font-display font-bold tracking-[0.12em] text-sm py-3 rounded transition">
              {copied ? '✓ COPIED!' : 'COPY TO CLIPBOARD'}
            </button>
            <button onClick={()=>setMeals([])}
              className="border border-neutral-300 text-brand-black hover:bg-neutral-50 font-display font-bold tracking-[0.12em] text-sm px-5 py-3 rounded transition">
              CLEAR ALL
            </button>
          </div>
        </div>
      )}

      {meals.length === 0 && (
        <div className="bg-brand-orange-light/40 border border-brand-orange/30 rounded p-4 text-sm text-neutral-700">
          <strong className="font-display tracking-[0.05em]">Tip:</strong> To suggest meals to a specific client, go to their profile → Timeline tab → hit <em>Suggest Meals</em> on any upload. Suggestions get attached to that log and show up right next to their photos.
        </div>
      )}
    </div>
  );
}

  const counts = {
    new:       leads.filter(l => l.status === 'new').length,
    contacted: leads.filter(l => l.status === 'contacted').length,
    converted: leads.filter(l => l.status === 'converted').length,
    archived:  leads.filter(l => l.status === 'archived').length,
  };

  const filtered = leads.filter(l => {
    if (filter === 'active')    return l.status === 'new' || l.status === 'contacted';
    if (filter === 'converted') return l.status === 'converted';
    if (filter === 'archived')  return l.status === 'archived';
    return true;
  });

  const timeAgo = (iso) => {
    const diff = Date.now() - new Date(iso).getTime();
    const mins  = Math.floor(diff / 60000);
    const hours = Math.floor(diff / 3600000);
    const days  = Math.floor(diff / 86400000);
    if (mins < 1)  return 'just now';
    if (mins < 60) return mins + 'm ago';
    if (hours < 24) return hours + 'h ago';
    if (days < 7)   return days + 'd ago';
    return new Date(iso).toLocaleDateString('en-US', { month:'short', day:'numeric' });
  };

  const statusStyles = {
    new:       'bg-brand-orange text-white',
    contacted: 'bg-amber-100 text-amber-900 border border-amber-300',
    converted: 'bg-emerald-100 text-emerald-900 border border-emerald-300',
    archived:  'bg-neutral-200 text-neutral-600',
  };

  return (
    <div className="max-w-7xl mx-auto px-6 py-8">
      <div className="flex items-end justify-between mb-8">
        <div>
          <h1 className="font-display font-bold text-4xl leading-none">Leads</h1>
          <p className="text-neutral-500 text-sm mt-2">Inquiries from the HAM app. Work them down — mark contacted, convert the good ones, archive the rest.</p>
        </div>
      </div>

      <div className="grid grid-cols-4 gap-4 mb-6">
        <StatCard label="NEW"       value={counts.new}       accent={counts.new > 0 ? 'orange' : undefined}/>
        <StatCard label="CONTACTED" value={counts.contacted}/>
        <StatCard label="CONVERTED" value={counts.converted}/>
        <StatCard label="ARCHIVED"  value={counts.archived}/>
      </div>

      <div className="flex gap-1 mb-4 border-b border-neutral-200">
        {[
          { id:'active',    label:'ACTIVE',    count: counts.new + counts.contacted },
          { id:'converted', label:'CONVERTED', count: counts.converted },
          { id:'archived',  label:'ARCHIVED',  count: counts.archived },
        ].map(tab => (
          <button key={tab.id} onClick={()=>setFilter(tab.id)}
            className={`font-display font-bold tracking-[0.12em] text-xs px-4 py-2 -mb-px border-b-2 transition ${filter===tab.id ? 'border-brand-orange text-brand-black' : 'border-transparent text-neutral-500 hover:text-brand-black'}`}>
            {tab.label} <span className="text-neutral-400 ml-1">{tab.count}</span>
          </button>
        ))}
      </div>

      {filtered.length === 0 ? (
        <div className="text-center py-16 text-neutral-400">
          <div className="font-display tracking-[0.2em] text-sm">
            {filter === 'active'    && 'NO ACTIVE LEADS — YOU\'RE CAUGHT UP'}
            {filter === 'converted' && 'NO CONVERTED LEADS YET'}
            {filter === 'archived'  && 'NO ARCHIVED LEADS'}
          </div>
        </div>
      ) : (
        <div className="space-y-2">
          {filtered.map(lead => {
            const isOpen = expandedId === lead.id;
            return (
              <div key={lead.id} className={`border rounded bg-white transition ${isOpen ? 'border-brand-orange shadow-sm' : 'border-neutral-200 hover:border-neutral-300'}`}>
                <button onClick={()=>setExpandedId(isOpen ? null : lead.id)}
                  className="w-full text-left px-5 py-4 flex items-center gap-4">
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-3 flex-wrap">
                      <div className="font-display font-bold text-lg leading-tight">{lead.name}</div>
                      <span className={`font-display font-bold tracking-[0.12em] text-[10px] px-2 py-0.5 rounded uppercase ${statusStyles[lead.status]}`}>
                        {lead.status}
                      </span>
                    </div>
                    <div className="text-sm text-neutral-600 mt-0.5 truncate">
                      {lead.email}
                      {lead.phone && <span className="text-neutral-400 ml-2">· {lead.phone}</span>}
                    </div>
                  </div>
                  <div className="text-xs text-neutral-400 font-display tracking-[0.1em] flex-shrink-0">{timeAgo(lead.created_at)}</div>
                  <div className={`text-neutral-400 transition-transform ${isOpen ? 'rotate-90' : ''}`}>›</div>
                </button>

                {isOpen && (
                  <div className="border-t border-neutral-100 px-5 py-4 space-y-4 bg-neutral-50/50">
                    {lead.message && (
                      <div>
                        <div className="font-display font-bold tracking-[0.12em] text-[10px] text-neutral-500 mb-1">THEIR MESSAGE</div>
                        <p className="text-sm leading-relaxed whitespace-pre-wrap text-neutral-800">{lead.message}</p>
                      </div>
                    )}

                    <LeadCoachNotes lead={lead} onSave={(notes)=>onUpdateLead(lead.id, { coach_notes: notes })}/>

                    <div className="flex flex-wrap gap-2 pt-2">
                      {lead.status === 'new' && (
                        <button onClick={()=>onUpdateLead(lead.id, { status:'contacted' })}
                          className="font-display font-bold tracking-[0.1em] text-xs px-4 py-2 rounded border border-amber-400 text-amber-900 bg-amber-50 hover:bg-amber-100 transition">
                          MARK CONTACTED
                        </button>
                      )}
                      {(lead.status === 'new' || lead.status === 'contacted') && (
                        <>
                          <button onClick={()=>onConvertLead(lead)}
                            className="font-display font-bold tracking-[0.1em] text-xs px-4 py-2 rounded bg-brand-orange hover:bg-brand-orange-dark text-white transition">
                            CONVERT TO CLIENT
                          </button>
                          <button onClick={()=>onUpdateLead(lead.id, { status:'archived' })}
                            className="font-display font-bold tracking-[0.1em] text-xs px-4 py-2 rounded border border-neutral-300 text-neutral-600 hover:bg-neutral-100 transition">
                            ARCHIVE
                          </button>
                        </>
                      )}
                      {lead.status === 'archived' && (
                        <button onClick={()=>onUpdateLead(lead.id, { status:'new' })}
                          className="font-display font-bold tracking-[0.1em] text-xs px-4 py-2 rounded border border-neutral-300 text-neutral-700 hover:bg-neutral-100 transition">
                          RESTORE TO NEW
                        </button>
                      )}
                      <div className="flex-1"/>
                      <button onClick={()=>{
                        if (confirm('Permanently delete this lead? This cannot be undone.')) onDeleteLead(lead.id);
                      }}
                        className="font-display font-bold tracking-[0.1em] text-xs px-4 py-2 rounded text-red-700 hover:bg-red-50 transition">
                        DELETE
                      </button>
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// Editable coach notes block inside each expanded lead row.
function LeadCoachNotes({ lead, onSave }) {
  const [value, setValue] = useState(lead.coach_notes || '');
  const [saving, setSaving] = useState(false);
  const [savedAt, setSavedAt] = useState(0);
  // If a lead updates externally, sync
  useEffect(() => { setValue(lead.coach_notes || ''); }, [lead.id, lead.coach_notes]);
  const dirty = value !== (lead.coach_notes || '');
  const save = async () => {
    if (!dirty || saving) return;
    setSaving(true);
    await onSave(value);
    setSaving(false);
    setSavedAt(Date.now());
    setTimeout(() => setSavedAt(0), 2000);
  };
  return (
    <div>
      <div className="font-display font-bold tracking-[0.12em] text-[10px] text-neutral-500 mb-1">PRIVATE NOTES (only you see these)</div>
      <textarea rows={2} value={value} onChange={(e)=>setValue(e.target.value)}
        placeholder="e.g. Referred by Mike. Wants to focus on post-partum body comp. Called Tue 3/12."
        className="w-full border border-neutral-200 rounded px-3 py-2 text-sm focus:border-brand-orange resize-none bg-white transition"/>
      {dirty && (
        <div className="mt-2">
          <button onClick={save} disabled={saving}
            className="font-display font-bold tracking-[0.1em] text-xs px-3 py-1.5 rounded bg-neutral-900 hover:bg-brand-black text-white disabled:opacity-50 transition">
            {saving ? 'SAVING…' : 'SAVE NOTES'}
          </button>
        </div>
      )}
      {savedAt > 0 && <div className="text-xs text-emerald-700 mt-1">✓ Saved</div>}
    </div>
  );
}

/* =========================================================
   CLIENT LOGIN — email + 4-digit PIN.

   Lives at the /client path. Separate from the coach login so
   clients land in a clean, branded entry point that matches the
   welcome email they just received.
   ========================================================= */
function ClientLogin({ onLogin }) {
  const [email, setEmail] = useState('');
  const [pin, setPin] = useState('');
  const [error, setError] = useState('');
  const [submitting, setSubmitting] = useState(false);

  const submit = async (e) => {
    e?.preventDefault();
    if (!email.trim() || !/^\d{4}$/.test(pin)) {
      setError('Enter your email and 4-digit PIN.');
      return;
    }
    setSubmitting(true);
    setError('');
    try {
      const result = await api.post('/api/client-login', { email: email.trim(), pin });
      onLogin(result.client);
    } catch (err) {
      setError(err.message || 'Login failed.');
      setSubmitting(false);
    }
  };

  return (
    <div className="min-h-screen bg-brand-black text-white flex items-center justify-center p-6">
      <div className="w-full max-w-sm">
        <div className="flex items-center gap-2 mb-10">
          <div className="w-2.5 h-2.5 bg-brand-orange"/>
          <span className="font-display font-bold text-xs tracking-[0.25em]">THE BUFFALO METHOD</span>
        </div>
        <h1 className="font-display font-bold text-5xl leading-none mb-2">Welcome<br/>back.</h1>
        <p className="text-neutral-400 text-sm mb-8">Log in with the email and PIN Derek sent you.</p>

        <form onSubmit={submit} className="space-y-4">
          <div>
            <label className="font-display font-bold tracking-[0.12em] text-[10px] text-neutral-400 block mb-1.5">EMAIL</label>
            <input type="email" autoComplete="email" autoFocus
              value={email} onChange={(e)=>setEmail(e.target.value)}
              disabled={submitting}
              className="w-full bg-neutral-900 border border-neutral-700 rounded px-3 py-2.5 focus:border-brand-orange focus:outline-none transition disabled:opacity-60"/>
          </div>
          <div>
            <label className="font-display font-bold tracking-[0.12em] text-[10px] text-neutral-400 block mb-1.5">4-DIGIT PIN</label>
            <input type="text" inputMode="numeric" maxLength={4} autoComplete="off"
              value={pin} onChange={(e)=>setPin(e.target.value.replace(/\D/g, ''))}
              disabled={submitting} placeholder="0000"
              className="w-full bg-neutral-900 border border-neutral-700 rounded px-3 py-2.5 font-mono text-2xl tracking-[0.5em] text-center focus:border-brand-orange focus:outline-none transition disabled:opacity-60"/>
          </div>

          {error && <div className="text-red-400 text-sm bg-red-950/30 border border-red-900/50 rounded px-3 py-2">{error}</div>}

          <button type="submit" disabled={submitting}
            className="w-full bg-brand-orange hover:bg-brand-orange-dark text-white font-display font-bold tracking-[0.15em] text-sm py-3 rounded transition disabled:opacity-60 disabled:cursor-wait">
            {submitting ? 'LOGGING IN…' : 'LOG IN'}
          </button>
        </form>

        <p className="text-neutral-500 text-xs mt-8 leading-relaxed">
          Lost your PIN? Text Derek directly — he'll reset it and send a new welcome email.
        </p>
      </div>
    </div>
  );
}

// Given a log's date and the client's start_date, compute which program week (0-6) it belongs to.
// Mirrors weekOfProgram but accepts any reference date instead of hardcoding TODAY.
function weekForLogDate(logDate, startDate) {
  const days = Math.floor((new Date(logDate + 'T12:00:00') - new Date(startDate + 'T00:00:00')) / 86400000);
  return Math.max(0, Math.min(6, Math.floor(days / 7)));
}

/* ---------- UPLOAD ---------- */
function ClientUploadView({ onBack, onSaved }) {
  const [date, setDate] = useState(fmtDate(TODAY));
  const [note, setNote] = useState('');
  const [files, setFiles] = useState([]);
  const [previews, setPreviews] = useState([]);
  const [submitting, setSubmitting] = useState(false);
  const [success, setSuccess] = useState(false);
  const [error, setError] = useState('');
  const fileRef = useRef();

  useEffect(() => {
    const urls = files.map(f => URL.createObjectURL(f));
    setPreviews(urls);
    return () => urls.forEach(u => URL.revokeObjectURL(u));
  }, [files]);

  const handleFiles = (incoming) => {
    const arr = Array.from(incoming);
    setFiles(prev => [...prev, ...arr].slice(0, MAX_PHOTOS));
  };
  const removePhoto = (i) => setFiles(prev => prev.filter((_, idx) => idx !== i));

  const submit = async () => {
    if (files.length === 0 || submitting) return;
    setSubmitting(true); setError('');
    try {
      const fd = new FormData();
      fd.append('log_date', date);
      fd.append('note', note.trim());
      files.forEach(f => fd.append('photos', f));
      const saved = await api.postForm('/api/meal-logs', fd);
      onSaved(saved);
      setSuccess(true);
      setFiles([]); setNote(''); setDate(fmtDate(TODAY));
    } catch (e) {
      setError(e.message || 'upload failed');
    } finally {
      setSubmitting(false);
    }
  };

  if (success) {
    return (
      <div className="px-4 sm:px-6 py-8">
        <div className="bg-white border border-emerald-200 rounded-lg p-8 text-center mb-4">
          <div className="inline-flex items-center justify-center w-14 h-14 rounded-full bg-emerald-100 text-emerald-700 mb-4 text-2xl">✓</div>
          <h2 className="font-display font-bold text-3xl leading-tight mb-2">Sent!</h2>
          <p className="text-neutral-600 mb-6">Derek will take a look and follow up.</p>
          <div className="flex flex-col gap-2">
            <button onClick={()=>setSuccess(false)}
              className="w-full bg-brand-orange hover:bg-brand-orange-dark text-white font-display font-bold tracking-[0.15em] text-sm py-3 rounded transition">
              UPLOAD ANOTHER
            </button>
            <button onClick={onBack}
              className="w-full border border-neutral-300 text-brand-black font-display font-bold tracking-[0.15em] text-sm py-3 rounded hover:bg-neutral-50 transition">
              BACK TO HOME
            </button>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="px-4 sm:px-6 py-6">
      <BackLink onClick={onBack}/>
      <h1 className="font-display font-bold text-4xl leading-none mb-1">Upload Meals</h1>
      <p className="text-neutral-600 text-sm mb-6">Photos of what you ate. Up to 5. Quick note if you want.</p>

      <div className="bg-white border border-neutral-200 rounded-lg p-5 mb-4">
        <div className="mb-4">
          <label className="font-display font-bold tracking-[0.12em] text-[10px] text-neutral-500 block mb-1.5">DATE</label>
          <input type="date" value={date} max={fmtDate(TODAY)}
            onChange={(e)=>setDate(e.target.value)}
            className="w-full border border-neutral-200 rounded px-3 py-2.5 focus:border-brand-orange focus:outline-none transition"/>
          <p className="text-xs text-neutral-500 mt-1">Defaults to today. Pick any past date if you're catching up.</p>
        </div>

        <div className="mb-4">
          <label className="font-display font-bold tracking-[0.12em] text-[10px] text-neutral-500 block mb-1.5">PHOTOS ({files.length} / {MAX_PHOTOS})</label>
          <div className="grid grid-cols-3 gap-2 mb-2">
            {previews.map((url, i) => (
              <div key={i} className="relative aspect-square rounded overflow-hidden border border-neutral-200">
                <img src={url} alt={`Photo ${i+1}`} className="w-full h-full object-cover"/>
                <button onClick={()=>removePhoto(i)}
                  className="absolute top-1 right-1 w-7 h-7 bg-black/70 text-white rounded-full flex items-center justify-center hover:bg-black transition">×</button>
              </div>
            ))}
            {files.length < MAX_PHOTOS && (
              <button onClick={()=>fileRef.current.click()}
                className="aspect-square border-2 border-dashed border-neutral-300 hover:border-brand-orange rounded flex flex-col items-center justify-center gap-1 text-neutral-500 hover:text-brand-orange transition">
                <div className="text-3xl leading-none">+</div>
                <div className="text-[10px] font-display tracking-[0.12em] font-bold">ADD PHOTO</div>
              </button>
            )}
          </div>
          {/* capture="environment" tells mobile to prefer the back camera. Without it, iOS/Android may only offer Gallery. */}
          <input ref={fileRef} type="file" accept="image/*" capture="environment" multiple
            onChange={(e)=>{ handleFiles(e.target.files); e.target.value=''; }}
            className="hidden"/>
        </div>

        <div>
          <label className="font-display font-bold tracking-[0.12em] text-[10px] text-neutral-500 block mb-1.5">NOTE (OPTIONAL)</label>
          <textarea value={note} onChange={(e)=>setNote(e.target.value)} rows={3}
            placeholder="Anything to add? e.g. 'ran out of eggs, used cheese instead'"
            className="w-full border border-neutral-200 rounded px-3 py-2.5 focus:border-brand-orange focus:outline-none transition resize-none"/>
        </div>
      </div>

      {error && <div className="text-red-700 bg-red-50 border border-red-200 rounded px-3 py-2 text-sm mb-3">{error}</div>}

      <button onClick={submit} disabled={files.length === 0 || submitting}
        className="w-full bg-brand-orange hover:bg-brand-orange-dark disabled:bg-neutral-200 disabled:text-neutral-400 disabled:cursor-not-allowed text-white font-display font-bold tracking-[0.15em] text-sm py-3 rounded transition">
        {submitting ? 'UPLOADING…' : files.length === 0 ? 'ADD AT LEAST ONE PHOTO' : `UPLOAD ${files.length} PHOTO${files.length===1?'':'S'}`}
      </button>
    </div>
  );
}

/* ---------- CHECK-IN ---------- */
function ClientCheckinView({ client, checkins, onSave, onBack }) {
  const currentWeek = weekOfProgram(client.start_date);
  const [selectedWeek, setSelectedWeek] = useState(null);
  const availableWeeks = [1, 2, 3, 4, 5, 6];

  if (selectedWeek !== null) {
    const existing = checkins.find(c => c.week_number === selectedWeek);
    return <ClientCheckinForm week={selectedWeek} existing={existing} onSave={onSave} onBack={()=>setSelectedWeek(null)}/>;
  }

  return (
    <div className="px-4 sm:px-6 py-6">
      <BackLink onClick={onBack}/>
      <h1 className="font-display font-bold text-4xl leading-none mb-1">Check-ins</h1>
      <p className="text-neutral-600 text-sm mb-6">One per week. Fill out what you can — skip anything you don't know.</p>

      <div className="space-y-2">
        {availableWeeks.map(w => {
          const existing = checkins.find(c => c.week_number === w);
          const isCurrent = w === currentWeek;
          const isFuture  = w > currentWeek;
          const isLocked  = existing?.is_locked;
          return (
            <button key={w} onClick={()=>!isFuture && setSelectedWeek(w)} disabled={isFuture}
              className={`w-full text-left rounded-lg p-4 flex items-center gap-4 border transition ${
                isFuture      ? 'border-neutral-200 bg-neutral-50 cursor-not-allowed opacity-60' :
                isCurrent     ? 'border-brand-orange bg-brand-orange/5 hover:bg-brand-orange/10' :
                                'border-neutral-200 bg-white hover:border-brand-orange'
              }`}>
              <div className="font-display font-bold text-3xl w-12 text-center leading-none">{w}</div>
              <div className="flex-1 min-w-0">
                <div className="font-display font-bold text-lg leading-tight">Week {w}</div>
                <div className="text-sm text-neutral-600">
                  {isLocked               ? '✓ Submitted · Locked' :
                   existing               ? '✓ Submitted · Tap to edit' :
                   isCurrent              ? 'Due this week' :
                   isFuture               ? 'Not yet' :
                                            'Not submitted'}
                </div>
              </div>
              {!isFuture && <div className="text-neutral-400 flex-shrink-0">›</div>}
            </button>
          );
        })}
      </div>
    </div>
  );
}

  const [error, setError] = useState('');

  const submit = async () => {
    setSubmitting(true); setError('');
    try {
      await onSave({
        week_number: week,
        weight_lbs:  form.weight_lbs === '' ? null : Number(form.weight_lbs),
        steps_avg:   form.steps_avg  === '' ? null : Number(form.steps_avg),

            <label className="font-display font-bold tracking-[0.12em] text-[10px] text-neutral-500 block mb-1.5">WEIGHT (LBS)</label>

          </div>
          <div>
            <label className="font-display font-bold tracking-[0.12em] text-[10px] text-neutral-500 block mb-1.5">AVG STEPS</label>
            <input type="number" inputMode="numeric" value={form.steps_avg}

        <div>

function ClientTimelineView({ client, mealLogs, checkins, mealSuggestions, onBack }) {
  // Bucket logs + check-ins by program week (0-6)
  const byWeek = {};
  for (let w = 0; w <= 6; w++) byWeek[w] = { logs: [], checkin: null };
  mealLogs.forEach(log => {
    const w = weekForLogDate(log.log_date, client.start_date);
    byWeek[w].logs.push(log);
  });
  checkins.forEach(c => { if (byWeek[c.week_number]) byWeek[c.week_number].checkin = c; });

  const suggForLog = (logId) => mealSuggestions.find(s => s.meal_log_id === logId);

  // Most recent weeks at the top — mobile natural.
  const weeksWithContent = Object.keys(byWeek).map(Number)
    .filter(w => byWeek[w].logs.length > 0 || byWeek[w].checkin)
    .sort((a, b) => b - a);

  return (
    <div className="px-4 sm:px-6 py-6">
      <BackLink onClick={onBack}/>
      <h1 className="font-display font-bold text-4xl leading-none mb-1">Your Timeline</h1>
      <p className="text-neutral-600 text-sm mb-6">Meals, check-ins, and feedback from Derek, grouped by week.</p>

      {weeksWithContent.length === 0 ? (
        <div className="bg-white border border-dashed border-neutral-300 rounded-lg p-8 text-center">
          <p className="text-neutral-500 text-sm">Nothing here yet. Upload your first meal to get started.</p>
        </div>
      ) : (
        <div className="space-y-8">
          {weeksWithContent.map(w => {
            const { logs, checkin } = byWeek[w];
            const sortedLogs = [...logs].sort((a, b) => b.log_date.localeCompare(a.log_date));
            return (
              <div key={w}>
                <div className="flex items-baseline gap-3 mb-3">
                  <div className="font-display font-bold text-5xl leading-none">{w === 0 ? 'Wk 0' : 'Wk ' + w}</div>
                  <div className="text-sm text-neutral-500">
                    {logs.length} {logs.length===1?'upload':'uploads'}
                    {checkin ? ' · check-in done' : ''}
                  </div>
                </div>

                {checkin && (
                  <div className="bg-white border border-neutral-200 rounded-lg p-4 mb-3">
                    <div className="font-display font-bold tracking-[0.12em] text-[10px] text-neutral-500 mb-2">
                      CHECK-IN{checkin.is_locked ? ' · LOCKED' : ''}
                    </div>
                    <div className="grid grid-cols-2 sm:grid-cols-4 gap-2 sm:gap-3 mb-2 text-sm">
                      <div><span className="text-neutral-500">Weight:</span> {checkin.weight_lbs ? checkin.weight_lbs + ' lbs' : '—'}</div>
                      <div><span className="text-neutral-500">Steps:</span> {checkin.steps_avg ?? '—'}</div>
                      <div><span className="text-neutral-500">Energy:</span> {checkin.energy_1_10 ? checkin.energy_1_10 + '/10' : '—'}</div>
                      <div><span className="text-neutral-500">Hunger:</span> {checkin.hunger_1_10 ? checkin.hunger_1_10 + '/10' : '—'}</div>
                    </div>
                    {checkin.wins && <div className="mb-1 text-sm"><span className="font-display font-bold text-[10px] tracking-[0.12em] text-emerald-700">WINS</span> — {checkin.wins}</div>}
                    {checkin.struggles && <div className="text-sm"><span className="font-display font-bold text-[10px] tracking-[0.12em] text-brand-orange">STRUGGLES</span> — {checkin.struggles}</div>}
                  </div>
                )}

                <div className="space-y-3">
                  {sortedLogs.map(log => (
                    <ClientTimelineLog key={log.id} log={log} clientId={client.id} suggestion={suggForLog(log.id)}/>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ---------- WORKOUTS LIBRARY ----------

   Client-side mirror of the coach's Workouts page. They have their own Programs,
   Workout Days, and Exercise Library they've built. Reuses the shared WorkoutsView
   along with the coach's TemplateEditor / ProgramEditor in a self-contained wrapper
   that manages its own list ↔ editor sub-navigation.

   "RUN THIS" button on a program sets it as the client's active plan (replaces
   whatever they were running). Server enforces ownership.
   ---------- */
function ClientWorkoutsLibrary({
  client, exercises, templates, programs,
  onCreateExercise, onUpdateExercise, onDeleteExercise,
  onCreateTemplate, onUpdateTemplate, onDeleteTemplate,
  onCreateProgram, onUpdateProgram, onDeleteProgram,
  onRunProgram, onBack,
}) {
  const [subview, setSubview] = useState('list'); // 'list' | 'template-editor' | 'program-editor'
  const [selectedTemplateId, setSelectedTemplateId] = useState(null);
  const [selectedProgramId, setSelectedProgramId] = useState(null);
  // Seeded exercises for a brand-new template — set when the client builds
  // from the Exercise Library selection, cleared otherwise.
  const [seedExercises, setSeedExercises] = useState([]);

  // The client sees everything they're allowed to see — coach's global library
  // PLUS their own privates. Ownership determines what they can edit.
  // API endpoints already return this exact scope for client role.
  const canEdit = useCallback((item) => item && item.owner_id === client.id, [client.id]);

  // Resolve the currently-selected item (editor mode). Clients can only enter
  // the editor for items they own — enforced by canEdit guard before opening.
  const selectedTemplate = selectedTemplateId === '__new__'
    ? { id: null, name: '', description: '', exercises: seedExercises }
    : templates.find(t => t.id === selectedTemplateId);

  const selectedProgram = selectedProgramId === '__new__'
    ? { id: null, name: '', description: '', notes: '', days: [] }
    : programs.find(p => p.id === selectedProgramId);

  // Template editor flow
  const openNewTemplate  = ()  => { setSeedExercises([]); setSelectedTemplateId('__new__'); setSubview('template-editor'); };
  const openEditTemplate = (id)=> {
    const t = templates.find(x => x.id === id);
    if (!canEdit(t)) return;  // silently ignore; UI already hides the edit button
    setSelectedTemplateId(id); setSubview('template-editor');
  };
  const saveTemplate = async (data) => {
    try {
      if (!selectedTemplate?.id) await onCreateTemplate(data);
      else                        await onUpdateTemplate(selectedTemplate.id, data);
      setSelectedTemplateId(null); setSeedExercises([]); setSubview('list');
    } catch (e) { alert('Save failed: ' + e.message); }
  };
  const backFromTemplateEditor = () => { setSelectedTemplateId(null); setSeedExercises([]); setSubview('list'); };
  const deleteTemplateIfOwned = (id) => {
    const t = templates.find(x => x.id === id);
    if (!canEdit(t)) return;
    onDeleteTemplate(id);
  };

  // Build a workout day straight from the Exercise Library selection — skip
  // the empty template step, pre-populate with the chosen exercises, and let
  // the client name + tune sets/reps before saving.
  const buildTemplateFromSelection = (exerciseIds) => {
    const seeded = exerciseIds.map((id, i) => ({
      exercise_id: id,
      order: i + 1,
      sets: 3,
      reps: '8-10',
      rest_seconds: 90,
      rationale: '',
    }));
    setSeedExercises(seeded);
    setSelectedTemplateId('__new__');
    setSubview('template-editor');
  };

  // Program editor flow
  const openNewProgram  = ()  => { setSelectedProgramId('__new__'); setSubview('program-editor'); };
  const openEditProgram = (id)=> {
    const p = programs.find(x => x.id === id);
    if (!canEdit(p)) return;
    setSelectedProgramId(id); setSubview('program-editor');
  };
  const saveProgram = async (data) => {
    try {
      if (!selectedProgram?.id) await onCreateProgram(data);
      else                       await onUpdateProgram(selectedProgram.id, data);
      setSelectedProgramId(null); setSubview('list');
    } catch (e) { alert('Save failed: ' + e.message); }
  };
  const backFromProgramEditor = () => { setSelectedProgramId(null); setSubview('list'); };
  const deleteProgramIfOwned = (id) => {
    const p = programs.find(x => x.id === id);
    if (!canEdit(p)) return;
    onDeleteProgram(id);
  };

  // Exercise delete (inline modal flow) — same ownership guard.
  const deleteExerciseIfOwned = (id) => {
    const e = exercises.find(x => x.id === id);
    if (!canEdit(e)) return;
    onDeleteExercise(id);
  };
  const updateExerciseIfOwned = (id, patch) => {
    const e = exercises.find(x => x.id === id);
    if (!canEdit(e)) return;
    return onUpdateExercise(id, patch);
  };

  // RUN THIS handler — works on any visible program (globals or own). Surfaces server errors.
  const runProgram = async (id) => {
    try { await onRunProgram(id); alert('Active plan set. Tap "My Workout" on home to run it.'); }
    catch (e) { alert('Failed: ' + e.message); }
  };

  if (subview === 'template-editor' && selectedTemplate) {
    return (
      <TemplateEditor
        template={selectedTemplate}
        exercises={exercises}
        onSave={saveTemplate}
        onBack={backFromTemplateEditor}
      />
    );
  }
  if (subview === 'program-editor' && selectedProgram) {
    return (
      <ProgramEditor
        program={selectedProgram}
        templates={templates}
        onSave={saveProgram}
        onBack={backFromProgramEditor}
      />
    );
  }

  return (
    <div>
      <div className="px-4 sm:px-6 pt-6"><BackLink onClick={onBack}/></div>
      <WorkoutsView
        exercises={exercises}
        templates={templates}
        programs={programs}
        canEdit={canEdit}
        title="Workouts"
        subtitle="Programs, workout days, and exercises. Your coach's library plus what you build."
        onAddExercise={onCreateExercise}
        onUpdateExercise={updateExerciseIfOwned}
        onDeleteExercise={deleteExerciseIfOwned}
        onNewTemplate={openNewTemplate}
        onEditTemplate={openEditTemplate}
        onDeleteTemplate={deleteTemplateIfOwned}
        onNewProgram={openNewProgram}
        onEditProgram={openEditProgram}
        onDeleteProgram={deleteProgramIfOwned}
        onRunProgram={runProgram}
        onBuildFromSelection={buildTemplateFromSelection}
      />
    </div>
  );
}


/* ---------- ROUTER ---------- */
function ClientApp({
  client, mealLogs, checkins, questions, mealSuggestions, clientProgram,
  exercises, templates, programs,
  onAddMealLog, onSaveCheckin, onPostQuestion,
  onUpdateClientProgram, onCreateBlankPlan,
  onCreateExercise, onUpdateExercise, onDeleteExercise,

  return (
    <div className="min-h-screen bg-neutral-50">
      <ClientHeader onLogout={onLogout} onHome={goHome}/>
